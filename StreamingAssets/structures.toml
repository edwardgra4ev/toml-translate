type = "structure"
display_name = "Heavy Farm Plot"
category = "Farming"
unlockedBy = "clayfarmingTech"
condition = 1
labour = 20
maintenanceLevel = 5
keyword = ["plot", "submersible"]
order = 20
description = """\
A farm plot, for <link="farming"><style="link">growing crops</style></link>. Heavy farm plots can be laid out in <link="claysoil"><style="link">clay soils</style></link>, but require <link="shovel"><style="link">metal tools</style></link>.

Farming converts soil <link="fertility"><style="link">fertility</style></link> into crops. Once the fertility of the farm plot is used up, it will no longer produce anything.

Unlocked by: <link="farmingTech"><style="link">Technology: Farming</style></link>

<style="fluff">So a third from morn till evening,
Till the third day evening brings him
To the endless bridge of Osmo,
To the Osmo-fields and pastures.

- the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem X</style>\
"""

