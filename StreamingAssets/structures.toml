A <link="pitchfork"><style="link">pitchfork</style></link> is needed to work the midden.\
"""

[slashandburn]
type = "structure"
display_name = "Slash and Burn Plot"
category = "Farming"
unlockedBy = "slashAndBurnTech"
maintenanceLevel = 5
condition = 1
labour = 20
order = 20
keyword = ["plot", "submersible"]
description = """\
A slash-and-burn plot: goblins will burn all flora in the area and till the ashes into the soil to create much higher fertility.

The plot includes a two-tile wide firebreak on each side. Once you mark out an area, the goblins will fell trees and cut down vegetation inside, and clear the firebreaks. When that's done, you can assign firewatchers and order them to start the fire!

Once the plot area has been burned, you can abandon the slash and burn plot, and lay out a <link="farmplot"><style="clickableLink">farm plot</style></link> over the burned area.

Unlocked by: <link="slashAndBurnTech"><style="link">Technology: Slash-and-burn Farming</style></link>

<style="fluff">\
Hark! the titmouse wildly crying,
From the aspen, words as follow:
"Osma's barley will not flourish,
Not the barley of Väinölä,
If the soil be not made ready,
If the forest be not levelled,
And the branches burned to ashes."

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>\
"""

