<style="fluff">Lapland's young and reckless minstrel,
Sorrow-laden, thus enchanted,
Deeper sinks in mud and water,
Fear-enchained and full of anguish,
In the mire, his beard bedrabbled,
Mouth once boastful filled with sea-weed.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem III</style>\
"""

[farmplot]
type = "structure"
display_name = "Simple Farm Plot"
category = "Farming"
unlockedBy = "farmingTech"
condition = 1
labour = 20
maintenanceLevel = 5
keyword = ["plot", "submersible"]
order = 20
description = """\
A farm plot, for <link="farming"><style="link">growing crops</style></link>. Simple farm plots can only be laid out in <link="sandsoil"><style="link">sandy soil</style></link> or burned <link="claysoil"><style="link">clay</style></link>.

Farming converts soil <link="fertility"><style="link">fertility</style></link> into crops. Once the fertility of the farm plot is used up, it will no longer produce anything. Fertility can be restored with the aid of <link="fertilizerTech"><style="link">fertilizers</style></link>.

Note that although simple farm plots can be built on clay, the primitive tools used to work them can't extract the full fertility of clay soil. To farm clay at maximum productivity, unlock <link="clayfarmplot"><style="link">heavy farm plots</style></link>.

Unlocked by: <link="farmingTech"><style="link">Technology: Farming</style></link>

<style="fluff">Ancient mother, thou that livest
Far below the earth and ocean,
Mother of the fields and forests,
Bring the rich soil to producing,
Bring the seed-grains to the sprouting.

- the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>\
"""

