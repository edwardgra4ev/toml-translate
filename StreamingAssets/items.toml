# 1.4 Other raw materials

[ashes]
display_name = "Ashes"
keyword = ["ash", "noStore", "hideInStockManager", "dissolves", "granular"]
fertility = 0.2
decayTime = 24
decays = "nothing"
weight = 0.5
description = """\
<style="fluff">"Faithful mother, dear departed,
Thou who nursed me in my childhood,
Art thou dead and turned to ashes,
Didst thou perish for my follies,
O'er thy head are willows weeping,
Junipers above thy body,
Alders watching o'er thy slumbers?"

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXIX</style>

A pile of ashes.

When ashes are incorporated into a <link=\"farming\"><style=\"link\">farm plot</style></link>, they increase its <link=\"fertility\"><style=\"link\">fertility</style></link>.

<link="fertility"><style="link">Fertility bonus</style></link>: <style="bonus">0.2</style>
<link="weight_def"><style="link">Weight</style></link>: 0.5 units\
"""

[bogironore]
display_name = "Bog Iron Ore"
keyword = ["bogironore", "product", "prefersOutside"]
unlockedBy = "bogIronTech"
weight = 0.5
description = """<style="fluff">From the hearth arose the gray-beard,
Shook his heavy looks and answered:
"Now I know the source of iron,
Whence the steel and whence its evils.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

Some dried bog iron ore. <link="wetbogiron"><style="link">Wet bog iron ore</style></link> dries fastest when stored properly and becomes bog iron ore. \
It can then be roasted in an <link="oreroastingpit0"><style="link">ore-roasting pit</style></link> to prepare it for smelting.

Unlocked by: <link="bogIronTech"><style="link">Technology: Bog Iron</style></link>

<link="weight_def"><style="link">Weight</style></link>: 0.5 units

Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>."""

