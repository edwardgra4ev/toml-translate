[bones]
display_name = "Bones"
keyword = ["bone", "prefersOutside"]
fireResist = 3
discovers = "butcheryTech"
burned = "nothing"
weight = 0.2
decays = "nothing"
decayTime = 60
stored_decay_multiplier = 0.5
description = """<style="fluff">\
Rakes up half the head, a fore-arm,
Finds a hand and half the back-bone,
Many other smaller portions;
Shapes her son from all the fragments,
Shapes anew her Lemminkäinen,
Flesh to flesh with skill she places,
Gives the bones their proper stations.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XV</style>

Some bones.

<link="weight_def"><style="link">Weight</style></link>: 0.2 units
