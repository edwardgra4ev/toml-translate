# 1.1 Wood raw materials

[branch]
display_name = "Branch"
keyword = ["prefersOutside", "wood", "defaultShown", "improvisedWeapon", "hammer"]
weight = 0.5
condition = 1
fireResist = 1
weapon_size = "large"
weaponMaterial = "wood"
skillModifier = -10
damagePoints = 6
damageType = "crushing"
burned = "ashes"
decays = "plantgarbage"
decayTime = 12
stored_decay_multiplier = 0.5
description = """\
<style="fluff">Since the mighty oak has fallen,
Now has lost its hundred branches,
That the North may see the sunshine,
See the gentle gleam of moonlight.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>

A large, sturdy tree branch, useful for <link="carpentryTech"><style="link">buildings</style></link>, tools and even putting out fires.

<style="characteristics">
Weapon type: <link="wthammer"><style="link">Hammer</style></link>
Damage type: <link="dtcrushing"><style="link">Crushing</style></link>
<link="armorAndDamage"><style="link">Damage points</style></link>: <style="bonus">6</style>
<link="improvweapon"><style="link">Improvised Weapon</style></link>: <style="malus">-10</style> to <link="fightingSkill"><style="link">Fighting</style></link></style>
<link="largeweapon"><style="link">Large Weapon</style></link>: can't be used with a shield.

<link="weight_def"><style="link">Weight</style></link>: 0.5 units
Decays in: <style="malus">12</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">24</style> months\
"""

[rottenlog]
display_name = "Rotten Log"
keyword = ["workedOutside", "wood", "hideInStockManager", "noStore"]
weight = 2.0
condition = 2
fireResist = 2
burned = "ashes"
decays = "plantgarbage"
decayTime = 120
description = """\
<style="fluff">But my virtues all have left me
In these mournful days of evil,
Vanished with my youth and vigor.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem V</style>

A <link="woodlog"><style="link">wooden log</style></link> that's been left outside for quite a while. It can still be used for <link="firewood"><style="link">firewood</style></link>.

Logs are heavy, so goblins will need to <link=\"hauling\"><style=\"link\">haul</style></link> them to where they are needed.

<link="weight_def"><style="link">Weight</style></link>: 2.0 units
Decays in: <style="malus">120</style> months\
"""

[willowbranches]
display_name = "Willow Branches"
keyword = ["prefersOutside", "wood", "defaultShown", "coarse_bast"]
weight = 0.5
condition = 1
fireResist = 1
burned = "ashes"
decays = "plantgarbage"
decayTime = 12
stored_decay_multiplier = 0.5
description = """<style="fluff">\
Väinämöinen, old and truthful,
Swam through all the deep-sea waters,
Floating like a branch of aspen,
Like a withered twig of willow.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem VII</style>

A bunch of willow branches. Willow branches are a kind of rough bast that can be <link="retting"><style="link">made</style></link> into <link="coarsefiber"><style="link">coarse fiber</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.5 units
Decays in: <style="malus">12</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">24</style> months"""

[woodchips]
display_name ="Wood Chips"
keyword = ["wood", "noStore"]
weight = 0.2
condition = 2
fireResist = 1
fertility = 0.05
unlockedBy = "fertilizerTech"
decays = "nothing"
decayTime = 6
description = """Some wood chips. They can be <link="compostingdef"><style="link">composted</style></link> into fertilizer in a <link="midden"><style="link">midden</style></link>.

<link="fertility"><style="link">Fertility bonus</style></link>: <style="bonus">0.05</style>
<link="weight_def"><style="link">Weight</style></link>: 0.2 units
Spoils in: <style="malus">6</style> months"""

[woodlog]
display_name = "Wood Log"
keyword = ["workedOutside", "wood", "defaultShown"]
weight = 2.0
condition = 3
fireResist = 2
burned = ["ashes", "ashes"]
decays = "rottenlog"
decayTime = 60
stored_decay_multiplier = 0.5
description = """<style="fluff">\
Now she asks the trees the question,
And the forest gives this answer:
"We have care enough already,
Cannot think about thy matters;
Cruel fates have we to battle,
Pitiful our own misfortunes!
We are felled and chopped in pieces,
Cut in blocks for hero-fancy,
We are burned to death as fuel,
No one cares how much we suffer.”

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XV</style>

A wooden log. Logs can be used as <link="carpentryTech"><style="link">building material</style></link>, or chopped into <link=\"woodplank\"><style=\"link\">planks</style></link>, <link=\"woodbeam\"><style=\"link\">beams</style></link>, or <link=\"firewood\"><style=\"link\">firewood</style></link>.

Logs are heavy, so goblins will need to <link=\"hauling\"><style=\"link\">haul</style></link> them to where they are needed.

<link="weight_def"><style="link">Weight</style></link>: 2.0 units
Decays in: <style="malus">60</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">120</style> months\
"""

