decayTime = 6
stored_decay_multiplier = 0.25
description = """Stalks of rye harvested from the field. Rye stalks can be <link="threshing"><style="link">threshed</style></link> to produce <link="ryeseedbag"><style="link">rye seeds</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.5 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">24</style> months"""

