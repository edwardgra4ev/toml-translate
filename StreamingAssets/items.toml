foodMoraleMod = +10
description = """\
<style="fluff">But I am not like the cuckoo,
Singing, merry on the hill-tops;
I am like the songless blue-duck,
As she swims upon the waters.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXII</style>

The edible meat of a game bird.

<link="foodpoint"><style="link">Food points:</style></link> <style="bonus">1</style>
<link="moraledef"><style="link">Morale bonus:</style></link> <style="bonus">+10</style>

