condition = 2
fireResist = 1
equivalent_nutrition = 0.05
maxCapacity = 120
weight = 0.1
decays = "plantgarbage"
decayTime = 6
stored_decay_multiplier = 0.25
description = """Some uprooted <link="flaxdef"><style="link">flax</style></link> plants. Flax strands are a kind of fine bast that can be <link="retting"><style="link">made</style></link> into <link="finefiber"><style="link">fine fiber</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.1 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">24</style> months"""

[hay]
display_name = "Hay"
keyword = ["fodder", "loose", "prefersOutside", "garbage", "fertilizer_category"]
weight = 0.5
condition = 2
fireResist = 0
decayTime = 6
fertility = 0.05
stored_decay_multiplier = 0.5
decays = "plantgarbage"
description = """<style="fluff">\
Rake the hay when it is ready,
Make the reeds and grasses rustle,
Toss the fragrant heads of clover,
Make thy hay in Kalevala
When the silver sun is shining.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXIV</style>

Some delicious hay!

Hay can be <link="compostingdef"><style="link">composted</style></link> into fertilizer in a <link="midden"><style="link">midden</style></link>.

<link="fertility"><style="link">Fertility bonus</style></link>: <style="bonus">0.05</style>
<link="weight_def"><style="link">Weight</style></link>: 0.5 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="storehouse"><style="link">inside</style></link>: decays in <style="malus">12</style> months"""

[nettleplant]
display_name = "Nettle Plant"
keyword = ["nettle", "prefersOutside"]
equivalent_nutrition = 0.05
maxCapacity = 120
weight = 0.3
condition = 2
fireResist = 1
decays = "plantgarbage"
decayTime = 6
stored_decay_multiplier = 0.5
description = """Some harvested nettle plants.

Nettle plants need to be processed at a <link="nettleprocessing"><style="link">nettle yard</style></link>, to produce <link="nettleseedbag"><style="link">nettle seeds</style></link>, edible <link="nettlebunch"><style="link">nettle leaves</style></link> and <link="nettlestems"><style="link">nettle stems</style></link>, which can be retted into fiber.

<link="weight_def"><style="link">Weight</style></link>: 0.3 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">12</style> months"""

[nettlestems]
display_name = "Nettle Stems"
keyword = ["fine_bast", "prefersInside"]
weight = 0.2
condition = 2
fireResist = 1
decays = "plantgarbage"
decayTime = 6
stored_decay_multiplier = 0.5
description = """\
Some nettle stems. Nettle stems are a kind of fine bast that can be <link="retting"><style="link">made</style></link> into <link="finefiber"><style="link">fine fiber</style></link>. One bunch of nettle stems makes one unit of fiber.

<link="weight_def"><style="link">Weight</style></link>: 0.2 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="storehouse"><style="link">inside</style></link>: decays in <style="malus">12</style> months\
"""

[roughflaxstrands]
display_name = "Rough Flax Strands"
keyword = ["flax", "prefersOutside"]
condition = 2
fireResist = 1
equivalent_nutrition = 0.05
maxCapacity = 10
weight = 0.1
decays = "plantgarbage"
decayTime = 6
stored_decay_multiplier = 0.25
description = """Some uprooted flax plants.

Rough <link="flaxdef"><style="link">flax</style></link> strands are a kind of rough bast that can be <link="retting"><style="link">made</style></link> into <link="coarsefiber"><style="link">coarse fiber</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.1 units
Decays in: <style="malus">6</style> months
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>: decays in <style="malus">24</style> months"""

[ryestalk]
display_name = "Rye Stalk"
