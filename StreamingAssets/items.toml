<style="fluff">But I told Arnin-Yo that I had heard myself the voices of the gods and knew that They were there beyond the twilight and so could never more bow down to the gods that the shepherds made from the red clay which they scooped with their hands out of the hillside.

 - Time and the Gods (1906), Lord Dunsany</style>

Some raw <link="clayTech"><style="link">clay</style></link>. Clay can be made into <link="claypot"><style="link">pots</style></link> at a <link="potteryworkshop"><style="link">potter</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.5 units
Properly <link="storage"><style="link">stored</style></link> <link="stockpile"><style="link">outside</style></link>\
"""

[roastedbogironore]
display_name = "Roasted Bog Iron Ore"
keyword = ["ironore", "product", "prefersOutside"]
unlockedBy = "bogIronTech"
weight = 0.5
description = """<style="fluff">Then again speaks Ilmarinen,
Thus the smith addresses Iron:
'Be not frightened, useful metal,
Surely Fire will not consume thee,
Will not burn his youngest brother,
Will not harm his nearest kindred.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

