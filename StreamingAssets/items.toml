keyword = ["metal", "dwarven", "trinket", "prefersInside"]
discovers = "dwarvenTech"
weight = 0.2
description = """\
<style="fluff">And nevertheless they dwell in the earth and in stones.

 - the Prose Edda, trans. Arthur Gilchrist Brodeur, Gylfaginning, XIV</style>

A <link="dwarvenTech"><style="link">dwarven</style></link> trinket from <link="birdhome"><style="link">Bird-home</style></link>, ornamental but useless.

Several dwarven trinkets can be hammered into a <link=\"dwingot\"><style=\"link\">dwarven metal ingot</style></link> at a <link=\"smithyworkshop\"><style=\"link\">smithy</style></link>.

<link="weight_def"><style="link">Weight</style></link>: 0.2 units
Properly <link="storage"><style="link">stored</style></link> <link="storehouse"><style="link">inside</style></link>"""

