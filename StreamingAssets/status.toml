# hunger and thirst statuses

[thirsty]
display_name = "Thirsty"
morale_mod = -5
description = """
This goblin is thirsty!

Goblins will drink from the river or another nearby water source when their duties permit.

<style="characteristics"><link="moraledef"><style="link">Morale</style></link>: <style="malus">-5</style></style>\
"""

[hungry]
display_name = "Hungry"
description = """<style="fluff">From the woods a bird came flying,
Sang this song to Kullervoinen:
"'Tis the time for forest-dinners,
For the fatherless companion
Of the herds to eat his viands,
Eat the good things from his basket!"

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXXIII</style>

This creature is hungry and needs <link="foodpoint"><style="link">food</style></link>.

Goblins prefer to eat together at <link="kitchendef"><style="link">kitchens</style></link> at the end of every season. \
If no kitchen is available, they'll try to find food on their own. IF they can't find food, they'll get hungrier, and eventually leave the camp!
"""

[famished]
display_name = "Famished"
morale_mod = -10
constitution_mod = -5
speed_mod = -0.05
work_speed_mod = -0.1
description = """\
This creature is famished! It hasn't had <link="foodpoint"><style="link">anything to eat</style></link> for quite a while.

Goblins prefer to eat together at <link="kitchendef"><style="link">kitchens</style></link> at the end of every season. \
If no kitchen is available, they'll try to find food on their own. IF they can't find food, they'll get hungrier, and eventually leave the camp!

<style="characteristics">\
<link="moraledef"><style="link">Morale</style></link>: <style="malus">-10</style>
<link="constitutionDef"><style="link">Constitution</style></link>: <style="malus">-5</style>
<link="speedDef"><style="link">Movement speed</style></link>: <style="malus">-0.05</style>
<link="work_speed_def"><style="link">Working speed</style></link>: <style="malus">-0.1</style>\
</style>\
"""

[starving]
display_name = "Starving"
morale_mod = -20
constitution_mod = -10
speed_mod = -0.1
work_speed_mod = -0.2
description = """\
This creature is starving! If it can't find any <link="foodpoint"><style="link">food</style></link>, it'll leave the camp.

Goblins prefer to eat together at <link="kitchendef"><style="link">kitchens</style></link> at the end of every season. \
If no kitchen is available, they'll try to find food on their own. IF they can't find food, they'll get hungrier, and eventually leave the camp!

<style="characteristics">\
<link="moraledef"><style="link">Morale</style></link>: <style="malus">-20</style>
<link="constitutionDef"><style="link">Constitution</style></link>: <style="malus">-10</style>
<link="speedDef"><style="link">Movement speed</style></link>: <style="malus">-0.1</style>
<link="work_speed_def"><style="link">Working speed</style></link>: <style="malus">-0.2</style>\
</style>\
"""

[satiated]
display_name = "Satiated"
morale_mod = +10
speed_mod = -0.1
description = """<style="fluff">\
And when I had made an end of so great a gorging, and had ceased to be drunken with water, I gat my gear upon me, and took the Diskos into mine hand, and so went forth once more towards the North.

 - William Hope Hodgson, The Night Land</style>

This creature has had plenty to eat.

<style="characteristics">\
<link="speedDef"><style="link">Movement speed</style></link>: <style="malus">-0.1</style>
<link="moraledef"><style="link">Morale</style></link>: <style="bonus">+10</style>\
</style>\
"""

