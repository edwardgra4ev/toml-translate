# temperament traits

[outdoorsgoblin]
display_name = "Temperament: Outdoorsgoblin"
keyword = "temperament"
description = """\
<style="fluff">When a child I lived in plenty
In the dwellings of my mother;
To the woods I went for berries,
Went for raspberries to uplands,
Gathered strawberries on mountains,
Gathered one day then a second.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXXV</style>

This goblin likes to work outdoors and doesn't mind leaving the camp.

<style="fluff">Each goblin has a temperament trait that defines what kind of jobs they prefer to do.</style>"""

[camper]
display_name = "Temperament: Camper"
keyword = "temperament"
description = """\
<style="fluff">When the strong man, Untamoinen,
Went to look at early evening,
How Kullervo was progressing,
In his labors in the forest;
Little was the work accomplished,
Was not worthy of a hero.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXXI</style>

This goblin prefers to stay inside the camp.

<style="fluff">Each goblin has a temperament trait that defines what kind of jobs they prefer to do.</style>"""

[crafter]
display_name = "Temperament: Crafter"
keyword = "temperament"
description = """\
<style="fluff">Wondrous things might be constructed
From the relics of this monster,
Were they in the blacksmith's furnace,
In the hands of the magician.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XL</style>

This goblin prefers to work at a workshop.

<style="fluff">Each goblin has a temperament trait that defines what kind of jobs they prefer to do.</style>"""

[laborer]
display_name = "Temperament: Laborer"
keyword = "temperament"
description = """\
<style="fluff">These the words of Kullervoinen:
"Give me work at early morning,
In the evening, occupation,
Labor worthy of thy servant."

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXXII</style>

This goblin prefers manual labor to working in a workshop.

<style="fluff">Each goblin has a temperament trait that defines what kind of jobs they prefer to do.</style>"""

# physical traits

[brawny]
display_name = "Brawny"
keyword = "physicaltrait"
strengthWorkSpeedMod = +0.2
carryingCapacityMod = +0.5
hit_point_bonus = +1
constitution_mod = +10
fight_damage_mod = +1
description = """\
<style="fluff">Kullervoinen does as bidden,
Scares the salmon with the forces
Of his mighty arms and shoulders,
With the strength of youth and magic.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXXV</style>

This goblin is powerfully built and strong.

<style="characteristics">\
<link="carrying_capacity_def"><style="link">Carrying Capacity</style></link>: <style="bonus">+0.5</style>
<link="constitutionDef"><style="link">Constitution</style></link>: <style="bonus">+10</style>
<link="fight_damage_mod_def"><style="link">Fighting Damage Modifier</style></link>: <style="bonus">+1</style>
<link="hitpoints"><style="link">Hit Points</style></link>: <style="bonus">+1</style></style>"""

[nimble]
display_name = "Nimble"
keyword = "physicaltrait"
finesseWorkSpeedMod = +0.2
agility_mod = +10
fight_damage_mod = +1
shootDamageModifier = +1
toolToughness = +5
description = """\
<style="fluff">Merrily flies the golden shuttle,
From the maiden's nimble fingers,
Briskly swings the lathe in weaving,
Swiftly flies the comb of silver,
From the sky-born maiden's fingers,
Weaving webs of wondrous beauty.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem VIII</style>

This goblin is agile.

<style="characteristics">\
<link="agilityDef"><style="link">Agility</style></link>: <style="bonus">+10</style>
<link="fight_damage_mod_def"><style="link">Fighting Damage Modifier</style></link>: <style="bonus">+1</style>
<link="tooltoughnessDef"><style="link">Tool Toughness</style></link>: <style="bonus">+5</style></style>"""

[clumsy]
display_name = "Clumsy"
keyword = "physicaltrait"
finesseWorkSpeedMod = -0.2
agility_mod = -10
shootDamageModifier = -1
toolToughness = -10
mishapChance = +20
description = """\
<style="fluff">On the evening of the third day,
Evil Hisi grasps the hatchet,
Lempo takes the crooked handle,
Turns aside the axe in falling,
Strikes the rocks and breaks to pieces;
From the rocks rebound the fragments.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem VIII</style>

This goblin seems more likely than others to suffer accidents.

<style="characteristics">\
<link="agilityDef"><style="link">Agility</style></link>: <style="malus">-10</style>
<link="tooltoughnessDef"><style="link">Tool Toughness</style></link>: <style="malus">-10</style></style>"""


# experience traits

[hardy]
display_name = "Hardy"
keyword = "experiencetrait"
constitution_mod = +5
willpower_mod = +5
description = """\
<style="fluff">Väinämöinen, wise and ancient,
Answered thus the youthful minstrel:
"If thou art but Joukahainen,
Thou shouldst give me all the highway;
I am many years thy senior."

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem III</style>

This goblin has survived a winter in the camp.

<style="characteristics">\
<link="constitutionDef"><style="link">Constitution</style></link>: <style="bonus">+5</style>
<link="willpowerDef"><style="link">Willpower</style></link>: <style="bonus">+5</style></style>"""

[scarred]
display_name = "Scarred"
keyword = "experiencetrait"
willpower_mod = +5
description = """\
<style="fluff">Straightway stronger grew in body,
Straightway were the wounds united,
Quick the fearful pain departed.
Strong and hardy grew the hero.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem IX</style>

This goblin has survived an injury.

<style="characteristics">\
<link="willpowerDef"><style="link">Willpower</style></link>: <style="bonus">+5</style></style>"""

[veteran]
display_name = "Veteran"
keyword = "experiencetrait"
willpower_mod = +10
fighting_mod = +10
description = """\
<style="fluff">"That my blade is good and trusty,
Has been proved on heads of heroes,
Has on many bones been tested."

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXVII</style>

This goblin has been in combat and has lived to tell the tale.

<style="characteristics">\
<link="willpowerDef"><style="link">Willpower</style></link>: <style="bonus">+10</style>
<link="fightingSkill"><style="link">Fighting</style></link>: <style="bonus">+10</style></style>"""

