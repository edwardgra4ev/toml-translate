Through the vitals of the hero.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XIV</style>
 
 This goblin has slain a human in combat.

<style="characteristics">\
<link="fightingSkill"><style="link">Fighting</style></link>: <style="bonus">+5</style>
