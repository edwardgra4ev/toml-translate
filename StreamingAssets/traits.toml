# personality traits

[timid]
display_name = "Timid"
keyword = "personalitytrait"
willpower_mod = -10
agility_mod = +5
description = """\
<style="fluff">Shouldst thou journey to the woodlands,
There to gather aspen-fagots,
Do not go with noise and bustle,
Gather all thy sticks in silence,
Gather quietly the birch-wood.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXIII</style>

This goblin is a little skittish.

<style="characteristics">\
<link="willpowerDef"><style="link">Willpower</style></link>: <style="malus">-10</style>
<link="agilityDef"><style="link">Agility</style></link>: <style="bonus">+5</style></style>"""

[hardblooded]
display_name = "Hard-blooded"
keyword = ["personalitytrait", "immuneToFear"]
willpower_mod = +10
description = """\
<style="fluff">My son can see the death-folk. He's been a seer ever since he got drunk in Kittilä and took a dead body into his arms.

 - Enontekiö, 1930. <style="link"><link="fls">SKS archives</link></style>.</style> 

This goblin has seen death and not flinched.

<style="characteristics">\
<link="willpowerDef"><style="link">Willpower</style></link>: <style="bonus">+10</style></style>"""

[softblooded]
display_name = "Soft-blooded"
keyword = ["personalitytrait"]
willpower_mod = -5
description = """\
This goblin is a gentle creature, who turns away from the more brutal parts of life.

<style="characteristics">\
<link="willpowerDef"><style="link">Willpower</style></link>: <style="malus">-5</style></style>"""

# special traits

[shamantrait]
display_name = "Shaman"
visual_priority = 1_000_000
description = """\
<style="fluff">Grandly sang wise Väinämöinen,
Till the copper-bearing mountains,
And the flinty rocks and ledges
Heard his magic tones and trembled;
Mountain cliffs were torn to pieces,
All the ocean heaved and tumbled;
And the distant hills re-echoed.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem III</style>

 This goblin has been selected by his community to serve as their shaman.\
"""

