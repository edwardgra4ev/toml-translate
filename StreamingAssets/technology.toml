treename = "Stone Construction"
prerequisite = ["stoneTech", "beamTech"]
techLevel = "stone"
researchPointCost = 12
treeCoord = "8,6"
description = """\
<style="fluff">They destroyed one of the hills of God, but they made Babbulkund. She is carven, not built; her palaces are one with her terraces, there is neither join nor cleft.

 - Lord Dunsany, the Fall of Babbulkund (1908)</style>

The goblins have figured out how to build stone buildings.

Prerequisites: <link="stoneTech"><style="link">Technology: Stone</style></link>, <link="beamTech""><style="link">Technology: Beams</style></link>

Unlocks:
<link="housing4a"><style="link">Stone and Timber Cottage</style></link>

Leads to:
<link="forgingTech"><style="link">Technology: Forging</style></link> (with <link="charcoalTech"><style="link">Technology: Charcoal</style></link>)
<link="stoneFortTech"><style="link">Technology Stone Fortifications</style></link>"""

