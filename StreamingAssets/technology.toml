treename = "Songs of the Dead"
keyword = "shamanism"
prerequisite = "shamanismTech"
techLevel = "wood"
researchPointCost = 8
treeCoord = "4,2"
description = """<style="fluff">There was a witch one summer who put all the hay into the barn with a wind-head. Then another witch came and knocked the whole barn over. It was no good.

Muurla, 1915. <style="link"><link="fls">SKS archives</link></style>.</style>

The shaman has found the words to begin communing with the spirits of the forest.

Prerequisites: <link="shamanismTech"><style="link">Technology: Shamanism</style></link>

Unlocks:
<link="conscript_spirits_01"><style="link">Conscript Spirits 1</style></link>
<link="conscript_spirits_02"><style="link">Conscript Spirits 2</style></link>"""

[windlaw]
display_name = "Technology: Songs of the Wind"
treename = "Songs of the Wind"
keyword = "shamanism"
prerequisite = "shamanismTech"
techLevel = "wood"
researchPointCost = 6
treeCoord = "4,1"
description = """\
<style="fluff">I asked him the reason of this, and found that he was fully possessed with the notion that Fins are wizards, and especially have power over winds and storms.

 - Richard Henry Dana Jr., Two Years Before the Mast (1840)</style>

The shaman has found the words to begin harnessing the winds for his magic.

Prerequisites: <link="shamanismTech"><style="link">Technology: Shamanism</style></link>

Unlocks:
<link="changewindspell"><style="link">Change Wind</style></link>
<link="summonwindhead"><style="link">Summon Wind-head</style></link>

<style="fluff">The belief that Finns had magic powers that could affect the winds is attested in the Viking Age, and as the quote from Richard Henry Dana shows, survived through the Age of Sail. \
In the medieval stories, it isn't always clear whether they mean Finns or the Sámi, but later the belief is clearly identified with the Finns.</style>\
"""