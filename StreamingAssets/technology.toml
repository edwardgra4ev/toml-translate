treename = "Shamanism"
keyword = "shamanism"
techLevel = "wood"
treeCoord = "1,1"
description = """\
<style="fluff">Then he thought and long considered,
Where to find these words of magic,
Find the lost-words of the Master.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XVI</style>

At least one goblin in your camp is <link="hardblooded"><style="link">hard-blooded</style></link> and <link="hardy"><style="link">hardy</style></link>. You can now build a <link="shamanhut"><style="link">shaman's hut</style></link>, and if you do, your goblins will elect a <link="shaman_def"><style="link">shaman</style></link>.

Unlocks: <link="shamanhut"><style="link">Shaman's Hut</style></link>

