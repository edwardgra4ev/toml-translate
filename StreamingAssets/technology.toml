[hydraulicTech]
display_name = "Technology: Hydraulics"
treename = "Hydraulics"
prerequisite = ["plankTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "3,2.5"
description = """<style="fluff">Cease, O cataract, thy roaring,
Cease, O waterfall, thy foaming!
Maidens of the foam and current,
Sitting on the rocks in water,
On the stone-blocks in the river,
Take the foam and white-capped billows
In your arms and still their anger.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XL</style>

The goblins are growing more familiar with working on the water, and have invented several interesting contraptions to control it.

Prerequisites: <link="plankTech"><style="link">Technology: Planks</style></link>

Unlocks:
<link="screwpump"><style="link">Screw Pump</style></link>
<link="wooden_floodgate"><style="link">Wooden Floodgate</style></link>\
"""

[barrelTech]
display_name = "Technology: Barrel-making"
treename = "Barrel-making"
prerequisite = ["plankTech"]
researchPointCost = 8
techLevel = "wood"
treeCoord = "4,7.5"
description = """<style="fluff">So Varrak the Laplander took the helm and steered the vessel due north for many days and nights. The first danger they encountered was a great whirlpool, which threatened to engulf the ship. Then Varrak threw a small barrel overboard, wrapped in red cloths and ornamented with red streamers. This bait was swallowed by a whale, which took to flight, and towed the ship to a place of safety.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XVI: The Voyage of the Kalevide</style>

The goblins have learned to make barrels for storing liquids. They also work as flotation devices!

Prerequisites: <link="plankTech"><style="link">Technology: Planks</style></link>

Unlocks:
<link="wood_barrel"><style="link">Wooden Barrel</style></link>

<link="pontoon_bridge"><style="link">Pontoon Bridge</style></link>"""
