# 1.0 Wood technologies

[carpentryTech]
display_name = "Technology: Carpentry"
treename = "Carpentry"
techLevel = "wood"
treeCoord = "1,7"
description = """<style="fluff">\
Spake the singer, Väinämöinen:
"I was building me a vessel,
At my craft was working, singing,
Needed three words of the Master,
How to fasten in the ledges,
How the stern should be completed.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XVI</style>

Wood is the most plentifully available material in the northern forests, and your goblins are learning how to make use of it.

Unlocked by: building a <link="carpenter1"><style="link">carpenter's workshop</style></link>

Unlocks:
<link="diggingstick"><style="link">Digging Stick</style></link>
<link="stonemace"><style="link">Stone Mace</style></link> (with <link="weaponsTech"><style="link">Technology: Weapons</style></link>)
<link="woodpole"><style="link">Wooden Pole</style></link>
<link="woodspear"><style="link">Wooden Spear</style></link> (with <link="weaponsTech"><style="link">Technology: Weapons</style></link>)

<link="palisade"><style="link">Palisade</style></link>
<link="storehouse1><style="link">Storage Shack</style></link>
<link="weathervane"><style="link">Weathervane</style></link>

Leads to:
<link="dwarvenToolTech"><style="link">Technology: Dwarven Tools</style></link> (with <link="dwarvenTech"><style="link">Technology: Dwarven Metal</style></link>)\
<link="housingTech"><style="link">Technology: Housing</style></link>
<link="plankTech"><style="link">Technology: Planks</style></link>
<link="spinningTech"><style="link">Technology: Spinning</style></link> (with <link="clayTech"><style="link">Technology: Pottery</style></link>)
<link="woodmagicTech"><style="link">Technology: Wooden Magical Structures</style></link>  (with <link="shamanismTech"><style="link">Technology: Shamanism</style></link>)\
"""
# <link="boatingTech"><style="link">Technology: Boating</style></link> (with <link="fishingTech"><style="link">Technology: Fishing</style></link>)

[housingTech]
display_name = "Technology: Housing"
treename = "Housing"
techLevel = "wood"
prerequisite = "carpentryTech"
researchPointCost = 3
treeCoord = "2,5"
description = """<style="fluff">\
The old folk say that goblins also have houses, just like other people.

Kittilä, 1854. <style="link"><link="fls">SKS archives</link></style>.</style>

The goblins have learned to build houses to shelter from the elements.

Unlocks:
<link="housing1a"><style="link">Simple Shack</style></link>
<link="kitchen1"><style="link">Kitchen Shack</style></link>
<link="housing2a"><style="link">Simple Shed</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)

Leads to:
<link="beamTech"><style="link">Technology: Beams</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)\
"""

[beamTech]
display_name = "Technology: Beams"
treename = "Beams"
prerequisite = ["plankTech", "housingTech"]
techLevel = "wood"
researchPointCost = 6
treeCoord = "3,6.5"
description = """<style="fluff">\
In front of the village was a wide and grassy space, and beyond this the great wood again, but at the back the trees came right up to the houses, which, with their great beams and wooden ​framework and thatched roofs, green with moss, seemed almost to be a part of the forest.

 - Lord Dunsany, the Fortress Unvanquishable Save for Sacnoth (1908)</style>

The goblins have learned to construct buildings by shaping <link="woodlog"><style="link">logs</style></link> into <link="woodbeam"><style="link">beams</style></link> \
and interlocking them together. This is a very durable <link="beamtier"><style="link">method of building</style></link>.

Prerequisites: <link="housingTech"><style="link">Housing</style></link>, <link="plankTech"><style="link">Planks</style></link>

Unlocks:
<link="storehouse3"><style="link">Storage Hut</style></link>
<link="housing3a"><style="link">Simple Hut</style></link>

Leads to:
<link="stoneConstructionTech"><style="link">Technology: Stone Construction</style></link> (with <link="stoneTech"><style="link">Technology: Stone</style></link>)
<link="windmillsTech"><style="link">Technology: Windmills</style></link>\
"""
# <link="carpenter3"><style="link">Carpenter's Hut</style></link>

[plankTech]
display_name = "Technology: Planks"
treename = "Planks"
prerequisite = "carpentryTech"
techLevel = "wood"
researchPointCost = 4
treeCoord = "2,6.5"
description = """<style="fluff">\
From the stems he lops the branches,
Splits the trunk in many pieces,
Fashions lumber for the bottom,
Countless boards, and ribs, and braces,
For the singer's magic vessel,
For the boat of the magician.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XVI</style>

The goblins have learned to cut <link="woodlog"><style="link">logs</style></link> into <link="woodplank"><style="link">planks</style></link>. \
Planks can be used to build <link="planktier"><style="link">more advanced buildings</style></link>.

Prerequisites: <link="carpentryTech"><style="link">Carpentry</style></link>

Unlocks:
<link="woodbucket"><style="link">Wooden Bucket</style></link>
<link="woodplank"><style="link">Wooden Plank</style></link>
<link="woodshield"><style="link">Wooden Shield</style></link> (with <link="armorTech"><style="link">Technology: Armor</style></link>)

<link="carpenter2"><style="link">Carpenter's Shed</style></link>
<link="duckboard"><style="link">Duckboard</style></link>
<link="granary2"><style="link">Granary</style></link>
<link="guard2"><style="link">Guard Post</style></link>
<link="kitchen2"><style="link">Kitchen Shed</style></link>
<link="plank_bridge"><style="link">Plank Bridge</style></link>
<link="housing2a"><style="link">Simple Hut</style></link>
<link="spinning2"><style="link">Spinner's Shed</style></link> (with <link="spinningTech"><style="link">Technology: Spinning</style></link>)
<link="storehouse2"><style="link">Storage Shed</style></link>
<link="weaponmaker2"><style="link">Weaponsmith's Shed</style></link> (with <link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link>)
<link="woodtower"><style="link">Wooden Watchtower</style></link> (with <link="spearthrowerTech"><style="link">Technology: Spear-thrower</style></link>)

Leads to:
<link="barrelTech"><style="link">Technology: Barrel-making</style></link>
<link="beamTech"><style="link">Technology: Beams</style></link> (with <link="housingTech"><style="link">Technology: Housing</style></link>)
<link="hydraulicTech"><style="link">Technology: Hydraulics</style></link>\
<link="armorTech"><style="link">Technology: Wooden Armor</style></link>
"""
