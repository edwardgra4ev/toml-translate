[simpleStoneTech]
display_name = "Technology: Simple Stone Structures"
treename = "Simple Stone Structures"
techLevel = "wood"
treeCoord = "1,5.5"
description = """<style="fluff">That the rocks may fall and sicken,
And the beds of iron perish.
Rocks and metals do not murmur
At the hands of the invader.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XLV</style>

The goblins have learned to make use of rocks and stone they can find.

Unlocked by: discovering <link="roughstone"><style="link">Rough Stone</style></link> or <link="dressedstone"><style="link">Dressed Stone</style></link>.

Unlocks:
<link="cobblestone_road"><style="link">Cobblestone Road</style></link>
<link="stonepavement"><style="link">Stone Pavement</style></link>"""

[stoneTech]
display_name = "Technology: Stone"
treename = "Stone"
techLevel = "stone"
prerequisite = "dwarvenToolTech"
researchPointCost = 10
treeCoord = "7,6.5"
description = """<style="fluff">Presently they passed through a stone door into a stone gallery, likewise paved with stone, and after passing through it for some little distance, arrived at a room in which the walls and furniture were wholly of iron. "This," said the eldest sister, "is the room of old Sarvik, where his men-servants assemble and work or amuse themselves, and where they are sometimes tortured in all sorts of ways."

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XIV: The Palace of Sarvik</style>

The goblins have acquired the tools to quarry stone.

Prerequisites: <link="dwarvenToolTech"><style="link">Technology: Dwarven Tools</style></link>

Unlocks:
<link="stonequarry"><style="link">Stone Quarry</style></link>
<link="stonecutter1"><style="link">Stone-cutter's Shack</style></link>

<link="dressedstone"><style="link">Dressed Stone</style></link>
