# 5.0 Weapon and armor technologies

[weaponsTech]
display_name = "Technology: Weapons"
treename = "Weapons"
techLevel = "wood"
prerequisite = "combat"
treeCoord = "1,4"
description = """<style="fluff">\
Better live in civil freedom,
Happier would be my life-time,
Should I serve my fellow-beings,
Serve as tools for their convenience,
Than as implements of warfare,
Slay my friends and nearest kindred,
Wound the children of my mother.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

Your goblins have learned to create weapons to defend themselves.

Unlocked by: <link="combat"><style="link">Combat</style></link> (this technology is unlocked when an inhabitant of your camp has been in combat)

Unlocks:
<link="stonemace"><style="link">Stone Mace</style></link>
<link="bonespear"><style="link">Bone Spear</style></link>  (with <link="butcheryTech"><style="link">Technology: Butchery</style></link>)
<link="woodspear"><style="link">Wooden Spear</style></link> (with <link="carpentryTech"><style="link">Carpentry</style></link>)
<link="dwspear"><style="link">Dwarven Spear</style></link> (with <link="dwarvenToolTech"><style="link">Dwarven Tools</style></link>)

<link="weaponmaker1"><style="link">Weapon-crafter's Shack</style></link>

Leads to:
<link="armorTech"><style="link">Technology: Wooden Armor</style></link>
<link="spearthrowerTech"><style="link">Technology: Spear-thrower</style></link>
<link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link> (with <link="dwarvenTech"><style="link">Technology: Dwarven Metal</style></link>)\
"""

[armorTech]
display_name = "Technology: Wooden Armor"
treename = "Wooden Armor"
prerequisite = ["plankTech", "weaponsTech"]
researchPointCost = 8
techLevel = "wood"
treeCoord = "3,5"
description = """\
<style="fluff">On the third day thereafter the battle began in earnest, and the Kalevide fought against the mailed warriors for half a day, when his horse was killed under him.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XX: Armageddon</style>

Learning from their experiences in combat, the goblins have learned to fashion shields and armor for protection.

Prerequisites: <link="weaponsTech"><style="link">Technology: Weapons</style></link>, <link="plankTech"><style="link">Technology: Planks</style></link>

Unlocks:
<link="dwshield"><style="link">Dwarven Shield</style></link> (with <link="dwarvenToolTech"><style="link">Dwarven Tools</style></link>)
<link="woodshield"><style="link">Wooden Shield</style></link>
<link="plankarmor"><style="link">Plank Armor</style></link>

<link="armory1"><style="link">Armorer's Shack</style></link>

Leads to:
<link="clothArmorTech"><style="link">Technology: Weaving</style></link> (with <link="spinningTech"><style="link">Technology: Spinning</style></link>)
<link="leatherArmorTech"><style="link">Technology: Leather Armor</style></link> (with <link="leatherTech"><style="link">Technology: Leather</style></link>)
<link="dwarvenArmorTech"><style="link">Technology: Armor-smithing</style></link> (with <link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link>)

<style="fluff">Several of the peoples of Siberia and North America have used wooden armor. We have no evidence that the ancient Finnic people did - \
but then again, organic materials survive so poorly in Finnish soil that it isn't very likely that any examples of wooden armor would have survived.\
"""

[spearthrowerTech]
display_name = "Technology: Spear-thrower"
treename = "Spear-thrower"
techLevel = "wood"
researchPointCost = 6
prerequisite = ["weaponsTech", "carpentryTech"]
treeCoord = "4,5"
description = """<style="fluff">\
"Let all joy forever vanish,
Let earth's pleasures quickly perish,
Disappear earth's sweetest music,
Happiness depart forever;
Shoot I will this rival minstrel,
Little heeding what the end is."

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem VI</style>

Your goblins have learned to make a spear-thrower.

Prerequisites: <link="weaponsTech"><style="link">Technology: Weapons</style></link>, <link="carpentryTech"><style="link">Technology: Carpentry</style></link>

Unlocks:
<link="woodtower"><style="link">Wooden Watchtower</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)

<link="spearthrower"><style="link">Spear-thrower</style></link>
<link="throwingspear"><style="link">Throwing spear</style></link>
<link="bonethrowingspear"><style="link">Bone-tipped Throwing Spear</style></link> (with <link="butcheryTech"><style="link">Technology: Butchery</style></link>)

<link="archeryTech"><style="link">Technology: Archery</style></link> (with <link="spinningTech"><style="link">Technology: Spinning</style></link>)\
"""

[clothArmorTech]
display_name = "Technology: Weaving"
treename = "Weaving"
techLevel = "wood"
researchPointCost = 8
prerequisite = ["spinningTech", "armorTech"]
treeCoord = "5,10"
description = """\
<style="fluff">The sisters were sorry to see the dawn of day, though they were no longer obliged to spin and weave, for the old woman was locked up in the kitchen, and could not interfere with them.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XIV: The Palace of Sarvik</style>

The goblins have discovered that thick cloth, cleverly woven, can serve as perfectly functional armor.

Prerequisites: <link="spinningTech"><style="link">Technology: Spinning</style></link>, <link="armorTech"><style="link">Technology: Wooden Armor</style></link>

Unlocks:
<link="clothArmor"><style="link">Cloth Armor</style></link>
<link="coarsecloth"><style="link">Coarse Cloth</style></link>
<link="finecloth"><style="link">Fine Cloth</style></link>

<link="weaving2"><style="link">Weaver's Shed</style></link>\
"""

[weaponsmithingTech]
display_name = "Technology: Weapon-smithing"
treename = "Weapon-smithing"
techLevel = "wood"
researchPointCost = 16
prerequisite = ["weaponsTech", "dwarvenToolTech"]
treeCoord = "7,8"
description = """<style="fluff">\
"O sword, sword! How horrible thou art! Thou art a terrible thing to have come among men. How many eyes shall look upon gardens no more because of thee?"

 - Lord Dunsany, the Sword of Welleran (1908)</style>

The goblins have developed their skills at cold-hammering dwarven metal, and can now make more advanced weapons.

Prerequisites: <link="weaponsTech"><style="link">Technology: Weapons</style></link>, <link="dwarvenToolTech"><style="link">Technology: Dwarven Tools</style></link>

Unlocks:
<link="dwsword"><style="link">Dwarven Short Sword</style></link>

<link="weaponmaker2"><style="link">Weaponer's Shed</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)

Leads to:
<link="dwarvenArmorTech"><style="link">Technology: Armor-smithing</style></link> (with <link="armorTech"><style="link">Technology: Wooden Armor</style></link>)
<link="ironWeaponTech"><style="link">Technology: Iron Weapons</style></link> (with <link="bogIronTech"><style="link">Technology: Bog Iron</style></link>)\
"""
#<link="dw_war_axe"><style="link">Dwarven War Axe</style></link>
#<link="dw_warhammer"><style="link">Dwarven Warhammer</style></link>

[leatherArmorTech]
display_name = "Technology: Leather Armor"
treename = "Leather Armor"
techLevel = "wood"
researchPointCost = 10
treeCoord = "4,9"
prerequisite = ["leatherTech", "armorTech"]
description = """<style="fluff">They warned him that he might not escape easily; but as he persisted, they directed him to the cavern, which he immediately entered, while the demons laughed, saying that the bear had fallen into the trap and the lion into the net, and that he was carrying his hide to market for nothing.

- the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XIII: The Kalevide’s First Journey to Hades</style>

The goblins have devised a method to harden leather to make sturdier armor.

Prerequisites: <link="leatherTech"><style="link">Technology: Leather</style></link>, <link="armorTech"><style="link">Technology: Wooden Armor</style></link>

Unlocks:
<link="rigidleatherarmor"><style="link">Rigid Leather Armor</style></link>\
"""

[archeryTech]
display_name = "Technology: Archery"
treename = "Archery"
techLevel = "wood"
researchPointCost = 10
prerequisite = ["spearthrowerTech", "spinningTech"]
treeCoord = "5,8.5"
description = """<style="fluff">\
Joukahainen thus made answer:
"I have made this mighty cross-bow,
Fashioned bow and poisoned arrows
For the death of Väinämöinen,
Thus to slay the friend of waters;
I must shoot the old magician."

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem VI</style>

The goblins have learned to craft bows and arrows.

Prerequisites: <link="spearthrowerTech"><style="link">Spear-thrower</style></link>, <link="spinningTech"><style="link">Spinning</style></link>

Unlocks:
<link="crudebow"><style="link">Crude Bow</style></link>
<link="woodenarrows"><style="link">Wooden Arrows</style></link>"""

[dwarvenArmorTech]
display_name = "Technology: Armor-smithing"
treename = "Armor-smithing"
techLevel = "wood"
researchPointCost = 16
prerequisite = ["weaponsmithingTech", "armorTech"]
treeCoord = "8,9"
description = """<style="fluff">And I thought a time, and the Maid with me; and afterward we gat that stump upon which I had leant, and had this to be for an anvil; and we found then smooth stones of different sizes, and these to be for hammers; and we wrought all that day, with restings, upon the armour; and surely, we beat it into a very good shape, from the inward, and the broken parts we beat smooth, so that they should not wound, and in the end to have mine armour fit to go upon me.

 - William Hope Hodgson, The Night Land</style>

The goblins have created a heavy suit of armor from <link="dwarvenTech"><style="link">dwarven metal</style></link>.

Prerequisites: <link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link>, <link="armorTech"><style="link">Technology: Wooden Armor</style></link>

Unlocks:
<link="armory2"><style="link">Armorsmith's Shed</style></link>

<link="dwcuirass"><style="link">Dwarven Cuirass</style></link>\
"""

[ironWeaponTech]
display_name = "Technology: Iron Weapons"
treename = "Iron Weapons"
prerequisite = ["bogIronTech", "weaponsmithingTech"]
techLevel = "stone"
researchPointCost = 16
treeCoord = "11,3"
description = """<style="fluff">\
Come thou to my room and furnace,
Where the fire is freely burning,
Thou wilt live, and grow, and prosper,
Wilt become the swords of heroes.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

The goblins have learned how to make iron weapons.

Prerequisites: <link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link>, <link="bogIronTech"><style="link">Technology: Bog Iron</style></link>

Unlocks:
<link="weaponmaker4"><style="link">Weaponsmith's Forge</style></link>

<link="ironsword"><style="link">Iron Broadsword</style></link>"""


[ironArmorTech]
display_name = "Technology: Iron Armor"
treename = "Iron Armor"
prerequisite = ["bogIronTech", "dwarvenArmorTech"]
techLevel = "stone"
researchPointCost = 16
treeCoord = "11,5"
description = """<style="fluff">\
Thus the hero, Kaukomieli,
Quick equips himself for warfare,
On his head a copper helmet,
On his shoulders caps of copper,
On his body iron armor,
Steel, the belt around his body.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XII</style>

The goblins can forge iron armor.

Prerequisites: <link="dwarvenArmorTech"><style="link">Technology: Armor-smithing</style></link>, <link="bogIronTech"><style="link">Technology: Bog Iron</style></link>

Unlocks:
<link="armory4"><style="link">Armorsmith's Forge</style></link>

<link="iron_cuirass"><style="link">Iron Cuirass</style></link>
<link="ironshield"><style="link">Iron Shield</style></link>"""

# 6.0 Food technologies

[butcheryTech]
display_name = "Technology: Butchery"
treename = "Butchery"
techLevel = "wood"
treeCoord = "1,10"
description = """\
<style="fluff">Everywhere they seek a butcher,
One to kill the ox of Suomi,
In the country of Karjala,
And among the Suomi-giants,
In the quiet fields of Estland,
On the battle-fields of Sweden,
Mid the mountaineers of Lapland,
In the magic fens of Turja;
Seek him in Tuoni's empire,
In the death-courts of Manala.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>

The goblins know how to butcher dead animals and make use of bones for various crafts.

Unlocked by: discovering an animal corpse or some <link="bones"><style="link">Bones</style></link>

Unlocks:
<link="butcher0"><style="link">Butcher's Block</style></link>

<link="bonefishingspear"><style="link">Bone Fishing Spear</style></link>
<link="bonespear"><style="link">Bone Spear</style></link> (with <link="weaponsTech"><style="link">Technology: Weapons</style></link>)

Leads to:
<link="fertilizerTech"><style="link">Technology: Fertilizer</style></link> (with <link="slashAndBurnTech"><style="link">Technology: Slash-and-burn Farming</style></link>)\
"""

[fishingTech]
display_name = "Technology: Fishing"
treename = "Fishing"
techLevel = "wood"
treeCoord = "1,2.5"
description = """<style="fluff">\
Straightway hastens Väinämöinen
To a boat-house on the sea-shore,
Looks with care upon the fish-hooks,
And the lines he well considers.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem V</style>

The goblins have learned to fish!

Unlocked by: building a <link="fishing1"><style="link">fisher-goblin's shack</style></link>

Unlocks:
<link="rawfish"><style="link">Fresh Fish</style></link>
<link="fishingspear"><style="link">Fishing Spear</style></link>
<link="fishingtrap"><style="link">Fishing Trap</style></link>

<link="fishingworkshop1"><style="link">Fishing Work-Shack</style></link>

Leads to:
<link="smokingTech"><style="link">Technology: Smoking</style></link>\
"""

[smokingTech]
display_name = "Technology: Smoking"
treename = "Smoking"
techLevel = "wood"
prerequisite = ["fishingTech"]
researchPointCost = 4
treeCoord = "2,3.5"
description = """<style="fluff">\
Quick the young lads from the village
Brought the fire upon the birch-bark,
Brought it on the tips of pine-wood;
And the fire and smoke commingled.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXI</style>

The goblins have discovered that smoking meat and fish preserves it for a longer time, and adds a certain something to the taste!

Prerequisites: <link="fishingTech"><style="link">Technology: Fishing</style></link>

Unlocks:
<link="smokedbird"><style="link">Smoked Bird Meat</style></link>
<link="smokedfish"><style="link">Smoked Fish</style></link>
<link="smokedwolf"><style="link">Smoked Wolf</style></link>

<link="smoker0"><style="link">Smoking Shack</style></link>

Leads to:
<link="bakingTech"><style="link">Technology: Baking</style></link> (with <link="farmingTech"><style="link">Technology: Farming</style></link>)
<link="charcoalTech"><style="link">Technology: Charcoal</style></link>\
"""

[bakingTech]
display_name = "Technology: Baking"
treename = "Baking"
techLevel = "wood"
prerequisite = ["farmingTech", "smokingTech"]
researchPointCost = 6
treeCoord = "6,2"
