[windmillsTech]
display_name = "Technology: Windmills"
treename = "Windmills"
prerequisite = ["bakingTech", "beamTech"]
researchPointCost = 12
techLevel = "wood"
treeCoord = "7,2"
description = """<style="fluff">\
And there was nothing in that town that was good for a soul to see. For it did not know that beauty was to be desired; so it made many things by machinery, and became hurried in all its ways, and boasted its superiority over other cities and became richer and richer, and there was none to pity it.

 - Lord Dunsany, the Kith of the Elf Folk (1908)</style>

The goblins have invented wind-powered machines.

Prerequisites: <link="bakingTech"><style="link">Technology: Baking</style></link>, <link="beamTech"><style="link">Technology: Beams</style></link>

Unlocks:
<link="mill3"><style="link">Windmill</style></link>"""

[burialTech]
display_name = "Technology: Burial"
treename = "Burial"
techLevel = "wood"
treeCoord = "2,2"
description = """\
<style="fluff">Tuonetar makes this answer:
"Ancient minstrel, Väinämöinen,
Tell me what has brought thee hither,
Brought thee to the, realm of Mana,
To the courts of Tuonela,
Ere Tuoni sent his angels
To thy home in Kalevala,
There to cut thy magic life-thread."

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XVI</style>

Sadly, a goblin has died. If their body can be recovered, their comrades can build a <link="grave0"><style="link">grave</style></link> to bury them in.

Unlocks:
<link="grave0"><style="link">Grave</style></link>\
"""

