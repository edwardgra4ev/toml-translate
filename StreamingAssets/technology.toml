# 4.0 metal technologies

[dwarvenTech]
display_name = "Technology: Dwarven Metal"
treename = "Dwarven Metal"
techLevel = "wood"
treeCoord = "5,7.5"
description = """\
<style="fluff">Now when they came to the smithy, Sindri laid a pigskin in the hearth and bade Brokkr blow, and did not cease work until he took out of the hearth that which he had laid therein.

- the Prose Edda, trans. Arthur Gilchrist Brodeur, Skáldskaparmál, XXXV</style>

Your goblins have discovered dwarven metal!

A substance from <link="birdhome><style="link">the far south</style></link>. Softer and more malleable than iron, dwarven metal can be cold-forged at a smithy and made into various weapons and tools.

Unlocked by: <link="dwtrinket"><style="link">Dwarven Trinket</style></link>

Unlocks:
<link="smithy0"><style="link">Smithy</style></link>

Leads to:
<link="dwarvenToolTech"><style="link">Technology: Dwarven Tools</style></link> (with <link="carpentryTech"><style="link">Technology: Carpentry</style></link>)\
"""

[dwarvenToolTech]
display_name = "Technology: Dwarven Tools"
treename = "Dwarven Tools"
prerequisite = ["dwarvenTech", "carpentryTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "6,7.5"
description = """\
<style="fluff">After that, Loki went to those dwarves who are called Ívaldi's Sons; and they made the hair, and Skídbladnir also, and the spear which became Odin's possession, and was called Gungnir.

- the Prose Edda, trans. Arthur Gilchrist Brodeur, Skáldskaparmál, XXXV</style>

Your goblins have understood how to make tools out of dwarven metal.

Prerequisites: <link="dwarvenTech"><style="link">Technology: Dwarven Metal</style></link>

Unlocks:
<link="dwaxe"><style="link">Dwarven Axe</style></link>
<link="dwbillhook"><style="link">Dwarven Billhook</style></link>
<link="dwdiggingbar"><style="link">Dwarven Digging Bar</style></link>
<link="dwhoe"><style="link">Dwarven Hoe</style></link>
<link="dwpick"><style="link">Dwarven Pick</style></link>
<link="dwshovel"><style="link">Dwarven Shovel</style></link>
<link="dwspear"><style="link">Dwarven Spear</style></link> (with <link="weaponsTech"><style="link">Technology: Weapons</style></link>)
<link="dwshield"><style="link">Dwarven Shield</style></link> (with <link="armorTech"><style="link">Technology: Wooden Armor</style></link>)

Leads to:
<link="clayfarmingTech"><style="link">Technology: Clay Farming</style></link> (with <link="farmingTech"><style="link">Technology: Farming</style></link>)
<link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link> (with <link="weaponsTech"><style="link">Technology: Weapons</style></link>)\
"""

[forgingTech]
display_name = "Technology: Forging"
treename = "Forging"
prerequisite = ["charcoalTech", "stoneConstructionTech"]
techLevel = "stone"
researchPointCost = 12
treeCoord = "9,4"
description = """<style="fluff">\
Found a hillock in the swamp-lands,
Where the iron hid abundant;
There he built his smelting furnace,
There he laid his leathern bellows.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

With charcoal and stone, the goblins can start forging metals.

Prerequisites: <link="stoneConstructionTech"><style="link">Technology: Stone Construction</style></link>, <link="charcoalTech"><style="link">Technology: Charcoal</style></link>

Unlocks:
<link="ironaxe"><style="link">Iron Axe</style></link>
<link="ironbillhook"><style="link">Iron Billhook</style></link>
<link="iron_digging_bar"><style="link">Iron Digging Bar</style></link>
<link="iron_hoe"><style="link">Iron Hoe</style></link>
<link="iron_pick"><style="link">Iron Pick</style></link>
<link="ironshovel"><style="link">Iron Shovel</style></link>
<link="wroughtiron"><style="link">Wrought Iron</style></link>

<link="smithy2"><style="link">Blacksmith's Shed</style></link>

Leads to:
<link="bogIronTech"><style="link">Technology: Bog Iron</style></link>"""

[bogIronTech]
display_name = "Technology: Bog Iron"
treename = "Bog Iron"
prerequisite = "forgingTech"
techLevel = "stone"
researchPointCost = 16
treeCoord = "10,4"
description = """<style="fluff">\
Thus is iron in the swamp-lands,
Stretching by the water-courses,
Hidden well for many ages,
Hidden in the birchen forests,
But he could not hide forever
From the searchings of his brother.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IX</style>

The goblins have learned how to search for bog iron and smelt it into a usable metal.

Prerequisites: <link="forgingTech"><style="link">Technology: Forging</style></link>

Unlocks:
<link="bogironore"><style="link">Bog Iron Ore</style></link>
<link="roastedbogironore"><style="link">Roasted Bog Iron Ore</style></link>
<link="wetbogiron"><style="link">Wet Bog Iron Ore</style></link>

<link="bog_iron_collector2"><style="link">Bog Iron Collector's Shed</style></link>
<link="oreroastingpit0"><style="link">Ore-roasting Pit</style></link>
<link="bloomery4"><style="link">Stone Bloomery</style></link>

Leads to:
<link="ironWeaponTech"><style="link">Technology: Iron Weapons</style></link> (with <link="weaponsmithingTech"><style="link">Technology: Weapon-smithing</style></link>)
<link="ironArmorTech"><style="link">Technology: Iron Armor</style></link> (with <link="dwarvenArmorTech"><style="link">Technology: Armor-smithing</style></link>)
"""

