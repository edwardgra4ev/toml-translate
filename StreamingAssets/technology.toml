[leatherTech]
display_name = "Technology: Leather"
treename = "Leather"
prerequisite = ["butcheryTech", "clayTech"]
researchPointCost = 4
techLevel = "wood"
treeCoord = "3,9"
description = """\
<style="fluff">On thy feet, put silken stockings,
With the shoes of finest leather;
Deck thy hair with golden braidlets,
Bind it well with threads of silver;
Trim with rings thy fairy fingers,
And thy hands with dainty ruffles;
Come bedecked then to thy chamber,
Thus return to this thy household.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IV</style>

Your camp has acquired an animal pelt that can be tanned for leather.

Unlocks:
<link="curedhide"><style="link">Cured Hide</style></link>
<link="leatherjerkin"><style="link">Leather Jerkin</style></link>
<link="rawleather"><style="link">Raw Leather</style></link>

<link="curing0"><style="link">Curing Workshop</style></link>
<link="leatherworker1"><style="link">Leather-worker's Shack</style></link>
<link="tanner0"><style="link">Tanning Vats</style></link>

Leads to:
<link="leatherArmorTech"><style="link">Technology: Leather Armor</style></link> (with <link="armorTech"><style="link">Technology: Wooden Armor</style></link>)\
"""

[spinningTech]
display_name = "Technology: Spinning"
treename = "Spinning"
prerequisite = ["carpentryTech", "clayTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "2,8"
description = """\
<style="fluff">Inside he could hear maidens spinning and singing, lamenting the happiness of their former lives, and hoping that some deliverer might appear.

- the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XIII: The Kalevide’s First Journey to Hades</style>

Many plant fibers can be spun into durable strings, for everything from fishing nets to bowstrings.

Prerequisites: <link="carpentryTech"><style="link">Technology: Carpentry</style></link>, <link="clayTech"><style="link">Technology: Pottery</style></link>

Unlocks:
<link="rope"><style="link">Rope</style></link>
<link="coarsefiber"><style="link">Coarse Fiber</style></link>
<link="coarsethread"><style="link">Coarse Thread</style></link>
<link="finefiber"><style="link">Fine Fiber</style></link>
<link="finethread"><style="link">Fine Thread</style></link>

<link="retting0"><style="link">Retting Yard</style></link>  (with <link="clayTech"><style="link">Technology: Pottery</style></link>)
<link="ropemaking1"><style="link">Rope-maker's Shack</style></link>
<link="spinning2"><style="link">Spinner's Shed</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)

Leads to:
<link="archeryTech"><style="link">Technology: Archery</style></link> (with <link="spearthrowerTech"><style="link">Technology: Spear-thrower</style></link>)
<link="clothArmorTech"><style="link">Technology: Weaving</style></link>\
"""

