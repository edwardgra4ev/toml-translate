# 7.0 Farming technologies

[farmingTech]
display_name = "Technology: Farming"
treename = "Farming"
techLevel = "wood"
treeCoord = "5,4"
description = """\
<style="fluff">Let the verdant stalks be rising,
Let the ears themselves be growing,
And a hundredfold producing,
From my plowing and my sowing.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>

The goblins have discovered farming, and now know how to plant crops!

Farming consumes <link="fertility"><style="link">soil fertility</style></link> and transforms it into crops. Once the fertility runs out, the farm plot won't produce anything.

Unlocked by: discovering seeds.

Unlocks:
<link="farmplot"><style="link">Farm Plot</style></link>
<link="nettleprocessor0"><style="link">Nettle Yard</style></link>
<link="turniphole"><style="link">Turnip Hole</style></link>
<link="thresher1"><style="link">Threshing Shack</style></link>

Leads to:
<link="improved_farming_tech"><style="link">Technology: Improved Farming</style></link>
<link="slashAndBurnTech"><style="link">Technology: Slash-and-burn Farming</style></link>
<link="bakingTech"><style="link">Technology: Baking</style></link> (with <link="smokingTech"><style="link">Technology: Smoking</style></link>)
<link="clayfarmingTech"><style="link">Technology: Clay Farming</style></link> (with <link="dwarvenTech"><style="link">Technology: Dwarven Metal</style></link>)\
"""
# <link="mushroomTech"><style="link">Technology: Mushroom Farming</style></link>

[slashAndBurnTech]
display_name = "Technology: Slash-and-burn Farming"
treename = "Slash-and-burn Farming"
prerequisite = ["farmingTech"]
techLevel = "wood"
researchPointCost = 6
treeCoord = "6,3.5"
description = """\
<style="fluff>Quickly then this bird of heaven,
Kindled fire among the branches;
Soon the flames are fanned by north-winds,
And the east-winds lend their forces,
Burn the trees of all descriptions,
Burn them all to dust and ashes,
Only is the birch left standing.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem II</style>

Your goblins have learned to use <link="ashes"><style="link">ashes</style></link> to increase the <link="fertility"><style="link">fertility</style></link> \
of <link="farming"><style="link">farm plots</style></link>.

Prerequisites: <link="farmingTech"><style="link">Technology: Farming</style></link>

Unlocks:
<link="slashandburn"><style="link">Slash and Burn Plot</style></link>

Leads to:
<link="fertilizerTech"><style="link">Technology: Fertilizer</style></link> (with <link="butcheryTech"><style="link">Technology: Butchery</style></link>)"""

