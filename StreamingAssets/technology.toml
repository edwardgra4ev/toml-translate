[fertilizerTech]
display_name = "Technology: Fertilizer"
treename = "Fertilizer"
prerequisite = ["slashAndBurnTech", "butcheryTech"]
techLevel = "wood"
treeCoord = "7,3.5"
researchPointCost = 20
description = """\
<style="fluff">And we told them certain ways by which they might bring a more speedy life to the soil; and this they were eager to do, being freshly alive after so long a time of half-life.

- William Hope Hodgson, The Night Land</style>

The goblins understand that organic matter, even waste, can be used to restore <link="fertility"><style="link">fertility</style></link> to the soil.

Technology: Fertilizer unlocks the <link="muckingdef"><style="link">mucking phase</style></link> in farming, and the option to leave a farm plot <link="fallowdef"><style="link">fallow</style></link>.

Prerequisites: <link="slashAndBurnTech"><style="link">Technology: Slash-and-burn Farming</style></link>, <link="butcheryTech"><style="link">Technology: Butchery</style></link>

Unlocks:
<link="bonemeal"><style="link">Bone Meal</style></link>
<link="woodchips"><style="link">Midden</style></link>

<link="midden"><style="link">Midden</style></link>"""

[clayfarmingTech]
display_name = "Technology: Clay Farming"
treename = "Clay Farming"
prerequisite = ["farmingTech", "dwarvenToolTech"]
techLevel = "wood"
treeCoord = "7,4.5"
researchPointCost = 10
description = """<style="fluff">It was the duty of the new king both to plough the country and to defend it, and he therefore set to work with his sword by his side. Early and late he ploughed, stocking the country with corn, grass, trees, and berries.

- the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto VIII: The Contest and Parting of the Brothers</style>

Now that they have access to metal digging tools, the goblins can farm on <link="claysoil"><style="link">clay soils</style></link>.

Prerequisites: <link="farmingTech"><style="link">Technology: Farming</style></link>, <link="dwarvenToolTech"><style="link">Technology: Dwarven Tools</style></link>

Unlocks:
<link="clayfarmplot"><style="link">Heavy Farm Plot</style></link>"""

