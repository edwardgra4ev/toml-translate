prerequisite = ["farmingTech"]
techLevel = "wood"
treeCoord = "6,5"
researchPointCost = 10
description = """The goblins have learned to farm more efficiently: harvesting and sowing seeds now take considerably less time.

Prerequisites: <link="farmingTech"><style="link">Technology: Farming</style></link>

Unlocks:
<link="campbonus_def"><style="link">Camp Bonus</style></link>: <link="improved_sowing_def""><style="link">Improved Sowing</style></link>
<link="campbonus_def"><style="link">Camp Bonus</style></link>: <link="improved_harvesting_def""><style="link">Improved Harvesting</style></link>"""

