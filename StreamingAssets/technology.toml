[charcoalTech]
display_name = "Technology: Charcoal"
treename = "Charcoal"
prerequisite = ["smokingTech"]
researchPointCost = 12
techLevel = "wood"
treeCoord = "8,3"
description = """\
<style="fluff">The demons attempt unceasingly to soften their chains by heaping up charcoal faggots around them, but when the cock crows at dawn their fetters grow thicker again.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XX: Armageddon</style>

As they burn wood, the goblins have discovered that sometimes wood chars into a whole new substance, which burns much hotter: charcoal.

Prerequisites: <link="smokingTech"><style="link">Technology: Smoking</style></link>

Unlocks:
<link="charcoal"><style="link">Charcoal</style></link>

<link="charcoal_clamp><style="link">Charcoal Clamp</style></link>

Leads to:
<link="forgingTech"><style="link">Technology: Forging</style></link> (with <link="stoneConstructionTech"><style="link">Technology: Stone Construction</style></link>)"""

