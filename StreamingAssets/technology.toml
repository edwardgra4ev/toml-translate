[stoneFortTech]
display_name = "Technology: Stone Fortifications"
treename = "Stone Fortifications"
prerequisite = "stoneConstructionTech"
techLevel = "stone"
researchPointCost = 12
treeCoord = "9,6"
description = """<style="fluff">Olev had now built a magnificent city, fortified with towers and ditches, around the burial-mound of Kalev. Large numbers of people flocked to it, and the Kalevide named it Lindanisa, in memory of his mother.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XVII: The Heroes and the Dwarf</style>

The goblins have developed military engineering in stone.

Prerequisites: <link="stoneConstructionTech"><style="link">Technology: Stone Construction</style></link>

Unlocks:
<link="stonewall"><style="link">Drystone Wall</style></link>"""

