# 1.0 Events
#  1.1 Early game fixed events


# 1.1 Early game fixed events

[firstfallgoblins]
type = "spawn"
timing = "fixed"
logtext = "Some more refugees from the underworld have joined your camp!"
year = 2
month = 1
spawns = [
    { creature = "goblin", amount = "2-4", location = "gateway" },
]

# 1.2 Annual events

[spring_flood_event]
type = "flood"
timing = "annual"
logtext = "A distant rumble of water is heard in the camp."
probability = 0.95
duration = 1
month = 7

[fallcranemigration]
description = "Cranes migrating south for the winter."
type = "spawn"
timing = "annual"
start_year = 3
probability = 0.8
season = "fall"
repeats = "no"
spawns = [
    { creature = "crane", status = "migratory", amount = "4-8", location = "north" },
]

[springcranemigration]
description = "Cranes returning from their war with the dwarves in the south."
type = "spawn"
timing = "annual"
start_year = 2
probability = 0.8
season = "spring"
repeats = "no"
spawns = [
    { creature = "crane", status = ["migratory", "ravenous", "enemy"], amount = "3-5", location = "south" },
]

