# 1.0 Shaman spells

#  1.1 Starting shaman spells

[summoncentraltree]
display_name = "Summon Sacrificial Tree"
keyword = "oneTime"
effect = "summoncentraltree"
vaki_cost = 2
experience = 5
unlockedBy = "shamanismTech"
description = """<style="fluff">\
Thither I have taken Otso,
To the summit of the Gold-hill,
To the copper-bearing mountain,
Laid him in his silken cradle
In the summit of a pine-tree,
Where the winds and sacred branches
Rock him to his lasting slumber.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XLVI</style>

The shaman summons and blesses a <link="sac_tree_def"><style="link">sacrificial tree</style></link> for the camp.

The sacrificial tree is the ceremonial center of a goblin camp, and of goblin <link="culturedef"><style="link">culture</style></link>. It generates <link="researchpoints"><style="link">research points</style></link> and <link="vaki_def"><style="link">väki</style></link>.

As goblins make <link="sacrifice_def"><style="link">sacrifices</style></link> to the spirits, the tree levels up and the bonuses it grants to the camp increase."""

[summongoblins]
display_name = "Summon Goblins"
keyword = "summon"
effect = "goblinsummon"
vaki_cost = 10
experience = 10
unlockedBy = "shamanismTech"
description = """\
<style="fluff">Next morning the Kalevide rose at daybreak and looked about him. Where the dwarf had vanished in blue smoke, he now beheld a sheet of blue water with rushes on the bank, and knew that he had unexpectedly chanced upon the entrance to Põrgu. His wearied comrades were still sleeping, and, without disturbing them, he stamped with his right foot, and the hidden strongly-guarded doors of Hades flew open.

- the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XVIII: The Kalevide’s Journey to Põrgu</style>

The shaman calls to the <link="underworld_fluff"><style="link">underworld</style></link>, summoning more goblins to <link="population_def"><style="link">join the camp</style></link>."""

# 1.2 Spirit spells

[conscript_spirits_01]
display_name = "Conscript Spirits 1"
effect = "spirits"
spirit_max = 10
vaki_cost = 3
experience = 4
unlockedBy = "spirit_law"
description = """<style="fluff">A daughter-in-law was once brought to a house, and she was so strong that she could mow an entire field in a day, no matter how big it was. The people in the house marveled at this, and eventually couldn't resist spying on the daughter-in-law. They saw her sitting on a rock and combing her hair. They heard someone in the field saying "You tie, I'll cut". The grain fell with a swish, but no-one could be seen.

Sääminki, 1937. <style="link"><link="fls">SKS archives</link></style>.</style>

The shaman compels up to ten <link="spiritdef"><style="link">spirits</style></link> to haul and carry items in the camp. The spirits will work for a month."""

[conscript_spirits_02]
display_name = "Conscript Spirits 2"
effect = "spirits"
spirit_max = 20
vaki_cost = 6
experience = 8
unlockedBy = "spirit_law"
description = """<style="fluff">\
There was a farmhand in a house. He was sent out on week-work to cut wood for a tar kiln. He laid down at the forest sauna for the whole week, and didn't do anything. On Saturday he got one load of wood and said: "let logs haul logs". Soon logs started showing up at the kiln one after another, and when men went to chop them up on Monday, all the wood was laid out at the kiln.

Teuva, 1889. <style="link"><link="fls">SKS archives</link></style>.</style>

The shaman compels up to twenty <link="spiritdef"><style="link">spirits</style></link> to haul and carry items in the camp. The spirits will work for a month."""

