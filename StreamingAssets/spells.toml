# 2.0 Wind spells

[changewindspell]
display_name = "Change Wind"
vaki_cost = 1
experience = 2
unlockedBy = "windlaw"
description = """<style="fluff">Then the sailor spake as follows,
These the words of Lemminkäinen:
"Blow, ye winds, and drive me onward,
Blow ye steady, winds of heaven.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXIX</style>

The shaman calls on the spirits to change the direction the wind is blowing.

<style="fluff">The power to change the wind was a magical power all Finns were believed to possess.

"The cook stated the matter to him, and John, as I anticipated, sided with the cook, and said that he himself had been in a ship where they had a head wind for a fortnight, and the captain found out at last that one of the men, whom he had had some hard words with a short time before, was a Fin, and immediately told him if he didn’t stop the head wind he would shut him down in the fore peak. The Fin would not give in, and the captain shut him down in the fore peak, and would not give him anything to eat. The Fin held out for a day and a half, when he could not stand it any longer, and did something or other which brought the wind round again, and they let him up.

“There,” said the cook, “what you think o’ dat?”

I told him I had not doubt it was true, and that it would have been odd if the wind had not changed in fifteen days, Fin or no Fin.

“Oh,” says he, “go ‘way! You think, ‘cause you been to college, you know better than anybody. You know better than them as has see it with their own eyes. You wait till you’ve been to sea as long as I have, and you’ll know.”"

 - Richard Henry Dana Jr., Two Years Before the Mast (1840)</style>"""

[summonwindhead]
display_name = "Summon Wind-head"
effect = "windhead"
vaki_cost = 5
experience = 6
unlockedBy = "windlaw"
description = """\
<style="fluff">"Turn, O man-of-war, from Pohja,
Turn thy back upon the strangers,
Turn thou to my distant country!
Rock, O winds, my magic vessel,
Homeward drive my ship, O billows,
Lend the rowers your assistance,
Give the oarsmen easy labor,
On this vast expanse of waters!"

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem IV</style>

The shaman summons a whirlwind. \
The whirlwind will be cast at a target tile or enemy, and will seek out other enemies in the vicinity. \
It will then travel with the wind until dissipating.
"""

