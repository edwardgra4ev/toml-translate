[sprucesapling]
display_name = "Spruce Sapling"
keyword = ["sapling", "spruce", "prefersSand", "prefersDark", "spawn", "perennial"]
produces = ["branch", "branch"]
condition = 10
fireResist = 1
burned = "ashes"
grows = "youngspruce"
growthTime = 120
latinName = "spruce spruce"
description = """\
<style="fluff">Greeting bring I to the mountains,
Greeting to the vales and uplands,
Greet ye, heights with forests covered,
Greet ye, ever-verdant fir-trees.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XIV</style>

This sapling will grow into a <link="youngspruce"><style="link">young spruce</style></link> tree. \
Spruce trees <link="florapreferences"><style="link">prefer</style></link> <link="shade"><style="link">shade</style></link> and <link="sandsoil"><style="link">sandy soils</style></link>.

