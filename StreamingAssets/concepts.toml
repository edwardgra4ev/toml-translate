description = "A creature's proficiency at ranged attacks."

[willpowerDef]
display_name = "Willpower"
description = """A goblin's willpower is a measure of their mental fortitude when faced with adversity. Willpower is the basis of <link="moraledef"><style="link">Morale</style></link>."""

[speedDef]
display_name = "Speed"
description = """The rate at which this creature moves.

If a lot of traffic passes over a tile, it will degenerate into <link="mud"><style="link">mud</style></link> that slows movement.\
"""

[work_speed_def]
display_name = "Working Speed"
description = """\
<b>Working Speed</b> is the rate at which this creature completes tasks. The default Working Speed of a goblin is 1.0.\
"""

