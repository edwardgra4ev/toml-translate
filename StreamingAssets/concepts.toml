[food_number]
display_name = "Food Points"
description = """This number shows how many months of <link="foodpoint"><style="link">food</style></link> your camp has. \
Food can be acquired from various <link="food_sources"><style="link">sources</style></link>."""

[food_tooltip_line_1]
description = "Food required per year:"

[food_tooltip_line_2]
description = "Theoretical max production:"

[food_tooltip_line_3]
description = "Food point balance:"

[food_tooltip_line_4]
description = "Months of food stored:"

[kitchendef]
display_name = "Kitchens"
description = """Goblins are gregarious creatures and like to eat together at kitchens at the end of every season. \
Kitchens are structures where cook-goblins will prepare <link="foodpoint"><style="link">food</style></link> for a total number of camp inhabitants equal to the kitchen's capacity. \
Each goblin will be assigned a kitchen to eat at if there is capacity.

The cook-goblin will try to make sure that the meal includes all required <link="nutrientdef"><style="link">nutrients</style></link>. The meal will also always include something to drink.

If a goblin doesn't have a kitchen to eat at, they'll eat food they find in the camp. If they can't find any food, they'll go hungry, and eventually leave the camp."""

[kitchen_tooltip_line_1]
description = "Population"

[kitchen_tooltip_line_2]
description = "Kitchen seating:"

[jobsnumber]
display_name = "Jobs"
description = """\
Goblins are conscientious creatures, and will try to do all the jobs they've been assigned. \
Be careful not to let them get swamped with too many jobs!\
"""

[jobs_tooltip_line_1]
description = "Total jobs:"

[jobs_tooltip_line_2]
description = "Goblins:"

[jobs_tooltip_line_3]
description = "Jobs per goblin:"

[population_number]
display_name = "Population and Housing"
description = """This number shows the total <link="population_def"><style="link">population</style></link> of your camp, and how much <link="houses"><style="link">housing</style></link> you have built."""

[population_tooltip_line_1]
description = "Population:"

[population_tooltip_line_2]
description = "Housing requirement:"

[population_tooltip_line_3]
description = "Housing provided:"

[researchpoints]
display_name = "Research Points"
description = """Research points can be invested to learn new technologies in the technology tree. \
The camp generates research points, and they can also be accumulated by discovering certain items or summoning the <link="sac_tree_def"><style="link">sacrificial tree</style></link>."""

[research_tooltip_line_1]
description = "Research points:"

[research_tooltip_line_2]
description = "Points per season:"

[research_tooltip_line_3]
description = "Points per year from Sacrificial Tree:"

[vaki_def]
display_name = "Väki"
description = """Väki is the magical energy used by the shaman to cast spells. \
The camp generates a certain amount of väki, and this can be increased by summoning and leveling up the <link="sac_tree_def"><style="link">sacrificial tree</style></link>. Väki is capped at 20."""

[vaki_tooltip_line_1]
description = "Väki:"

[vaki_tooltip_line_2]
description = "Väki per month:"

[vaki_tooltip_line_3]
description = "Väki per year from Sacrificial Tree:"

[spiritdef]
display_name = "Spirits"
description = """In ancient Finnish culture, all living things had spirits. When felling a tree, for example, it was important to warn the tree-spirit so it could leave before the tree was cut down. \
<link="shaman_def"><style="link">Shamans</style></link> use spirits to work their magic.

There are usually up to 20 spirits passing through the area of the camp. Spirits released from felled trees or slain enemies increase this total."""

[spirit_tooltip_line_1]
description = "Unspent spirits:"

[campmoraledef]
display_name = "Camp Morale"
description = """The camp's total <link="moraledef"><style="link">morale</style></link> is the average morale of all of its inhabitants."""

# 2.3 Stock Manager

[target_column]
display_name = "Target"
description = """The target number is the number of items you want to have in your camp at all times. If the current number of items is less than this number, your goblins will do their best to produce more."""

[reserved_column]
display_name = "Reserved"
description = """The reserved number is the number of items that should be kept in storage and not used for further crafting. Goblins will not produce items to meet the reserve, \
only the <style="link"><link="target_column">target</link></style> triggers production. Reserved items will be eaten and used for sacrifices."""

