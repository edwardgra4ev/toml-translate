description = """Agility represents a creature's ability to dodge attacks and stay upright in challenging conditions."""

[carrying_capacity_def]
display_name = "Carrying Capacity"
description = """Each creature has a carrying capacity that defines how much weight it can carry. A goblin can usually carry up to one unit of weight. Heavier items can be moved by <link="hauling"><style="link">hauling</style></link>."""

[constitutionDef]
display_name = "Constitution"
description = """Constitution is a measure of how hardy a creature is. Creatures with a high Constitution are less likely to be stunned by attacks or catch diseases."""

[fight_damage_mod_def]
