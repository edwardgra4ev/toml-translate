# Fluff

[birdhome]
display_name = "Bird-home"
description = """\
<style="fluff">Bird-home was said to be in the warm lands, where the birds migrate in the autumn. (...) A person from Bird-home was once seen in Oulu: they were so small, they couldn't reach a man's knee to hit it, but looked like they had a beard.

Pudasjärvi. <style="link"><link="fls">SKS archives</link></style>.</style>


Like many Siberian peoples, the ancestors of the Finns believed that the earth was flat and the sky curved over it like a tent. \
The North Star was the highest point of the sky, so therefore the further south you went, the lower the sky would get, until it eventually met the ground. \
It therefore stood to reason that in the far south, people have to be <link="dwarves"><style="link">very short</style></link>, because the sky is so close.\

Migratory birds were seen flying south for the winter, and Finns still call the Milky Way the bird-track. \
It was believed that the birds spent the summer in the far south, so they called it lintukoto, the bird-home. \
Finns believed that while the birds were there, they would fight the dwarves of Bird-home for food. \
For some reason, cranes and dwarves were believed to have a special hatred for each other. \
This is why cranes will sometimes drop <link="dwtrinket"><style="link">dwarven trinkets</style></link> when they return from the south.\
"""

[dwarves]
display_name = "Dwarves"
description = """\
<style="fluff">According to the folk tale, the people of Bird-home were very small dwarves. The story doesn't recall where they were originally from, but Finns who used to drive freight to St. Petersburg said they had seen dwarves from Bird-home there.

- Sortavala. <style="link"><link="fls">SKS archives</link></style>.</style>

The diminutive natives of <link="birdhome"><style="link">Bird-home</style></link>, dwarves travel all over the world. \
They are known for their <link="dwarvenTech"><style="link">metalwork</style></link> and their love of alcohol.\
"""

[fls]
display_name = "Finnish Literature Society SKS"
description = """\
<style="fluff">Shall I bring these songs together
From the cold and frost collect them?
Shall I bring this nest of boxes,
Keepers of these golden legends,
To the table in my cabin,
Underneath the painted rafters,
In this house renowned and ancient?

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), proem</style>

The Finnish Literature Society SKS is a cultural organization founded in 1831 to collect and record Finnish heritage, and promote Finnish culture and literature. \
SKS maintains extensive archives on Finnish folk and oral culture that go back to Elias Lönnrot's original work that led to the <style="link"><link="kalevala">Kalevala</link></style>.

The quotes from SKS materials in the game are from the belief legend collection, used with permission from the Finnish Literature Society. The material has been gathered from all over Finland over the 19th and 20th centuries. \
The texts have been translated and adapted by Michael Halila, Korppi Games.\
"""

[grimm]
display_name = "Grimm's Fairy Tales"
description = """A collection of German folk tales published by the brothers Jacob and Wilhelm Grimm from 1812 onwards, a likely inspiration for the <style="link"><link="kalevala">Kalevala</link></style>."""

[kalevala]
display_name = "Kalevala"
description = """\
<style="fluff">Mastered by desire impulsive,
By a mighty inward urging,
I am ready now for singing,
Ready to begin the chanting.

 - the Kalevala, trans. John Martin Crawford (1888), proem</style>

The Finnish national epic, created by Elias Lönnrot (1802-1884) based on traditional Finnish and Karelian poetry. \
Lönnrot heavily edited the oral poetry to create a unified Christian-nationalist epic of his own design.

The quotes from the Kalevala in Goblin Camp are from the 1888 translation into English, via German, by John Martin Crawford. The spelling of the names has been restored to the proper Finnish form.\
"""

[kalevipoeg]
display_name = "Kalevipoeg"
description = """The Estonian national epic, created by Friedrich Reinhold Kreutzwald (1803-1882). Kreutzwald graduated from Tarto University's faculty of medicine in 1833, and took an interest in Estonian folklore. \
Inspired by the publication of the <link="kalevala"><style="link">Kalevala</style></link> in 1835, he started working on an epic poem based on Estonian folk tales. \
This became the Kalevipoeg, the Son of Kalev, published in 1853 but banned by Russian censors. It tells of the adventures of a powerful giant, Sohni, the son of Kalev, in Estonia, Finland and abroad.

The quotes from the Kalevipoeg in Goblin Camp are from W.F. Kirby's 1894 prose translation into English."""

[underworld_fluff]
display_name = "The Underworld"
description = """The underworld is the home of the goblins.

<style="fluff">The underworld in Finnic mythology is a different, darker place that is home to spirits and creatures like goblins. \
It isn't an evil place, but a similar environment to the middle world."""

# Loading screen texts

[loading1]
description = """\
In primeval times, a maiden,
Beauteous Daughter of the Ether,
Passed for ages her existence
In the great expanse of heaven,
O'er the prairies yet enfolded.\
"""

[loading2]
description = """Seven hundred years she wandered,
Ages nine of man's existence,
Swam the ocean hither, thither,
Could not rise above the waters."""

[loading3]
description = """Where her hand she turned in water,
There arose a fertile hillock;
Wheresoe'er her foot she rested,
There she made a hole for fishes."""

[loading4]
description = """Where her head was pointed landward,
There appeared wide bays and inlets;
When from shore she swam a distance,
And upon her back she rested,
There the rocks she made and fashioned."""

[loading5]
description = """Then arose old Väinämöinen,
With his feet upon the island,
On the island washed by ocean,
Broad expanse devoid of verdure."""

[loading6]
description = """Who for him should sow the island,
Who for him the seeds should scatter;
Thought at last of Pellervoinen,
First-born of the plains and prairies."""

[loading7]
description = """Who the forest seeds should scatter.
Pellervoinen, thus consenting,
Sows with diligence the island,
Seeds upon the lands he scatters."""

[loading8]
description = """Soon the fertile seeds were sprouting,
Soon the forest trees were growing,
Soon appeared the tops of fir-trees,
And the pines were far outspreading."""

[loading9]
description = """Now the hero, Väinämöinen,
Stands aloft to look about him,
How the Sampsa-seeds are growing,
How the crop of Pellervoinen;
Sees the young trees thickly spreading,
Sees the forest rise in beauty;"""

# Tutorials

[first_tutorial]
display_name = "Welcome to Goblin Camp!"
description = """\
One of your most important tasks is to keep your goblins <link="food_sources"><style="link">fed</style></link>. If they get too hungry, they'll leave!

The number at the top left of your screen tells you how many months you currently have food supplies for. If there's a red indicator next to it, then you're probably not producing enough food to keep your goblins fed!

Goblins will eat by themselves, but they like to eat at <link="kitchendef"><style="link">kitchens</style></link>. Once you've got some food, it's a good idea to build a kitchen.

Note that in order to build a structure, you don't need to acquire the materials beforehand. Just select the structure, build it, and the goblins will get what they need.

The notification spheres at the top of the screen contain important information for you. Take a look at them to get started getting your goblins something to eat.
"""

[second_tutorial]
display_name = "Storage and the Stock Manager"
description = """\
As your goblins find useful things in the new world, they'll be listed in the Stock Manager.

You can also use the Stock Manager to set targets for items. For example, if you've found some <link="mushroom"><style="link">mushrooms</style></link>, you can set a target number for mushrooms in the Stock Manager, and your goblins will try to see that you have at least that many mushrooms at all times.

Goblins are clever creatures (well, sometimes), and can figure out how to make things. So you don't need to set stock manager targets for components. For example, if you want your goblins to build <link="stoneaxe"><style="link">stone axes</style></link>, you don't need to set a target for <link="branch"><style="link">branches</style></link>. The goblins will understand that they need to get branches and do it.

If items are left lying around, they'll decay and eventually be destroyed. To avoid that, your goblins will need places to <link="storage"><style="link">store</style></link> items. Properly stored items will decay slower, or not at all. Items can be stored in storehouses or stockpiles.

If you click on an item, the Claim button means the goblins will use it and store it appropriately. The Ignore button means they'll leave it there.\
"""

[defence_tutorial]
display_name = "Defending Your Camp"
description = """\
This new world can be a dangerous place, and you should think about defending your camp from enemies.

Two kinds of defences are available at the start of the game: fortifications and guard buildings. Fortifications can slow enemies down and make it harder for them to get at your goblins or your buildings. You can also dig defensive ditches, even moats, to protect your camp.

Usually, though, you'll need guards to protect your camp. Goblins can automatically be drafted into temporary guard duty. You can adjust how many goblins are drafted in the Jobs window. Drafted goblins will activate when enemies are near, and equip themselves with the nearest improvised weapon. They won't use shields or armor.

You can assign goblins as full-time guards by building a guard building. Selecting the guard building lets you decide how the goblin guard is equipped. Guards will fight enemies who attack your camp.

When building guard buildings, be mindful that not too many goblins are on guard duty or otherwise not engaged in working in the camp, or jobs will pile up quickly.\
"""

[jobs_tutorial]
display_name = "Jobs"
description = """\
Your goblins have lots of jobs to do!

When you tell your goblins to do something, like building a structure or cutting down a tree, they get a job. Cutting down a tree is one job, but building a building is many jobs: preparing the ground, getting the materials, bringing them to the building site, and so on.

You can see how many unfinished jobs your goblins have by looking at the jobs number in the upper bar. It shows the number of outstanding jobs per goblin. If the number is green, there aren't a lot of jobs; when it turns yellow, there are several jobs per goblin. Orange and red mean a lot of jobs.

You can see what jobs are outstanding by clicking the Jobs button on the bottom of the screen. It will show a listing of all the jobs, as well as a button where you can change job priorities. Jobs that are greyed out can't be done right now; they need a tool or a component, or some other job needs to be completed before they can be done.

Be careful to not assign too many jobs to your goblins! If the jobs number is very high, give the goblins a moment to clear their backlog, or things won't get done.
"""

[mud_tutorial]
display_name = "Mud"
description = """Mud has appeared in your camp!

When goblins walk over a tile, it becomes worn. When a tile becomes worn enough, it turns into <link="mud"><style="link">mud</style></link>. Mud slows movement quite a lot!

To make it easier for your goblins to move around the camp, consider covering mud tiles with roadways, for example <link="duckboard"><style="link">duckboards</style></link>."""

[basic_tools_tutorial]
display_name = "Basic Tools"
description = """To keep your camp running, it's a good idea to open the <link="second_tutorial"><style="link">stock manager</style></link> and order up some <link="basictoolsdef"><style="link">basic tools</style></link>.

<link="stoneaxe"><style="link">Stone axes</style></link> are needed to cut down trees and chop firewood. \
<link="diggingstick"><style="link">Digging sticks</style></link> are used for changing the ground level and removing tree stumps. \
<link="claypot"><style="link">Clay pots</style></link> are your first available buckets for putting out fires.

If you order these tools in the stock manager, the goblins will build them, or notifications will appear telling you what you need to get them built.\
"""

[ruins_tutorial]
display_name = "Ruins"
description = """Your goblins have caught a glimpse of some overgrown ruins in the forest.

You can find interesting and useful things in ruins, but be careful! The ruins are likely to be deep in the <link="forestcover"><style="link">forest-cover</style></link>. The forest-cover looks like fog on the map, and if you order your goblins into it, they'll get lost.

Forest-cover can be cleared by cutting down trees and bushes, or by building <link="ravenstatue"><style="link">raven statues</style></link>.

There are also more ruins on the map beyond the first ones, and they all contain items worth discovering.
"""

[sacrifice_tutorial]
display_name = "Sacrifices"
description = """Each summer, the goblins make <link="sacrifice_def"><style="link">sacrifices</style></link> to the Keepers of the <link="woodskeepers"><style="link">forest</style></link> and the <link="waterskeepers"><style="link">river</style></link>.

To make sacrifices, build a <link="bonfire"><style="link">bonfire</style></link>. In Early Summer, you'll be presented with the Sacrifice Manager, where you choose what to sacrifice. The goblins will then take the sacrificial items to the bonfire, and when Midsummer comes, light it. \
The sacrificial items you need are determined by which structures you've built. For example, for each <link="fishing1"><style="link">fisher-goblin's shack</style></link> you build, the water-keepers will expect one <link="ceremonialfish"><style="link">ceremonial fish</style></link> as a sacrifice. \
Sacrificial items can be ordered in the <link="second_tutorial"><style="link">stock manager</style></link> just like any other items.

Sacrifices provide <link="culturedef"><style="link">culture points</style></link> and level up the <link="sac_tree_def"><style="link">sacrificial tree</style></link>. \
You don't have to make any sacrifices, but beware: the spirits will be angry!"""

[tech_tutorial]
display_name = "Technology"
description = """You now have enough <link="researchpoints"><style="link">research points</style></link> to discover a new technology! Technologies unlock new items and structures, and pathways to new technologies.

The technology button at the bottom of the screen opens the tech tree. There are two kinds of technologies in the tree. Some can be unlocked with research points, and some by discovering an item or experiencing an event in the game.

Research points accumulate each season. You can get more research points by summoning the <link="sac_tree_def"><style="link">sacrificial tree</style></link> and making <link="sacrifice_def"><style="link">sacrifices</style></link> to level it up."""

[shaman_tutorial]
display_name = "Shamanism"
description = """You now have a goblin who is eligible to be appointed <link="shaman_def"><style="link">shaman</style></link>. A shaman is a ritual specialist who can commune with the spirits of the dead and access the Underworld.

The shaman can use <link="vaki_def"><style="link">väki</style></link> to cast spells. You can unlock more spells by researching magical technologies.

To appoint a shaman, build a <link="shamanhut"><style="link">shaman's hut</style></link>."""

[reachability_tutorial]
display_name = "Reachability"
description = """Reachability is a technical concept in Goblin Camp.

In order to determine if a structure or item can be accessed, or if a goblin is stuck somewhere, the game checks if it can find a path from it to the center of the camp. The center of the camp is either the gateway rock or if it has been summoned, the sacrificial tree. If the game can't find such a path, the object is marked as unreachable.

So don't build your camp in such a way that there are structures that can't be reached from the gateway rock or sacrificial tree. If a goblin is marked as unreachable, try to make sure they have a path to the gateway rock or sacrificial tree."""

[last_tutorial]
display_name = "Enjoy Goblin Camp!"
description = """You've now read all of the tutorials for Goblin Camp. Enjoy the game!"""

[nettle_farming_tutorial]
display_name = "Nettle Farming"
description = """A farm plot planted with nettle seeds will produce nettle plants. \
These need to be processed at a <link="nettleprocessing"><style="link">nettle yard</style></link>, to produce <link="nettleseedbag"><style="link">nettle seeds</style></link>, edible <link="nettlebunch"><style="link">nettle leaves</style></link> and <link="nettlestems"><style="link">nettle stems</style></link>, which can be retted into fiber.

You can do this by building a nettle yard and ordering nettle leaf bunches or nettle stems in the stock manager."""

