description = """\
<b>Hit points</b> represent a creature's ability to sustain <link="armorAndDamage"><style="link">damage</style></link>. For example, the average goblin has five hit points. \
When a creature has as many damage statuses as they have hit points, they will be knocked out or even killed.\
"""

[moraledef]
display_name = "Morale"
description = """\
A creature's <b>Morale</b> is a general measure of how good they're feeling. \
The lower a creature's Morale, the more likely it is to run away from combat, and the worse it will perform at tasks in general.\
Morale is based on <link="willpowerDef"><style="link">Willpower</style></link>.\
"""

[shoot_damage_modifier_def]
display_name = "Shooting Damage Modifier"
description = """This is a modifier applied to the <link="armorAndDamage"><style="link">damage value</style></link> of this creature's shooting attacks."""

