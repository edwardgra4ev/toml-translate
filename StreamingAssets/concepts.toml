# 1.0 Game intro texts

[demointro]
description = """For untold ages, the ways between the worlds were shut.

But now it is as if a wind had blown and shaken the Great Tree, and the gates are opening again.

A small band of curious goblins, fleeing the harsh rule of the Goblin King of the underworld, have found a portal to the middle realm. Beyond it is a beautiful but dangerous northern forest. The curious goblins would like to make a new home for themselves in it. It's now up to you to guide them on their journey in a new world."""

[endOfDemo]
display_name = "Demo end"
description = """Thanks for playing the Goblin Camp demo!

We hope you enjoyed trying our game. \
If you liked what you saw, please <style="link"><link="steam">purchase the full version on Steam</style></link>.
"""

[gameOver]
display_name = "Game over"
description = """All the goblins have either died or left the camp!

Perhaps some day, a traveller will come across the remains of your camp, and wonder what happened to the people who lived here. \
But for now, the site is abandoned and desolate."""

