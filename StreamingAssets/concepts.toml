# 3.0 General concepts

[water]
display_name = "Water"
description = """\
<style="fluff">Remedy the oldest, water;
Magic is the child of sea-foam.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem III</style>

Water is useful for drinking and putting out fires, but dangerous in large amounts.\
"""

[workshop_efficiency]
display_name = "Workshop Efficiency"
description = """The efficiency of a <link="workshop"><style="link">workshop</style></link></b> is simply how much faster a goblin working there gets their job done. A workshop with +20% efficiency means a goblin will finish whatever they're doing there, usually crafting an item or preparing a meal, that much faster."""

# 3.1 Central concepts

[foodpoint]
display_name = "Food"
description = """The nutritional value of food is measured in <b>food points</b>. One goblin needs one food point worth of food each season to survive. \
They also need certain nutrients in their food. If goblins don't get enough <link="fiber"><style="link">fiber</style></link> or <link="protein"><style="link">protein</style></link>, or enough <link="fresh"><style="link">fresh food</style></link>, they'll suffer from a nutritional deficiency.

Goblins can eat food that is stored in the camp, but they are happier when they can eat in kitchens. Each kitchen prepares food for goblins equal to their capacity, and tries to prepare a meal that includes all the necessary nutrients."""

[population_def]
display_name = "Population"
description = """Your population is the total number of inhabitants your settlement has. \
If the camp is producing enough <link="foodpoint"><style="link">food</style></link> to feed its inhabitants, and none of them have died recently, more goblins may decide to try their luck in the middle world and join your camp.

If your camp has a <link="shaman_def"><style="link">shaman</style></link>, they can also grow your <link="population_def"><style="link">population</style></link> by casting <link="summongoblins"><style="link">Summon Goblins</style></link>."""

[sac_tree_def]
display_name = "Sacrificial Tree"
description = """The sacrificial tree is the ceremonial center of the goblin camp. It houses a portal to the <link="underworld_fluff"><style="link">underworld</style></link>, and acts as the center of goblin <link="culturedef"><style="link">culture</style></link>. \
The tree can be summoned by the <link="shaman_def"><style="link">shaman</style></link>.

The sacrifical tree grants bonuses to <link="researchpoints"><style="link">research</style></link> and <link="vaki_def"><style="link">väki</style></link>. \
As the goblins make <link="sacrifice_def"><style="link">sacrifices</style></link>, the tree will level up and the bonuses will increase."""

# 3.2 Other concepts

[adjacencyDef]
display_name = "Adjacency"
description = """Some buildings gain bonuses when they're built close to other buildings. \
For example, a <link="fishingworkshop"><style="link">fishing workshop</style></link> can share a <link="carpenter"><style="link">carpenter</style></link>'s tools and materials, so the fishing workshop will work more efficiently if there is a carpenter next to it."""

[calendar]
display_name = "Calendar"
description = """The goblin year is divided into four seasons, of three months each. The highlight of the year is <link="sacrifice_def"><style="link">Midsummer</style></link>, and the new year begins at the beginning of autumn."""

[claim]
display_name = "Claim"
description = """\
<b>Claiming</b> an item will direct the inhabitants of your camp to fetch it and put it in <link="storage"><style="link">storage</style></link>, so it can be used later.\
"""

[claimed_workshop]
display_name = "Claiming a Workshop"
description = """When a goblin <b>claims a <link="workshop"><style="link">workshop</style></link></b>, whenever a job is assigned to that workshop, it will be assigned to the goblin that claimed it if at all possible. Only if that goblin isn't available, will another goblin be given the job."""

[combat]
display_name = "Combat"
description = """\
<style="fluff">Ere the final bout is given,
Ere thy head be chopped in pieces;
Strike with skill, or thou wilt perish,
Strike, and do thy best for Northland.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXVII</style>

Combat happens when two creatures get into a fight. They use their respective <link="fightingSkill"><style="link">Fighting</style></link> skills to try to <link="armorAndDamage"><style="link">damage</style></link> each other.\
"""

[culturedef]
display_name = "Culture"
description = """As the goblins thrive in the middle world, they reshape it in their own image. It comes to resemble the <link="underworld_fluff"><style="link">underworld</style></link> they're from. \
A camp's culture value is a measure of how strong the goblins' influence is.  As the culture value becomes higher, more and more tiles around portals to the underworld will gain the <link="underworldtile"><style="link">underworld</style></link> attribute.

Culture is gained by <link="sacrifice_def"><style="link">sacrificing</style></link> items in a <link="bonfire"><style="link">bonfire</style></link> at Midsummer.\
"""

[fishing_value_def]
display_name = "Fishing Value"
description = """\
This value represents the amount of fish that can be extracted in one year without depleting the fishery.
Overfishing will lead to permanent decreases to the number of fish available.\
"""

[florapreferences]
display_name = "Plant Preferences"
description = """\
Different plants prefer to grow in different places. Some plants need plentiful sunlight, while others prefer <link="shade"><style="link">shade</style></link>. Some kinds of fungus need shade to grow. \
Plants may also prefer <link="sandsoil"><style="link">sandy</style></link> or <link="claysoil"><style="link">clay</style></link> soils.

Flora is more likely to appear in tiles with conditions suitable to them, and some plants won't grow in unsuitable conditions at all.\
"""

[food_waste]
display_name = "Food Waste"
description = """If a <link="kitchendef"><style="link">kitchen</style></link> is set to allow food waste, \
it means that the kitchen will prepare a meal with all of the required <link="nutrientdef"><style="link">nutrients</style></link>, \
even if that means preparing more food than the goblins eating at the kitchen would need."""

[forestcover]
display_name = "Forest-cover"
description = """<style="fluff">\
Once a wife was baking, and she dropped the dumpling she was making onto the floor. She swore then. Soon after she ended up in the forest-cover. No matter how hard everyone looked for her, she couldn't be found. Much later she was found dead, sitting on a hillside, in a recess in the rock. The hill is named Wife-mountain after her.

Saarijärvi. <style="link"><link="fls">SKS archives</link></style>.</style>

Finnish people used to believe that it was possible to get lost in the woods, not in the ordinary sense of losing one's way, but in a far more profound way: to leave our reality altogether and end up in a sort of parallel universe, where you might never be able to make your way back.

Forest-cover is depicted on the map as fog. A creature lost in the forest-cover will wander around aimlessly for a while, trying to find its way out.

Trees, bushes and other plants create forest-cover between them, so forest-cover can be pushed back by clearing vegetation, or by building <link="ravenstatue"><style="link">raven statues</style></link>.\
"""

[hauling]
display_name = "Hauling"
description = """When an item is too heavy for a goblin to <link="carrying_capacity_def"><style="link">carry</style></link>, they have to <b>haul</b> it, which means dragging it over the ground. \
Hauling is considerably faster over snow."""

[heating]
display_name = "Heating"
description = """\
When it gets cold, structures that your goblins and others <link="houses"><style="link">live</style></link> and work in will have to be <b>heated</b>, usually using <link="firewood"><style="link">firewood</style></link>. \
Goblins will try to stock firewood in buildings that need heating.\
"""

[houses]
display_name = "Houses"
description = """<style="fluff">\
Haste thee to thy husband's village,
Hasten to his mother's household;
Strange, the rooms in other dwellings,
Strange, the modes in other hamlets.

 - the <link="kalevala"><style="link">Kalevala</style></link>, trans. John Martin Crawford, poem XXIII</style>

Even the hardiest goblins need some shelter from the elements, especially in winter. If goblins don't have houses to live in, their health and <link="moraledef"><style="link">morale</style></link> will suffer. \
In winter, unhoused goblins will build <link="housing0b"><style="link">temporary shelters</style></link> for themselves, but these won't be as effective at keeping them warm as proper housing.\
"""

[ignore]
display_name = "Ignore"
description = """\
If you order your goblins to <b>ignore</b> an item, they won't put it in <link="storage"><style="link">storage</style></link>, and it will not count for the <link="second_tutorial"><style="link">stock manager</style></link>.\
"""

[meadowdef]
display_name = "Meadows"
description = """Meadows are low-lying areas close to the river, mostly made up of <link="claysoil"><style="link">clay soil</style></link>. \
Meadows usually get covered by the spring flood, so no trees will grow there."""

[mud]
display_name = "Mud"
description = """\
The more traffic passes over a sand or clay tile, the more <b>muddy</b> and worn it gets. The more muddy a tile is, the harder it is to walk over. In this way, routes your goblins walk over will gradually become harder to use and slower.\
"""

[nearbyruin]
display_name = "Ruin"
description = """There is an unexplored <link="ruinsdef"><style="link">ruin</style></link> nearby."""

[newgoblins]
display_name = "More goblins arrive!"
description = """\
Word of the success of your settlement has spread in the underworld, and more goblins have decided to join you. \
If your camp is producing enough <link="foodpoint"><style="link">food</style></link> to feed its inhabitants, and none of them have died recently, more goblins may decide to try their luck in the middle world.

If your camp has a <link="shaman_def"><style="link">shaman</style></link>, they can also grow your <link="population_def"><style="link">population</style></link> by casting <link="summongoblins"><style="link">Summon Goblins</style></link>."""

[nutrientdef]
display_name = "Nutrients"
description = """Goblins need certain nutrients in their food. If they don't get enough <link="fiber"><style="link">fiber</style></link> or <link="protein"><style="link">protein</style></link>, or enough <link="fresh"><style="link">fresh food</style></link>, they'll suffer from a nutritional deficiency."""

[ruinsdef]
display_name = "Ruins"
description = """<style="fluff">The whole underground kingdom trembled, the palace walls cracked and their foundations heaved, the arches bowed and the roof began to totter.

 - the <link="kalevipoeg"><style="link">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XIV: The Palace of Sarvik</style>

The forest is old, and many people have lived here before the goblins. Sometimes, traces of these previous inhabitants can be found in the form of ruins. \
Exploring ruins can reveal useful items."""

[ruins_explored]
display_name = ""
description = """\
Your goblins have explored the ruins, and found the following items within:

"""

[score]
display_name = "Score"
description = """\
Your game score is very simply based on how many goblins you've managed to keep alive in your camp and for how long. At the end of each year, your score is increased by the <link="population_def"><style="link">population</style></link> of your camp.\
"""

[shaman_def]
display_name = "Shaman"
description = """A shaman is a specialist who can commune with the spirit world.

In order to be elected shaman, a goblin needs to be <link="hardblooded"><style="link">hard-blooded</style></link> and <link="hardy"><style="link">hardy</style></link>."""

[storage]
display_name = "Storage"
description = """\
Goblins are tidy creatures, and items that are kept in your camp are <b>stored</b>. This can be done in outdoor <link="stockpile"><style="link">stockpiles</style></link>, or <link="storehouse"><style="link">storehouses</style></link>.

Some items, like <link="woodlog"><style="link">wooden logs</style></link>, can be stored outdoors without any trouble. Other items, like tools and especially food, will decay if stored outdoors.\
"""

[unreachableDef]
display_name = "Unreachable"
description = """The game needs a way to figure out if a structure can't be reached, or if a creature has become trapped. \
The way this works is that the game tries to plot a path from the mob or structure to the center of the camp.

The center of the camp is initially the gateway rock, but will be the sacrificial tree if it's summoned. \
So if a structure is unreachable, it means the game can't find a path from it to the center of the camp, \
and if a creature, usually a goblin, is unreachable, it means the game can't find a path for it to get to the camp center. \
To avoid this, make sure there's a way to get to the gateway rock or the sacrificial tree."""

[unreachableStructure]
display_name = "Unreachable"
description = """This structure <link="unreachableDef"><style="link">can't be reached</style></link> from the camp center, so it can't be used. The way to the structure's entrance is probably blocked or flooded."""

[unreahableMob]
display_name = "Unreachable"
description = """This creature is trapped! It <link="unreachableDef"><style="link">can't find a way to the center of the camp</style></link>."""

[weight_def]
display_name = "Weight"
description = """All items have a weight. A basic goblin can usually <link="carrying_capacity_def"><style="link">carry</style></link> one weight unit worth of items. Heavier items can be moved by <link="hauling"><style="link">hauling</style></link>."""

[workarea_def]
display_name = "Work Areas"
description = """The work area of a camp is the area where goblins will harvest flora, and which they will defend. Goblins will pick up and process items all over the map, however, unless you tell them to ignore those items.

As you build raven statues to clear the <link="forestcover"><style="link">forest-cover</style></link>, they also extend your work area. By selecting a raven statue, you can toggle the work area around it."""

# 3.3 Crops and farming

[compostingdef]
display_name = "Composting"
description = """Composting is a way to restore <link="fertility"><style="link">fertility</style></link> to the soil. It is unlocked by researching <link="fertilizerTech"><style="link">Technology: Fertilizer</style></link>.

Composting means taking organic materials and dumping them in <link="midden"><style="link">middens</style></link>. \
There, they will decay and eventually form <link="compost"><style="link">compost</style></link>. When goblins <link="muckingdef"><style="link">muck</style></link> a field, they will scatter compost on it and till it into the soil, adding the fertility value of the compost to the soil.

Middens need to be occasionally turned with a <link="pitchfork"><style="link">pitchfork</style></link> to keep the composting process going."""

[fallowdef]
display_name = "Fallowing"
description = """A field that is fallow will not have seeds sown on it, but will be <link="muckingdef"><style="link">mucked</style></link> and <link="tilling"><style="link">tilled</style></link> as normal."""

[farming]
display_name = "Farming"
description = """\
<style="fluff">Rise, O earth, from out thy slumber,
From the slumber-land of ages,
Let the barley-grains be sprouting,
Let the blades themselves be starting.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem II</style>

<b>Farming</b> is a way to produce <link="foodpoint"><style="link">food</style></link> and other useful items by growing crops. To start farming, build a <link="farmplot"><style="link>farm plot</style></link>, select the seeds you want to plant, and watch them grow.

The amount of crops a given farm plot produces is determined by the <link="fertility"><style="link">fertility</style></link> of the soil. Each crop expends some of the fertility of the plot, until it eventually runs out. \
<link="claysoil"><style="link">Clay soils</style></link> are more fertile than <link="sandsoil"><style="link">sandy soils</style></link> and retain fertilizers better, but heavier tools are needed to farm in clay.

Fields are tilled and seeds are planted at different times of the year, depending on the seeds selected for the farm plot.\
"""

[fertility]
display_name = "Fertility"
description = """\
<style="fluff">On the azure water-ridges,
On the mighty waste before her.
Where her hand she turned in water,
There arose a fertile hillock.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem I</style>

<b>Fertility</b> determines how productive <link="farming"><style="link">farming</style></link> is.

Each tile has a fertility value, which represents the nutrients in the soil that are available for plants growing in the tile. When crops are grown on a tile, they drain the fertility of the tile. The tile loses as many <b>fertility points</b> as the plants produce <link="foodpoint"><style="link">food points</style></link>.

As a tile's fertility points run down, it produces less and less crops. Fertility only recovers extremely slowly. In Finnish slash-and-burn farming, a farm plot might need 30 or 40 years to recover its fertility.

The fertility of a tile can be increased by <link="slashAndBurnTech"><style="link">slash-and-burn farming</style></link>, or restored by discovering <link="fertilizerTech"><style="link">fertilizers</style></link> to unlock <link="compostingdef"><style="link">composting</style></link>. \
<link="sandsoil"><style="link">Sandy soils</style></link> are less fertile than <link="claysoil"><style="link">clay soils</style></link>, and retain less nutrients from fertilizers.

Effective fertility can be reduced by <link="shade"><style="link">shade</style></link>.\
"""

[flaxdef]
display_name = "Flax"
description = """Flax is a crop grown for its fibers, which can be made into thread.

<link="flaxseedbag"><style="link">Flax seeds</style></link> can be found in <link="ruinsdef"><style="link">ruins</style></link> or growing in the <link="wildflax"><style="link">wild</style></link>. \
Finding flax seeds discovers <link="farmingTech"><style="link">Technology: Farming</style></link>."""

[nettledef]
display_name = "Stinging Nettles"
description = """"""

[ryedef]
display_name = "Rye"
description = """
<link="ryeseedbag"><style="link">Rye seeds</style></link> can be found in <link="ruinsdef"><style="link">ruins</style></link> or growing in the <link="wildrye"><style="link">wild</style></link>. \
Finding flax seeds discovers <link="farmingTech"><style="link">Technology: Farming</style></link>."""

[shade]
display_name = "Shade"
description = """\
Plants usually need sunlight to live, so when the light is blocked by <b>shade</b>, plants don't grow as well as they could. The north slopes of hills are considered to be in shade, because they receive less sunlight.

In the game, shade represents not only the physical blocking of sunlight, but also the effect of trees on the surrounding soil. \
Trees have extensive root systems that are very efficient at extracting nutrients from the soil, and so crops will not grow as well near trees. \
To represent the roots physically blocking plants from growing, even stumps cast some shade.

Shade reduces the <link="fertility"><style="link">fertility</style></link> of tiles. Some plants <link="florapreferences"><style="link">prefer</style></link> different levels of light.\
"""

#  3.4 Spirits, Keepers and sacrifices

[sacrifice_def]
display_name = "Sacrifices"
description = """\
It is the custom of the goblins to make sacrifices to the spirits each Midsummer. As the goblins take fish from the river or wood from the forest, for example, they believe they should give thanks to the Keepers of <link="woodskeepers"><style="link">the forest</style></link> and <link="waterskeepers"><style="link">the river</style></link> for their gifts. \
Some workshops have designated sacrificial items. For instance, for each <link="fishing1"><style="link">fisher-goblin's shack</style></link>, the river spirits expect the sacrifice of one <link="ceremonialfish"><style="link">ceremonial fish</style></link>. \
For each <link="carpenter"><style="link">carpenter's workshop</style></link>, the forest-spirits expect one <link="woodenstatuette"><style="link">wooden statuette</style></link>, and so on.

The sacrifices are placed in a <link="bonfire"><style="link">bonfire</style></link> and burned.

Successful sacrifices increase the camp's <link="culturedef"><style="link">culture</style></link> and level up the <link="sac_tree_def"><style="link">sacrificial tree</style></link>.

<style="fluff">Finnish people used to believe that all living things had spirits, and that if the spirits weren't treated correctly, there would be consequences. \
Finns used to have different harvest and hunting rituals, like the elaborate bear ceremony found in poem XLVI of the <link="kalevala"><style="link">Kalevala</style></link>, to appease the spirits.</style>"""

[woodskeepers]
display_name = "Keepers of the Woods"
description = """The Keepers of the Woods are the spirits that live in the forest and watch over all of its inhabitants. \
If the goblins take resources from the forest without respecting the Keepers of the Woods, they will be unhappy and visit misfortunes on the camp.\

The Keepers can be appeased by <link="sacrifice_def"><style="link">sacrificing</style></link> to them at Midsummer, by building a <link="bonfire"><style="link">bonfire</style></link>.\
"""

[waterskeepers]
display_name = "Keepers of the Waters"
description = """The Keepers of the Waters are the spirits that rule over the river and other bodies of water near the camp. \
If the goblins fish in the waters without respecting their Keepers, they will find it harder to catch fish.\

The Keepers can be appeased by <link="sacrifice_def"><style="link">sacrificing</style></link> to them at Midsummer, by building a <link="bonfire"><style="link">bonfire</style></link>.\
"""

# 4.0 Longer explanatory texts

[basictoolsdef]
display_name = "Basic Tools"
description = """A camp needs several kinds of everyday <b>basic tools</b> to work.

To get <link="woodmaterial"><style="link">wood</style></link> for building and other uses, goblins will need <link="chopping"><style="link">chopping tools</style></link> to cut down trees. \
An early chopping tool is the <link="stoneaxe"><style="link">stone axe</style></link>. \
Stone axes can also be used as weapons, but be careful to not assign all of your axes to guards! If that happens, your goblins won't be able to fell trees.

To dig ditches and change the ground level, goblins need <link="digging"><style="link">digging tools</style></link>. \
The <link="diggingstick"><style="link">digging stick</style></link> is a simple digging tool that also serves as a <link="bartool"><style="link">bar tool</style></link> for removing tree stumps.

Stone axes and digging sticks can be built at a <link="carpenter1"><style="link">carpenter's shack</style></link> from <link="branch"><style="link">branches</style></link>. \
You can order all tools you have discovered in the <link="second_tutorial"><style="link">stock manager</style></link>.

To put out fires, goblins need <link="bucket"><style="link">buckets</style></link>. \
The simplest bucket available is an <link="claypot"><style="link">earthenware pot</style></link>, which can be created at a <link="potter0"><style="link">potter's yard</style></link>.

To make clay tools, you need to build a <link="claypit"><style="link">clay pit</style></link>. \
This needs to be placed on <link="claysoil"><style="link">clay soil</style></link>, which you can find through the soil overlay window, accessible from the overlay button at the bottom of the game screen. \
Look out: low-lying clay lands next to the river often <link="meadowdef"><style="link">flood</style></link>! It's a good idea to build the clay pit in an area further from the river.

It's a good idea to maintain a supply of basic tools in a camp at all times. This can be easily done by setting targets for them in the stock manager, and goblins will build new ones to replace broken or lost tools.\
"""

[food_sources]
display_name = "Food Sources"
description = """Securing a <link="foodpoint"><style="link">food</style></link> supply for your camp is vitally important. If goblins don't have anything to eat, they'll leave! There are several <b>food sources</b> your camp can exploit.

The easiest way to get food is by <b>gathering</b>. Many foods can simply be found on the map: <link="mushroom"><style="link">mushrooms</style></link> high in <link="fiber"><style="link">fiber</style></link> grow on the ground, and plants like <link="hazel"><style="link">hazel</style></link> and <link="blackcurrant"><style="link">blackcurrant</style></link> bushes can be harvested for food. \
<link="nettle"><style="link">Stinging nettles</style></link> can often be found in <link="meadowdef"><style="link">meadows</style></link>, and even provide you with seeds so you can start farming.

To start gathering plants, simply find some on the map and order your goblins to harvest them. Once this is done, the food they acquired will appear in the <link="second_tutorial"><style="link">stock manager</style></link>, and you can order them to automatically find more.

Another early food source is <link="fishingTech"><style="link">fishing</style></link>. To start fishing, build a <link="fishing1"><style="link">fisher-goblin's shack</style></link> and some <link="fishingspear"><style="link">fishing spears</style></link>, and order fish in the stock manager. <link="rawfish"><style="link">Fish</style></link> are a good source of fats and proteins.

Fishing is limited by the <link="fishing_value_def"><style="link">fishing value</style></link> of the map, which represents the maximum number of fish that can be sustainably caught.

The only reliable way to produce food for a large population is <link="farming"><style="link">farming</style></link>. Farming is <link="farmingTech"><style="link">unlocked</style></link> when you first discover seeds. To start farming, lay out a <link="farmplot"><style="link">farm plot</style></link>, select the seeds you want, and the goblins will plant and harvest crops at the appropriate time of the year. \
To farm on <link="claysoil"><style="link">clay soils</style></link>, you need <link="dwarvenToolTech"><style="link">metal digging tools</style></link>.

Farming expends the <link="fertility"><style="link">fertility</style></link> of the soil, and will eventually deplete it completely. Soil can be made more fertile with <link="slashAndBurnTech"><style="link">slash-and-burn farming</style></link>, or fertility can be restored by discovering <link="fertilizerTech"><style="link">fertilizers</style></link>.

These food sources can be supplemented with the meat of hostile animals. Meat and fish can be preserved by <link="smokingTech"><style="link">smoking</style></link>.

A succesful camp will make use of various different food sources to ensure food security and a healthy, variable diet for goblins."""

# 5.0 Camp bonuses

# 5.1 Farming bonuses

[campbonus_def]
display_name = "Camp Bonus"
description = """Camp bonuses are bonuses your camp has gained that improve your goblins' performance at some activities in the camp. They can be unlocked by researching technologies."""

[improved_harvesting_def]
display_name = "Improved Harvesting"
description = """As their experience with farming grows, your goblins have learned to harvest fields more efficiently."""

[improved_sowing_def]
display_name = "Improved Sowing"
description = """As your goblins become more proficient with farming, they have learned how to plant seeds more effectively, making sowing considerably faster."""

# Farming interface texts

[now_indicator]
display_name = "Now"
description = """The current <link="calendar"><style="link">date</style></link>"""

[muckingdef]
display_name = "Mucking"
description = """Mucking a field means enhancing its <link="fertility"><style="link">fertility</style></link> by bringing items with fertility values to the farm plot."""

[tilling]
display_name = "Till"
description = """A farm plot must be tilled before seeds can be sown. Tilling <link="sandsoil"><style="link">sandy soil</style></link> can be done by hand but a <link="digging"><style="link">digging tool</style></link> will speed up the work. \
Tilling <link="claysoil"><style="link">clay soils</style></link> requires <link="shovel"><style="link">metal tools</style></link>.

In the tilling phase, any items with fertility values on the farm plot will be absorbed into the soil and contribute their <link="fertility"><style="link">fertility</style></link> to the plot.

Because it is loose, <link="sandsoil"><style="link">sandy soil</style></link> does not retain nutrients very well, and fertilizers are only partly effective.
"""

[sowing]
display_name = "Sow"
description = """For crops to grow you have to sow seeds into <link="tilling"><style="link">tilled</style></link> soil."""

[harvest]
display_name = "Harvest"
description = """Mature crops will be harvested."""

# Midsummer event texts

[sacrifice_window_calendar_pack_icon]
display_name = "Early Summer"
description = "Sacrifice items will be gathered in early summer."

[sacrifice_window_calendar_sacrifice_icon]
display_name = "Midsummer"
description = "The bonfires are lit in Midsummer."

# Structure tiers

[earthfasttier]
display_name = "Earthfast"
description = """A very simple building style, consisting of wooden poles driven into the ground.\
Earthfast buildings are quick and easy to build, but are not very durable in the long term.\
They are referred to in the game as <b>shacks</b>."""

[planktier]
display_name = "Planks and Poles"
description = """\
Buildings constructed from poles and planks. These are more durable than earthfast structures, but are still sensitive to wear and damage from weather and other events. Plank buildings are called <b>sheds</b>.\
"""

[beamtier]
display_name = "Cabins"
description = """\
Sturdier buildings built from interlocking wooden beams. Walls built from beams are very solid, but will eventually decay if the beams are in constant contact with the ground. These buildings are called <b>cabins</b>.\
"""

[cottagetier]
display_name = "Cottages"
description = """Structures built from a combination of stone and wood are called <b>cottages</b>."""

[stonetier]
display_name = "Stone Construction"
description = """\
Structures put together from quarried stone. These are very tough, can last almost forever, but take a lot of work and time to build.\
"""

[bricktier]
display_name = "Brick Construction"
description = """\
Structures built from fired clay bricks. Brick construction is not as tough as solid stone, but much easier to build.\
"""

# Structure types etc

[firehazard]
display_name = "Fire Hazard"
description = """This building uses fire for cooking or crafting, and generates sparks that can start fires near it. Be careful where you place it!"""

[workshop]
display_name = "Workshops"
description = """\
Workshops transform raw materials into tools, more advanced materials, or other useful things. \
Workers are assigned to workshops automatically when you order items in the <link="second_tutorial"><style="link">stock manager</style></link>.\
"""

[potteryworkshop]
display_name = "Potter"
description = """\
Potters transform <link="rawClay"><style="link">clay</style></link> into useful items like pots.

Pottery <link="workshop"><style="link">workshops</style></link> include the <link="potter0"><style="link">Potter's Yard</style></link>.\
"""

[smithyworkshop]
display_name = "Smithy"
description = """\
<link="smithy0"><style="link">Smithies</style></link> are <link="workshop"><style="link">workshops</style></link> that process <link="dwarvenTech"><style="link">metals</style></link>.\
"""

# Terrain types

[claysoil]
display_name = "Clay Soil"
description = """\
Heavier clay soils are found in lower-lying areas. These places usually spent extended amounts of time underwater when the glaciers were melting, and the water has winnowed away the lighter soils. \
Clay soils are harder to work and require <link="shovel"><style="link">heavier tools</style></link>, but are more <link="fertility"><style="link">fertile</style></link>, and retain nutrients from fertilizers more effectively than lighter soils.

If a lot of traffic passes over a clay tile, it will degenerate into <link="mud"><style="link">mud</style></link> that slows movement.

Some plants <link="florapreferences"><style="link">prefer</style></link> to grow in clay soils.\
"""

[sandsoil]
display_name = "Sandy Soil"
description = """\
The most common type of soil in northern climates that were once under glaciers is glacial till, a predominantly sandy soil with clay and gravel mixed in it. This till was formed when the glacier picked up soil and eroded the rocks it flowed over, and deposited as it withdrew. \
Sandy soil is relatively easy to work, and can be turned and dug with simple tools, but it is not very <link="fertility"><style="link">fertile</style></link>. \
Because it is loose, sand does not retain nutrients very well, and fertilizers are only partly effective.

If a lot of traffic passes over a sand tile, it will degenerate into <link="mud"><style="link">mud</style></link> that slows movement.

Some plants <link="florapreferences"><style="link">prefer</style></link> sandy soil.\
"""

[underworldtile]
display_name = "Underworld Tile"
description = """As your camp's <link="culturedef"><style="link">culture</style></link> spreads, more and more tiles on the map will acquire the underworld attribute. Certain plants will only grow on underworld tiles."""

# Tools

[efficiencydef]
display_name = "Efficiency"
description = """\
A tool's efficiency is a measure of how much easier it makes work. A tool's efficiency multiplies the labor of the user. \
For example, a goblin using a tool with an efficiency of 2.0 can get as much work done in the same time as two goblins without tools.

Note that some jobs, like felling trees, cannot be done at all without the appropriate tools.\
"""

[tooltoughnessDef]
display_name = "Tool Toughness"
description = """The toughness of a tool or <link="weapondef"><style="link">weapons</style></link> determines how likely it is to break in use. The higher the toughness, the less likely the item is to break."""

# Materials

[woodmaterial]
display_name = "Wood"
description = """The northern forests are full of usable wood. \
While the handles and other parts of more advanced tools may be made of wood, wooden tools and <link="weapondef"><style="link">weapons</style></link> refer specifically to items where the business end is made of wood, such as a digging stick or wooden spear. \
Wood is a relatively soft material for this, so wooden tools and weapons will break relatively easily, and wooden weapons will struggle to penetrate armor.
"""

[bonematerial]
display_name = "Bone"
description = """Bone is a useful material for tools and weapons, as it is easy to work and can hold a very sharp edge."""

[irondef]
display_name = "Iron"
description = """Iron is a useful material for tools, <link="weapondef"><style="link">weapons</style></link> and armor, as it is much harder than dwarven metal or any organic materials. \
Iron only melts at high temperatures, so a forge is required to produce iron artifacts. Iron tools can sometimes be found in <link="ruinsdef"><style="link">ruins</style></link>."""

# Combat

[armorAndDamage]
display_name = "Armor and Damage"
description = """\
<style="fluff">Then the blacksmith, Ilmarinen,
Drew his broadsword from his girdle,
From its sheath his blade of honor,
Tried to slay the pike of Northland
With the weapon of his forging;
But he broke his sword in pieces,
Did not harm the water-monster.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XL</style>

Armor increases a creature's <b>armor value</b>. Armor value is the sum of a creature's <link="hitpoints"><style="link">hit points</style></link> and armor bonuses.

When a creature is hit by an attack, if the attack's damage value exceeds their armor value, they receive a damage status. The effects of a damage status depend on its type. \
Damage types include <link="dtcrushing"><style="link">crushing</style></link>, <link="dtslashing"><style="link">slashing</style></link> and <link="dtburning"><style="link">burning</style></link>.\
"""

[dangerous_object_def]
display_name = "Dangerous Object"
description = """This item is not really intended for use as a weapon, but if you get hit with it, it will hurt! Dangerous objects inflict double damage compared to other improvised weapons."""

[dtburning]
display_name = "Burning Damage"
description = """\
<style="fluff">Straightway Fire began his roarings,
Labored to consume his brother,
His beloved younger brother.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem IX</style>

Fire is dangerous to all living things, and inflicts burning damage.\
"""

[dtcrushing]
display_name = "Crushing Damage"
description = """\
Crushing damage is mostly done by <link="wthammer"><style="link">Hammer</style></link> <link="weapondef"><style="link">weapons</style></link>. Crushing damage is generally less debilitating than <link="dtslashing"><style="link">slashing damage</style></link>. Armor converts slashing damage to crushing damage.\
"""

[dtslashing]
display_name = "Slashing Damage"
description = """\
<style="fluff">Lempo guides the sharpened hatchet,
And the veins fell Hiisi severs.
Quickly gushes forth a blood-stream,
And the stream is crimson-colored.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem VIII</style>

Slashing damage is done by all kinds of edged and thrusting <link="weapondef"><style="link">weapons</style></link>, as well as claws and teeth. Armor converts slashing damage to <link="dtcrushing"><style="link">crushing damage</style></link>.\
"""

[improvweapon]
display_name = "Improvised Weapon"
description = """\
This item is not really intended to be used as a weapon, so anyone armed with it suffers a penalty to their <link="fightingSkill"><style="link">Fighting</style></link> skill. Improvised weapons generally require both hands to wield.\
"""

[largeweapon]
display_name = "Large Weapon"
description = """Large weapons take two hands to wield, and therefore can't be used together with a shield."""

[reachweapon]
display_name = "Reach"
description = """\
<style="fluff">Chipped the splinters from the rafters,
Cut the ceiling into fragments,
Could not touch the Island-hero.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXVII</style>

This <link="weapondef"><style="link">weapon</style></link> lets its user keep the enemy at a distance, and therefore confers a +10 <link="fightingSkill"><style="link">Fighting</style></link> bonus on the defense.\
"""

[weapondef]
display_name = "Weapon"
description = """This object is designed to be used as a weapon. It inflicts two damage statuses when it hits an enemy."""

[wptype]
display_name = "Weapon Type"
description = """\
<link="weapondef"><style="link">Weapons</style></link> and improvised weapons are grouped into <b>weapon types</b>. \
Weapon types include <link="wthammer"><style="link">Hammer</style></link> and <link="wtspear"><style="link">Spear</style></link>.\
"""

[wtblade]
display_name = "Blades"
description = """\
<style="fluff">On the sword-point gleams the moonlight,
On the blade the sun is shining,
On the hilt the bright stars twinkle,
On the edge a horse is neighing,
On the handle plays a kitten,
On the sheath a dog is barking.

 - the <link="kalevala">Kalevala</link>, trans. John Martin Crawford (1888), poem XXXIX</style>

Blades are all <link="weapondef"><style="link">weapons</style></link> that rely primarily on <link="dtslashing"><style="link">slashing</style></link> with a cutting edge. A goblin skilled in the use of these weapons is knows as a Blades-goblin.\
"""

[wthammer]
display_name = "Hammers"
description = """\
The Hammer type covers all kinds of <link="weapondef"><style="link">weapons</style></link> that are mainly used to smash an opponent, including axes, clubs and various improvised weapons. A goblin who becomes experienced in the use of these weapons will gain ranks in the Hammer-goblin skill.\
"""

[wtmissile]
display_name = "Missile Weapons"
description = """Missile weapons deliver damage at a distance. Missile weapons use the <link="shootingSkill"><style="link">Shooting</style></link> skill, and the amount of damage they do is determined by their ammunition."""

[wtspear]
display_name = "Spears"
description = """\
Spears are pointed <link="weapondef"><style="link">weapons</style></link> used with a thrusting action. They usually inflict <link="dtslashing"><style="link">slashing damage</style></link>. A goblin proficient in the use of spears will acquire ranks in the Spear-goblin skill.\
"""

[military_draft]
