description = "Состояние: <style=\"bonus\">20</style>\n\nЛачуга для сушки свежесобранных культур и отделения зерна от соломы.\n\nРазблокировано: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>\n\n<style=\"fluff\"> Колдун начал со сна и увидел мстителя Линды у ворот, но он был слишком расстроен и испуган, чтобы попытаться скрыться. Он поспешно взял с груди несколько перьев и выдул их из нее несколькими волшебными словами. Они стали вооруженными воинами, тысячи из них, как пешком, так и верхом. Они бросились на сына Калева, как рой комаров или пчел; но он возложил на него дубинку, как будто он молотил, и избил их, коня и человека вместе, со всех сторон, как капли града или дождя.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto IV: The Island Maiden"

