description = "<link=\"sacrifice def\"><style=\"link\">Жертвенный пункт</style></link>: <link=\"ceremonialfish\"><style=\"link\">Церемониальная рыба</style></link>\nСостояние: <style=\"bonus\">20</style>\n\nПростой рыбак-гоблин <link=\"earthfasttier\"><style=\"link\">shack</style></link>. Одна рыбацкая хижина создает рабочие места для одного гоблина.\n\nОбнаружение: <link=\"fishingTech\"><style=\"link\"> Технология: Рыбалка</style></link>\n\n<style=\"fluff\"> Когда ты войдешь в рай,\nНа месте ты увидишь коттедж\nГде собираются рыбаки.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXXIV"

