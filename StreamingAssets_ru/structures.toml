# 3.0 Producers

[claypit]
type = "structure"
display_name = "Клэй Пит"
category = "Clay and Stone"
discovers = "clayTech"
condition = 10
labour = 80
experience = 4
experienceType = "digger"
keyword = ["clay", "clayproducer", "submersible"]
maintenanceLevel = 5
order = 20
description = "Обнаружение: <link=\"clayTech\"><style=\"link\"> Технология: Pottery</style></link>\n\nМесто для копания <link=\"rawClay\"><style=\"link\">clay</style></link>. Глиняную яму можно построить только в <link=\"claysoil\"><style=\"link\">clay soil</style></link>.\n\n<style=\"fluff\"> Молодой и безрассудный менестрель Лапландии,\nСкорбящий, зачарованный,\nГлубже опускается в грязь и воду,\nОдержимый страхом и полный страданий,\nВ болоте его борода оборвалась,\nРот когда-то хвастливо наполнился морскими водорослями.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение III"

[farmplot]
type = "structure"
display_name = "Простой фермерский участок"
category = "Farming"
unlockedBy = "farmingTech"
condition = 1
labour = 20
maintenanceLevel = 5
keyword = ["plot", "submersible"]
order = 20
description = "Сельскохозяйственный участок, для <link=\"фермерство\"><style=\"link\"> выращивание сельскохозяйственных культур</style></link>. Простые сельскохозяйственные участки можно выложить только в <link=\"sandsoil\"><style=\"link\">sandy soil</style></link> или сжечь <link=\"claysoil\"><style=\"link\">clay</style></link>.\n\nСельское хозяйство превращает почву <link=\"fertility\"><style=\"link\">fertility</style></link> в сельскохозяйственные культуры. Как только плодородие фермерского участка будет исчерпано, он больше ничего не будет производить. Фертильность может быть восстановлена с помощью <link=\"fertilizerTech\"><style=\"link\">fertilizers</style></link>.\n\nОбратите внимание, что хотя простые сельскохозяйственные участки могут быть построены на глине, примитивные инструменты, используемые для их работы, не могут извлечь полную плодородность глинистой почвы. Чтобы выращивать глину с максимальной производительностью, разблокируйте <link=\"clayfarmplot\"><style=\"link\"> тяжелые участки фермы</style></link>.\n\nРазблокировано: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>\n\n<style=\"fluff\"> Древняя мать, ты живешь\nДалеко под землей и океаном,\nМать полей и лесов,\nПринесите богатую почву для производства.\nПринесите семенные зерна в проросток.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II"

[clayfarmplot]
type = "structure"
display_name = "Тяжелый фермерский участок"
category = "Farming"
unlockedBy = "clayfarmingTech"
condition = 1
labour = 20
maintenanceLevel = 5
keyword = ["plot", "submersible"]
order = 20
description = "Сельскохозяйственный участок, для <link=\"фермерство\"><style=\"link\"> выращивание сельскохозяйственных культур</style></link>. Тяжелые участки фермы могут быть выложены в <link=\"claysoil\"><style=\"link\">clay soils</style></link>, но требуют <link=\"shovel\"><style=\"link\">metal tools</style></link>.\n\nСельское хозяйство превращает почву <link=\"fertility\"><style=\"link\">fertility</style></link> в сельскохозяйственные культуры. Как только плодородие фермерского участка будет исчерпано, он больше ничего не будет производить.\n\nРазблокировано: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>\n\n<style=\"fluff\"> И треть от утра до вечера,\nДо третьего дня вечера приносит его\nК бесконечному мосту Осмо,\nЗа Осмо-поля и пастбища.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение X"

[midden]
type = "structure"
display_name = "Мидден"
category = "Farming"
unlockedBy = "fertilizerTech"
maintenanceLevel = 5
condition = 20
fireResist = 2
burned = "ashesx4"
labour = 20
order = 20
storage = 10
keyword = ["middenheap", "passive_producer"]
passive_input_type = "fertility"
passive_output_item = "compost"
passive_output_mult = 36
seconds_per_passive_tick = 120
description = "Вместимость: <style=\"bonus\">30</style> <link=\"weight def\"><style=\"link\">weight units</style></link> элементов.\n\nСредняя куча для <link=\"compostingdef\"><style=\"link\">composting</style></link>.\n\nКогда <link=\"garbage\"><style=\"link\">garbage</style></link> сбрасывается в кучу, он производит <link=\"compost\"><style=\"link\">compost</style></link> для <link=\"fertility\"><style=\"link\">fertilizing</style></link><link=\"farming\"><style=\"link\">fields</style></link>. <link=\"pitchfork\"><style=\"link\">pitchfork</style></link> необходим для работы в середине."

[slashandburn]
type = "structure"
display_name = "Обсуждение Slash and Burn Plot"
category = "Farming"
unlockedBy = "slashAndBurnTech"
maintenanceLevel = 5
condition = 1
labour = 20
order = 20
keyword = ["plot", "submersible"]
description = "Участок среза и ожога: гоблины будут сжигать всю флору в этом районе и до тех пор, пока пепел не попадет в почву, чтобы создать гораздо более высокую фертильность.\n\nУчасток включает в себя двухэтажный широкий огнеупор с каждой стороны. Как только вы разметите область, гоблины выпадут деревья и вырубят растительность внутри, и очистят очаги пожара. Когда это будет сделано, вы можете назначить пожарных и приказать им начать огонь!\n\nПосле того, как участок был сожжен, вы можете отказаться от участка среза и ожога и выложить <link=\"farmplot\"><style=\"clickableLink\">farm plot</style></link> над сожженной областью.\n\nРазблокировано: <link=\"slashAndBurnTech\"><style=\"link\"> Технология: Slash-and-burn Farming</style></link>\n\n<style=\"fluff\"> Харк! сиськи дико плачут,\nИз аспена следуют слова:\n\"Ячмень Осмы не будет процветать,\nНе ячмень Вяйнеля,\nЕсли почва не готова,\nЕсли лес не будет вырублен,\nИ ветви сгорели дотла».\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II"

