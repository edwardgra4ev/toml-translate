# food keywords

[fresh]
display_name = "Свежая еда"
description = "Немного свежей еды. Если гоблины не получают свежих продуктов в своем рационе, они будут страдать от <link=\"scurvy\"><style=\"link\">scurvy</style></link>."

[carbs]
