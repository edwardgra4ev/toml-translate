description = "Эта пища содержит необходимые углеводы, необходимую часть сбалансированной диеты."

[fat]
display_name = "жирный"
description = "Эта пища содержит жиры, которые гоблины должны выживать, а также получать удовольствие!"

[fiber]
display_name = "волокно"
description = "Эта пища содержит большое количество пищевых волокон. Если гоблины не получают достаточного количества клетчатки в своем рационе, они будут страдать от <link=\"lackFiber\"><style=\"link\">дефицит клетчатки</style></link>."

[protein]
display_name = "белок"
description = "Эта пища содержит белок. Если гоблины не получают достаточного количества белка в своем рационе, они будут страдать от дефицита белка <link=\"lackProtein\"><style=\"link\"></style></link>."

[sweet]
display_name = "Сладкий"
description = "Эта еда очень сладкая, и гоблины не любят слишком сладкие блюда. Если блюдо включает в себя несколько сладких продуктов, только первый будет считать его полный бонус <link=\"moraledef\"><style=\"link\">morale</style></link>. Все последующие сладкие продукты добавляют только половину своего морального бонуса к эффекту еды."

