# hunger and thirst statuses

[thirsty]
display_name = "жаждущий"
morale_mod = -5
description = "Этот гоблин хочет пить!\n\nГоблины будут пить из реки или другого источника воды, когда их обязанности позволят.\n\n<style=\"characteristics\"><link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"malus\">-5</style></style>"

[hungry]
display_name = "голодный"
description = "<style=\"fluff\"> Из леса вылетела птица,\nСпел эту песню Куллервоинен:\n\"Время для лесных обедов,\nДля безотцовского компаньона\nИз стад, чтобы поесть его жезлы,\nЕшьте хорошие вещи из его корзины!\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXXIII\n\nЭто существо голодно и нуждается в <link=\"foodpoint\"><style=\"link\">food</style></link>.\n\nГоблины предпочитают есть вместе в конце каждого сезона. Если нет кухни, они будут искать еду самостоятельно. Если они не смогут найти еду, они станут голоднее и в конце концов покинут лагерь!\n"

[famished]
display_name = "голодный"
morale_mod = -10
constitution_mod = -5
speed_mod = -0.05
work_speed_mod = -0.1
description = "Это существо изголодалось! У него не было <link=\"foodpoint\"><style=\"link\"> ничего, чтобы есть</style></link> в течение довольно долгого времени.\n\nГоблины предпочитают есть вместе в конце каждого сезона. Если нет кухни, они будут искать еду самостоятельно. Если они не смогут найти еду, они станут голоднее и в конце концов покинут лагерь!\n\n<style=\"characteristics\"><link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"malus\">-10</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"malus\">-5</style>\n<link=\"speedDef\"><style=\"link\"> Скорость движения</style></link>: <style=\"malus\">-0.05</style>\n<link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"malus>-0.1</style></style>"

[starving]
display_name = "голодный"
morale_mod = -20
constitution_mod = -10
speed_mod = -0.1
work_speed_mod = -0.2
description = "Это существо голодает! Если он не может найти какой-либо <link=\"foodpoint\"><style=\"link\">food</style></link>, он покинет лагерь.\n\nГоблины предпочитают есть вместе в конце каждого сезона. Если нет кухни, они будут искать еду самостоятельно. Если они не смогут найти еду, они станут голоднее и в конце концов покинут лагерь!\n\n<style=\"characteristics\"><link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"malus\">-20</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"malus\">-10</style>\n<link=\"speedDef\"><style=\"link\"> Скорость движения</style></link>: <style=\"malus\">-0.1</style>\n<link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"malus>-0.2</style></style>"

[satiated]
display_name = "удовлетворенный"
morale_mod = +10
speed_mod = -0.1
description = "<style=\"fluff\"> И когда я положил конец столь великому поджогу и перестал пить с водой, я набросил на себя свое снаряжение и взял Дискос в свою руку, и снова пошел на север.\n\nУильям Хоуп Ходжсон «Ночная земля»\n\nУ этого существа было много еды.\n\n<style=\"characteristics\"><link=\"speedDef\"><style=\"link\"> Скорость движения</style></link>: <style=\"malus\">-0.1</style>\n<link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"bonus\">+10</style></style>"

# sleep statuses

[wellRested]
display_name = "Хорошо отдохнул"
morale_mod = +10
description = "<style=\"fluff\"> Теперь, через некоторое время, я собрался со своим умом и приказал себе; и я посмотрел, как идут часы, и я обнаружил, что я, несомненно, дремал в течение десяти часов.\n\nУильям Хоуп Ходжсон «Ночная земля»\n\nЭтот гоблин спал комфортно.\n\n<style=\"characteristics\"><link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"bonus\">+10</style></style>"

[sleptRough]
display_name = "Спящий грубый"
work_speed_mod = -0.1
constitution_mod = -5
morale_mod = -5
description = "У этого гоблина не было <link=\"houses\"><style=\"link\"> подходящего места для сна</style></link>!\n\n<style=\"characteristics\"><link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"malus\">-0.1</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"malus\">-5</style>\n<link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"malus\">-5</style></style>"

[chilled]
display_name = "охлажденный"
work_speed_mod = -0.2
speed_mod = -0.05
constitution_mod = -5
morale_mod = -10
description = "У этого гоблина не было <link=\"heating\"><style=\"link\"> теплого места для сна</style></link>!\n\n<style=\"characteristics\"><link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"malus\">-0.2</style>\n<link=\"speedDef\"><style=\"link\"> Скорость движения</style></link>: <style=\"malus\">-0.05</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"malus\">-10</style>\n<link=\"moraledef\"><style=\"link\">Morale</style></link>: <style=\"malus\">-10</style></style>"

# morale statuses

[melancholy]
display_name = "меланхолия"
whenMoraleBelow = 31
work_speed_mod = -0.2
constitution_mod = -5
description = "<style=fluff> Как плоский берег океана,\nКак темный разлом грозового облака,\nКак безрадостные зимние ночи!\nУнылый - это день осенью,\nТоскливый осенний вечер,\nЕще более мрачным является мое будущее!\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXII\n\nЭто существо чувствует себя грустным и вялым.\n\n<style=\"characteristics\"><link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"malus\">-0.2</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"malus\">-5</style></style>"

[content]
display_name = "Контент"
whenMoraleAbove = 69
whenMoraleBelow = 89
work_speed_mod = +0.1
constitution_mod = +10
description = "Это существо чувствует себя довольным жизнью.\n\n<style=\"characteristics\"><link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"bonus\">+0.1</style>\n<link=\"constitutionDef\"><style=\"link\">Constitution</style></link>: <style=\"bonus\">+10</style></style>"

[happy]
display_name = "Счастливо"
whenMoraleAbove = 89
work_speed_mod = +0.1
constitution_mod = +10
fighting_mod = +5
description = "Это существо счастливо.\n\n<style=\"characteristics\"><link=\"work speed def\"><style=\"link\">Рабочая скорость</style></link>: <style=\"bonus\">+0.1</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"bonus\">+10</style>\n<link=\"fightingSkill\"><style=\"link\">Fighting</style></link>: <style=\"бонус\">+5</style></style></style>"

