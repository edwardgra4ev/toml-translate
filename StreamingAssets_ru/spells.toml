# 1.0 Shaman spells

#  1.1 Starting shaman spells

[summoncentraltree]
display_name = "Дерево жертвоприношений"
keyword = "oneTime"
effect = "summoncentraltree"
vaki_cost = 2
experience = 5
unlockedBy = "shamanismTech"
description = "<style=\"fluff\"> Если бы я взял Отсо,\nК вершине Золотого Холма,\nК медноносной горе,\nПоложил его в свою шелковую колыбель\nНа вершине сосны,\nГде ветры и священные ветви\nСкачайте его до его продолжительного сна.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XLVI\n\nШаман вызывает и благословляет <link=\"sac tree def\"><style=\"link\">жертвенное дерево</style></link> для лагеря.\n\nЖертвенное дерево является церемониальным центром лагеря гоблина, а гоблина <link=\"culturedef\"><style=\"link\">culture</style></link>. Он генерирует <link=\"researchpoints\"><style=\"link\">research points</style></link> и <link=\"vaki def\"><style=\"link\">väki</style></link>.\n\nПо мере того, как гоблины делают <link=\"sacrifice def\"><style=\"link\">жертвы</style></link> духам, уровень дерева повышается, а бонусы, которые он предоставляет лагерю, увеличиваются."

[summongoblins]
display_name = "Призраки гоблинов"
keyword = "summon"
effect = "goblinsummon"
vaki_cost = 10
experience = 10
unlockedBy = "shamanismTech"
description = "<style=\"fluff\"> На следующее утро Калевид поднялся на рассвете и посмотрел на него. Там, где карлик исчез в синем дыму, он увидел теперь лист голубой воды с порывами на берегу и знал, что неожиданно наткнулся на вход в Пыргу. Его усталые товарищи все еще спали, и, не потревожив их, он штамповал правой ногой, и скрытые сильно охраняемые двери Аида распахнулись.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XVIII: The Kalevide’s Journey to Põrgu\n\nШаман вызывает <link=\"underworld fluff\"><style=\"link\">underworld</style></link>, призывая больше гоблинов к <link=\"population def\"><style=\"link\"> присоединиться к лагерю</style></link>."

# 1.2 Spirit spells

[conscript_spirits_01]
display_name = "Призывной дух 1"
effect = "spirits"
spirit_max = 10
vaki_cost = 3
experience = 4
unlockedBy = "spirit_law"
description = "<style=\"fluff\"> Невестку когда-то приносили в дом, и она была настолько сильна, что за день могла косить целое поле, каким бы большим оно ни было. Люди в доме восхищались этим и в конце концов не могли удержаться от шпионажа за невесткой. Они видели, как она сидела на камне и расчесывала волосы. Они услышали, как кто-то в поле сказал: «Ты галстук, я разрежу». Зерно упало смахом, но никого не было видно.\n\nSääminki, 1937. <style=\"link\"><link=\"fls\">SKS archives</link></style>.</style>\n\nШаман вынуждает до десяти <link=\"spiritdef\"><style=\"link\">spirits</style></link> перевозить предметы в лагере. Духи будут работать месяц."

[conscript_spirits_02]
display_name = "Обсуждение Conscript Spirits 2"
effect = "spirits"
spirit_max = 20
vaki_cost = 6
experience = 8
unlockedBy = "spirit_law"
description = "<style=\"fluff\"> В доме был фермер. Его отправили на недельную работу, чтобы вырубить дрова для смолы. Он всю неделю лежал в лесной сауне и ничего не делал. В субботу он получил один груз дерева и сказал: «Пусть бревна вывозят бревна». Вскоре в печи стали появляться бревна один за другим, и когда в понедельник мужчины пошли их рубить, вся древесина была выложена в печи.\n\nTeuva, 1889. <style=\"link\"><link=\"fls\">SKS archives</link></style>.</style>\n\nШаман вынуждает до двадцати <link=\"spiritdef\"><style=\"link\">spirits</style></link> перевозить предметы в лагере. Духи будут работать месяц."

