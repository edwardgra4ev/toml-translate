# 2.0 Wind spells

[changewindspell]
display_name = "Меняет ветер"
vaki_cost = 1
experience = 2
unlockedBy = "windlaw"
description = "<style=\"fluff\"> После этого моряк сказал следующее:\nВот слова Лемминкяйнена:\n\"Ударь, ветер, и поведи меня вперед,\nВзорвитесь, ветры небесные.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIX\n\nШаман призывает духов изменить направление ветра.\n\n<style=\"fluff\"> Сила, способная изменить ветер, была магической силой, которой обладали все финны.\n\n«Повар рассказал ему об этом, и Джон, как я и ожидал, встал на сторону повара и сказал, что он сам был на корабле, где у них был встречный ветер в течение двух недель, и капитан наконец узнал, что один из людей, с которыми у него были трудные слова незадолго до этого, был фином, и немедленно сказал ему, если он не остановит встречный ветер, он закроет его на переднем пике». Фин не сдался, и капитан закрыл его на переднем пике, и не дал ему ничего поесть. Фин продержался полтора дня, когда уже не выдержал, и сделал что-то или другое, что снова принесло ветер, и его отпустили.\n\n«Там, — сказал повар, — что ты думаешь об этом?»\n\nЯ сказал ему, что не сомневаюсь, что это правда, и что было бы странно, если бы ветер не изменился за пятнадцать дней, Фин или нет Фин.\n\n«О, — говорит он, — иди!» Ты думаешь, потому что ты был в колледже, ты знаешь лучше, чем кто-либо. Вы знаете это лучше, чем они сами, и видите это своими глазами. Подожди, пока не побываешь в море столько, сколько я, и ты узнаешь.\n\nРичард Генри Дана-младший, за два года до мачты (1840)"

[summonwindhead]
display_name = "Суммон Виндхэд"
effect = "windhead"
vaki_cost = 5
experience = 6
unlockedBy = "windlaw"
description = "<style=\"fluff\"> \"Вернись, о человек войны, из Похи,\nПовернись спиной к чужакам,\nОбратись в мою далекую страну!\nРок, о ветер, мой волшебный сосуд,\nДомой водить мой корабль, О Биллоу,\nОдолжи гребцам свою помощь,\nДайте веслам легкий труд,\nНа этом огромном пространстве вод!\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IV\n\nШаман вызывает вихрь. Вихрь будет брошен на целевую плитку или врага и будет искать других врагов в окрестностях. Затем он будет двигаться с ветром, пока не рассеется.\n"

