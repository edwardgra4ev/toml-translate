# 5.0 Weapon and armor technologies

[weaponsTech]
display_name = "Технологии: оружие"
treename = "Weapons"
techLevel = "wood"
prerequisite = "combat"
treeCoord = "1,4"
description = "<style=\"fluff\"> Лучше жить в условиях свободы,\nСчастливее будет моя жизнь,\nЕсли я буду служить своим ближним,\nслужить инструментами для их удобства,\nКак орудия войны,\nУбейте моих друзей и ближайших родственников,\nРанил детей моей матери.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nВаши гоблины научились создавать оружие, чтобы защищаться.\n\nРазблокировано: <link=\"combat\"><style=\"link\">Combat</style></link> (эта технология разблокирована, когда житель вашего лагеря был в бою)\n\nРазблокировать:\n<link=\"stonemace\"><style=\"link>Stone Mace</style></link>\n<link=\"bonespear\"><style=\"link\">Bone Spear</style></link> (с <link=\"butcheryTech\"><style=\"link>) Технология: Butchery</style></link>\n<link=\"woodspear\"><style=\"link\">Wooden Spear</style></link> (с <link=\"carpentryTech\"><style=\"link\">Carpentry</style></link>)\n<link=\"dwspear\"><style=\"link\">Dwarven Spear</style></link> (с <link=\"dwarvenToolTech\"><style=\"link\">Dwarven Tools</style></link>)\n\n<link=\"weaponmaker1\"><style=\"link\">Взлом оружейника</style></link>\n\nПриводит к:\n<link=\"armorTech\"><style=\"link\"> Технология: деревянная броня</style></link>\n<link=\"spearthrowerTech\"><style=\"link\"> Технология: Spear-thrower</style></link>\n<link=\"weaponsmithingTech\"><style=\"link\"> Технология: кузнечное оружие</style></link> (с <link=\"dwarvenTech\"><style=\"link>) Технология: Dwarven Metal</style></link>"

[armorTech]
display_name = "Технология: деревянная броня"
treename = "Wooden Armor"
prerequisite = ["plankTech", "weaponsTech"]
researchPointCost = 8
techLevel = "wood"
treeCoord = "3,5"
description = "<style=\"fluff\"> На третий день после этого началась ожесточенная битва, и Калевид сражался с посланными воинами полдня, когда его конь был убит под ним.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XX: Armageddon\n\nУчась на своем опыте в бою, гоблины научились моде на щиты и доспехи для защиты.\n\nПредпосылки: <link=\"weaponsTech\"><style=\"link\"> Технология: Оружие</style></link>, <link=\"plankTech\"><style=\"link> Технология: Planks</style></link>\n\nРазблокировать:\n<link=\"dwshield\"><style=\"link\">Dwarven Shield</style></link> (с <link=\"dwarvenToolTech\"><style=\"link\">Dwarven Tools</style></link>)\n<link=\"woodshield\"><style=\"link>Wooden Shield</style></link>\n<link=\"plankarmor\"><style=\"link\"> Plank Armor</style></link>\n\n<link=\"armory1\"><style=\"link\">Armorer's Shack</style></link>\n\nПриводит к:\n<link=\"clothArmorTech\"><style=\"link\"> Технология: ткачество </style></link> (с <link=\"pinningTech\"><style=\"link\">) Технология: Spinning</style></link>\n<link=\"leatherArmorTech\"><style=\"link\"> Технология: Кожаная броня</style></link> (с <link=\"leatherTech\"><style=\"link>) Технология: кожа</style></link>\n<link=\"dwarvenArmorTech\"><style=\"link\"> Технология: Armor-smithing</style></link> (с <link=\"weaponsmithingTech\"><style=\"link>) Технология: кузнечное оружие</style></link>\n\n<style=\"fluff\"> Некоторые народы Сибири и Северной Америки использовали деревянные доспехи. У нас нет доказательств того, что древние финнские люди выжили, но, опять же, органические материалы так плохо сохранились в финской почве, что маловероятно, что какие-либо образцы деревянной брони выжили бы."

[spearthrowerTech]
display_name = "Технология: Spear-thrower"
treename = "Spear-thrower"
techLevel = "wood"
researchPointCost = 6
prerequisite = ["weaponsTech", "carpentryTech"]
treeCoord = "4,5"
description = "<style=\"fluff\"> \" Пусть вся радость исчезнет навсегда,\nПусть земные удовольствия быстро погибнут,\nИсчезновение самой сладкой музыки на Земле\nСчастье уходит навсегда;\nСтреляй в этого соперника, менестреля.\nНе обращай внимания на то, что конец».\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение VI\n\nТвои гоблины научились делать копьеметатель.\n\nПредпосылки: <link=\"weaponsTech\"><style=\"link\"> Технология: Оружие</style></link>, <link=\"carpentryTech\"><style=\"link> Технология: Карпентри</style></link>\n\nРазблокировать:\n<link=\"woodtower\"><style=\"link\">Wooden Watchtower</style></link> (с <link=\"plankTech\"><style=\"link\") Технология: Planks</style></link>\n\n<link=\"spearthrower\"><style=\"link\">Spearthrower</style></link>\n<link=\"throwingspear\"><style=\"link\"> Бросающий копье</style></link>\n<link=\"bonethrowingspear\"><style=\"link\">Bone-tipped Throwing Spear</style></link> (с <link=\"butcheryTech\"><style=\"link\") Технология: Butchery</style></link>\n\n<link=\"archeryTech\"><style=\"link\"> Технология: Archery</style></link> (с <link=\"pinningTech\"><style=\"link\">) Технология: Spinning</style></link>"

[clothArmorTech]
display_name = "Технология: плетение"
treename = "Weaving"
techLevel = "wood"
researchPointCost = 8
prerequisite = ["spinningTech", "armorTech"]
treeCoord = "5,10"
description = "<style=\"fluff\"> Сестры с сожалением увидели рассвет, хотя больше не были обязаны крутиться и плестись, ибо старуха была заперта на кухне и не могла им помешать.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIV: Дворец Сарвика\n\nГоблины обнаружили, что толстая ткань, хитро сплетенная, может служить идеально функциональной броней.\n\nПредпосылки: <link=\"pinningTech\"><style=\"link\"> Технология: Spinning</style></link>, <link=\"armorTech\"><style=\"link> Технология: деревянная броня</style></link>\n\nРазблокировать:\n<link=\"clothArmor\"><style=\"link>\"Cloth Armor</style></link>\n<link=\"coarsecloth\"><style=\"link>Coarse Cloth</style></link>\n<link=\"finecloth\"><style=\"link\"> Красивая одежда</style></link>\n\n<link=\"weaving2\"><style=\"link\"> Weaver's Shed</style></link>"

[weaponsmithingTech]
display_name = "Технология: кузнечное оружие"
treename = "Weapon-smithing"
techLevel = "wood"
researchPointCost = 16
prerequisite = ["weaponsTech", "dwarvenToolTech"]
treeCoord = "7,8"
description = "<style=\"fluff\"> \"О меч, меч! Как ты ужасен! Ты ужасен тем, что пришел среди людей. Сколько глаз не будет смотреть на сады из-за тебя?\n\nЛорд Дансани, меч Веллерана (1908)\n\nГоблины развили свои навыки в гномьем металле холодного молотка и теперь могут производить более современное оружие.\n\nПредпосылки: <link=\"weaponsTech\"><style=\"link\"> Технология: Оружие</style></link>, <link=\"dwarvenToolTech\"><style=\"link> Технология: Dwarven Tools</style></link>\n\nРазблокировать:\n<link=\"dwsword\"><style=\"link>Dwarven Short Sword</style></link>\n\n<link=\"weaponmaker2\"><style=\"link\">Weaponer's Shed</style></link> (с <link=\"plankTech\"><style=\"link\"> Технология: Planks</style></link>\n\nПриводит к:\n<link=\"dwarvenArmorTech\"><style=\"link\"> Технология: Armor-smithing</style></link> (с <link=\"armorTech\"><style=\"link\") Технология: деревянная броня</style></link>\n<link=\"ironWeaponTech\"><style=\"link> Технология: Железное оружие</style></link> (с <link=\"bogIronTech\"><style=\"link>) Технология: Bog Iron</style></link>"
#<link="dw_war_axe"><style="link">Dwarven War Axe</style></link>
#<link="dw_warhammer"><style="link">Dwarven Warhammer</style></link>

[leatherArmorTech]
display_name = "Технология: Leather Armor"
treename = "Leather Armor"
techLevel = "wood"
researchPointCost = 10
treeCoord = "4,9"
prerequisite = ["leatherTech", "armorTech"]
description = "<style=\"fluff\"> Они предупредили его, что он не сможет легко убежать, но, поскольку он упорствовал, они направили его в пещеру, в которую он немедленно вошел, в то время как демоны смеялись, говоря, что медведь попал в ловушку, а лев в сеть, и что он нес свою шкуру на рынок ни за что.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIII: Первое путешествие Калевиды в Аид\n\nГоблины разработали метод закалки кожи, чтобы сделать более прочную броню.\n\nПредпосылки: <link=\"leatherTech\"><style=\"link\"> Технология: кожа</style></link>, <link=\"armorTech\"><style=\"link> Технология: деревянная броня</style></link>\n\nРазблокировать:\n<link=\"rigidleatherarmor\"><style=\"link>Rigid Leather Armor</style></link>"

[archeryTech]
display_name = "Технология: Archery"
treename = "Archery"
techLevel = "wood"
researchPointCost = 10
prerequisite = ["spearthrowerTech", "spinningTech"]
treeCoord = "5,8.5"
description = "<style=\"fluff\"> Джоукаайнен таким образом ответил:\n\"Я сделал этот могучий арбалет,\nМодный лук и отравленные стрелы\nЗа смерть Вяйнямёйнена,\nЧтобы убить друга воды,\nЯ должен пристрелить старого мага\".\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение VI\n\nГоблины научились делать луки и стрелы.\n\nПредпосылки: <link=\"spearthrowerTech\"><style=\"link\">Spear-thrower</style></link>, <link=\"spinningTech\"><style=\"link\">Spinning</style></link>\n\nРазблокировать:\n<link=\"crudebow\"><style=\"link>Crude Bow</style></link>\n<link=\"woodenarrows\"><style=\"link\">Wooden Arrows</style></link>"

[dwarvenArmorTech]
display_name = "Технология: Armor-Smithing"
treename = "Armor-smithing"
techLevel = "wood"
researchPointCost = 16
prerequisite = ["weaponsmithingTech", "armorTech"]
treeCoord = "8,9"
description = "<style=\"fluff\"> И я подумал о времени, и Дева со мной; и после этого мы берем тот пень, на который я наклонился, и было это для наковальни; и мы нашли тогда гладкие камни разных размеров, и это для молотков; и мы делали весь этот день, с покоями, на доспехах; и, конечно, мы избили его в очень хорошую форму, изнутри, и сломанные части мы били гладко, так что они не должны ранить, и в конце концов, чтобы моя доспехи подходят, чтобы пойти на меня.\n\nУильям Хоуп Ходжсон «Ночная земля»\n\nГоблины создали тяжелый костюм из брони <link=\"dwarvenTech\"><style=\"link\">dwarven metal</style></link>.\n\nПредпосылки: <link=\"weaponsmithingTech\"><style=\"link\"> Технология: кузнечное оружие</style></link>, <link=\"armorTech\"><style=\"link> Технология: деревянная броня</style></link>\n\nРазблокировать:\n<link=\"armory2\"><style=\"link\">Armorsmith's Shed</style></link>\n\n<link=\"dwcuirass\"><style=\"link>Dwarven Cuirass</style></link>"

[ironWeaponTech]
display_name = "Технологии: Железное оружие"
treename = "Iron Weapons"
prerequisite = ["bogIronTech", "weaponsmithingTech"]
techLevel = "stone"
researchPointCost = 16
treeCoord = "11,3"
description = "<style=\"fluff\"> Приди в мою комнату и печь,\nТам, где огонь свободно горит,\nТы будешь жить, расти и процветать,\nУилт стал мечом героев.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nГоблины научились делать железное оружие.\n\nПредпосылки: <link=\"weaponsmithingTech\"><style=\"link\"> Технология: кузнечное оружие</style></link>, <link=\"bogIronTech\"><style=\"link> Технология: Bog Iron</style></link>\n\nРазблокировать:\n<link=\"weaponmaker4\"><style=\"link\">Кузница Оружейника</style></link>\n\n<link=\"ironsword\"><style=\"link>Iron Broadsword</style></link>"


[ironArmorTech]
display_name = "Технология: Iron Armor"
treename = "Iron Armor"
prerequisite = ["bogIronTech", "dwarvenArmorTech"]
techLevel = "stone"
researchPointCost = 16
treeCoord = "11,5"
description = "<style=\"fluff\"> Так герой, Каукомиели,\nБыстрая подготовка к войне,\nНа его голове медный шлем,\nНа плечах у него медные шапки,\nНа его теле железные доспехи,\nСталь, пояс вокруг его тела.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XII\n\nГоблины могут ковать железную броню.\n\nПредпосылки: <link=\"dwarvenArmorTech\"><style=\"link\"> Технология: Armor-smithing</style></link>, <link=\"bogIronTech\"><style=\"link> Технология: Bog Iron</style></link>\n\nРазблокировать:\n<link=\"armory4\"><style=\"link\">Armorsmith's Forge</style></link>\n\n<link=\"iron cuirass\"><style=\"link>Iron Cuirass</style></link>\n<link=\"ironshield\"><style=\"link>Железный щит</style></link>"

# 6.0 Food technologies

[butcheryTech]
display_name = "Технология: Butchery"
treename = "Butchery"
techLevel = "wood"
treeCoord = "1,10"
description = "<style=\"fluff\"> Везде, где ищут мясника,\nОдин, чтобы убить быка Суоми,\nВ стране Карджала,\nИ среди Суоми-гигантов,\nВ тихих полях Эстланда,\nНа полях сражений Швеции,\nСреди альпинистов Лапландии,\nволхвы Ти приведе,\nИщите его в империи Туони,\nВ суде смерти Маналы.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II\n\nГоблины умеют убивать мертвых животных и использовать кости для различных ремесел.\n\nРазблокировано: обнаружение трупа животного или некоторых <link=\"bones\"><style=\"link\">Bones</style></link>\n\nРазблокировать:\n<link=\"butcher0\"><style=\"link\">Butcher's Block</style></link>\n\n<link=\"bonefishingspear\"><style=\"link>Костовое рыболовное копье</style></link>\n<link=\"bonespear\"><style=\"link\">Bone Spear</style></link> (с <link=\"weaponsTech\"><style=\"link>) Технология: Оружие</style></link>\n\nПриводит к:\n<link=\"fertilizerTech\"><style=\"link\"> Технология: Удобрение</style></link> (с <link=\"slashAndBurnTech\"><style=\"link>) Технология: Slash-and-burn Farming</style></link>"

[fishingTech]
display_name = "Технологии: Рыбалка"
treename = "Fishing"
techLevel = "wood"
treeCoord = "1,2.5"
description = "<style=\"fluff\"> Прямая дорога спешит Väinämöinen\nВ лодочный домик на берегу моря,\nС заботой смотрит на рыбные копыта,\nИ линии, которые он хорошо рассматривает.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение V\n\nГоблины научились ловить рыбу!\n\nUnlocked by: building a <link=\"fishing1\"><style=\"link\">fisher-goblin's shack</style></link>\n\nРазблокировать:\n<link=\"rawfish\"><style=\"link>Свежие рыбы</style></link>\n<link=\"fishingspear\"><style=\"link\"> Рыболовное копье</style></link>\n<link=\"fishingtrap\"><style=\"link\"> Ловушка для рыбалки</style></link>\n\n<link=\"fishingworkshop1\"><style=\"link\">Fishing Work-Shack</style></link>\n\nПриводит к:\n<link=\"mokingTech\"><style=\"link\"> Технология: Курение</style></link>"

[smokingTech]
display_name = "Технология: курение"
treename = "Smoking"
techLevel = "wood"
prerequisite = ["fishingTech"]
researchPointCost = 4
treeCoord = "2,3.5"
description = "<style=\"fluff\"> Быстрее молодые парни из деревни\nОгонь был воздвигнут на бересте,\nПринес на кончиках соснового дерева;\nИ огонь и дым смешались.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXI\n\nГоблины обнаружили, что курение мяса и рыбы сохраняет его в течение более длительного времени, и добавляет что-то на вкус!\n\nПредпосылки: <link=\"fishingTech\"><style=\"link\"> Технология: Рыбалка</style></link>\n\nРазблокировать:\n<link=\"mokedbird\"><style=\"link\">Smoked Bird Meat</style></link>\n<link=\"mokedfish\"><style=\"link\">Smoked Fish</style></link>\n<link=\"mokedwolf\"><style=\"link\">Smoked Wolf</style></link>\n\n<link=\"moker0\"><style=\"link\">Smoking Shack</style></link>\n\nПриводит к:\n<link=\"bakingTech\"><style=\"link\"> Технология: выпечка </style></link> (с <link=\"farmingTech\"><style=\"link\") Технология: Сельское хозяйство</style></link>\n<link=\"charcoalTech\"><style=\"link\"> Технология: Уголь</style></link>"

[bakingTech]
display_name = "Технология: выпечка"
treename = "Baking"
techLevel = "wood"
prerequisite = ["farmingTech", "smokingTech"]
researchPointCost = 6
treeCoord = "6,2"
description = "<style=\"fluff\"> Пейте хлеб своего героя с удовольствием.\nПользуйтесь терпением и заботой.\nЧтобы твои печенья были достойными,\nЧтобы тесто было легким и воздушным.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIII\n\nГоблины научились измельчать муку и печь хлеб.\n\nПредпосылки: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>, <link=\"КурениеТех\"><style=\"link> Технология: Курение</style></link>\n\nРазблокировать:\n<link=\"ryeflour\"><style=\"link>Rye Flour</style></link>\n<link=\"seed meal\"><style=\"link>Seed Meal</style></link>\n\n<link=\"mill0\"><style=\"link>Hand Mill</style></link>\n<link=\"baker0\"><style=\"link\"> Пищевая яма</style></link>\n\nПриводит к:\n<link=\"windmillsTech\"><style=\"link\"> Технология: ветряные мельницы</style></link>"

