# 1.0 Wood technologies

[carpentryTech]
display_name = "Технологии: Карпентри"
treename = "Carpentry"
techLevel = "wood"
treeCoord = "1,7"
description = "<style=\"fluff\"> Спик певицы, Väinämöinen:\n\"Я строил себе корабль,\nВ моем ремесле работала, пела,\nТребуются три слова Учителя.\nКак закрепиться на выступах,\nКак должна завершиться корма.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XVI\n\nДревесина является наиболее доступным материалом в северных лесах, и ваши гоблины учатся ее использовать.\n\nUnlocked by: building a <link=\"carpenter1\"><style=\"link\">carpenter's workshop</style></link>\n\nРазблокировать:\n<link=\"diggingstick\"><style=\"link>Digging Stick</style></link>\n<link=\"stonemace\"><style=\"link\">Stone Mace</style></link> (с <link=\"weaponsTech\"><style=\"link>) Технология: Оружие</style></link>\n<link=\"woodpole\"><style=\"link>Деревянный полюс</style></link>\n<link=\"woodspear\"><style=\"link\">Wooden Spear</style></link> (с <link=\"weaponsTech\"><style=\"link>) Технология: Оружие</style></link>\n\n<link=\"palisade\"><style=\"link>Palisade</style></link>\n<link=\"storehouse1><style=\"link>Storage Shack</style></link>\n<link=\"weathervane\"><style=\"link>Weathervane</style></link>\n\nПриводит к:\n<link=\"dwarvenToolTech\"><style=\"link> Технология: Dwarven Tools</style></link> (с <link=\"dwarvenTech\"><style=\"link\"> Технология: Dwarven Metal</style></link><link=\"housingTech\"><style=\"link> Технология: Жилье</style></link>\n<link=\"plankTech\"><style=\"link\"> Технология: Planks</style></link>\n<link=\"pinningTech\"><style=\"link\"> Технология: Spinning</style></link> (с <link=\"clayTech\"><style=\"link>) Технология: Pottery</style></link>\n<link=\"woodmagicTech\"><style=\"link\"> Технология: Деревянные магические структуры</style></link> (с <link=\"shamanismTech\"><style=\"link\") Технология: шаманизм</style></link>"
# <link="boatingTech"><style="link">Technology: Boating</style></link> (with <link="fishingTech"><style="link">Technology: Fishing</style></link>)

[housingTech]
display_name = "Технология: Жилье"
treename = "Housing"
techLevel = "wood"
prerequisite = "carpentryTech"
researchPointCost = 3
treeCoord = "2,5"
description = "<style=\"fluff\"> Старики говорят, что у гоблинов тоже есть дома, как и у других людей.\n\nKittilä, 1854. <style=\"link\"><link=\"fls\">SKS archives</link></style>.</style>\n\nГоблины научились строить дома, чтобы укрыться от стихии.\n\nРазблокировать:\n<link=\"housing1a\"><style=\"link>Simple Shack</style></link>\n<link=\"kitchen1\"><style=\"link>Kitchen Shack</style></link>\n<link=\"housing2a\"><style=\"link\">Simple Shed</style></link> (с <link=\"plankTech\"><style=\"link\") Технология: Planks</style></link>\n\nПриводит к:\n<link=\"beamTech\"><style=\"link\"> Технология: Beams</style></link> (с <link=\"plankTech\"><style=\"link\">) Технология: Planks</style></link>"

[beamTech]
display_name = "Технология: Beams"
treename = "Beams"
prerequisite = ["plankTech", "housingTech"]
techLevel = "wood"
researchPointCost = 6
treeCoord = "3,6.5"
description = "<style=\"fluff\"> Перед деревней было широкое и травянистое пространство, а за ним снова большая древесина, но за спиной деревья подходили прямо к домам, которые своими большими балками и деревянными каркасами и соломенными крышами, зелеными от мха, казались почти частью леса.\n\nЛорд Дансани, Крепость Непобедимая За исключением Сакнота (1908)\n\nГоблины научились строить здания, формируя <link=\"woodlog\"><style=\"link\">logs</style></link> в <link=\"woodbeam\"><style=\"link\">beams</style></link> и связывая их вместе. Это очень прочный <link=\"beamtier\"><style=\"link\">метод построения</style></link>.\n\nПредпосылки: <link=\"housingTech\"><style=\"link\">Housing</style></link>, <link=\"plankTech\"><style=\"link> Planks</style></link>\n\nРазблокировать:\n<link=\"storehouse3\"><style=\"link>Storage Hut</style></link>\n<link=\"housing3a\"><style=\"link\"> Simple Hut</style></link>\n\nПриводит к:\n<link=\"stoneConstructionTech\"><style=\"link> Технология: каменная конструкция</style></link> (с <link=\"stoneTech\"><style=\"link>) Технология: Stone</style></link>\n<link=\"windmillsTech\"><style=\"link\"> Технология: ветряные мельницы</style></link>"
# <link="carpenter3"><style="link">Carpenter's Hut</style></link>

[plankTech]
display_name = "Технологии: Планки"
treename = "Planks"
prerequisite = "carpentryTech"
techLevel = "wood"
researchPointCost = 4
treeCoord = "2,6.5"
description = "<style=\"fluff\"> Из стеблей он лопает ветви,\nразбивает ствол на множество частей,\nМодные пиломатериалы для дна,\nБесчисленные доски, и ребра, и брекеты,\nЗа волшебный сосуд певца,\nИ тогда колдовство рассеется.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XVI\n\nГоблины научились вырезать <link=\"woodlog\"><style=\"link\">logs</style></link> в <link=\"woodplank\"><style=\"link\">planks</style></link>. Планки можно использовать для построения <link=\"planktier\"><style=\"link\"> более совершенных зданий</style></link>.\n\nПредпосылки: <link=\"carpentryTech\"><style=\"link\"> Карпентри</style></link>\n\nРазблокировать:\n<link=\"woodbucket\"><style=\"link>Wooden Bucket</style></link>\n<link=\"woodplank\"><style=\"link>Wooden Plank</style></link>\n<link=\"woodshield\"><style=\"link\">Wooden Shield</style></link> (с <link=\"armorTech\"><style=\"link\") Технология: Armor</style></link>\n\n<link=\"carpenter2\"><style=\"link\">Carpenter's Shed</style></link>\n<link=\"duckboard\"><style=\"link>Duckboard</style></link>\n<link=\"granary2\"><style=\"link>Granary</style></link>\n<link=\"guard2\"><style=\"link>Почта охраны</style></link>\n<link=\"kitchen2\"><style=\"link>Kitchen Shed</style></link>\n<link=\"plank bridge\"><style=\"link\"> Plank Bridge</style></link>\n<link=\"housing2a\"><style=\"link\"> Simple Hut</style></link>\n<link=\"spinning2\"><style=\"link\">Spinner's Shed</style></link> (с <link=\"spinningTech\"><style=\"link\"> Технология: Spinning</style></link>\n<link=\"storehouse2\"><style=\"link>Storage Shed</style></link>\n<link=\"weaponmaker2\"><style=\"link\">Weaponsmith's Shed</style></link> (с <link=\"weaponsmithingTech\"><style=\"link\"> Технология: кузнечное оружие</style></link>\n<link=\"woodtower\"><style=\"link\">Wooden Watchtower</style></link> (с <link=\"spearthrowerTech\"><style=\"link\") Технология: Spear-thrower</style></link>\n\nПриводит к:\n<link=\"barrelTech\"><style=\"link\"> Технология барреля</style></link>\n<link=\"beamTech\"><style=\"link\"> Технология: Beams</style></link> (с <link=\"housingTech\"><style=\"link>) Технология: Жилье</style></link>\n<link=\"hydraulicTech\"><style=\"link\"> Технология: Гидравлика</style></link><link=\"armorTech\"><style=\"link\"> Технология: деревянная броня</style></link>\n"
# <link="potter1"><style="link">Potter's Shack</style></link> (with <link="clayTech"><style="link">Technology: Pottery</style></link>)
# <link="firefighting2"><style="link">Fire Warden's Post</style></link>

[leatherTech]
display_name = "Технология: Leather"
treename = "Leather"
prerequisite = ["butcheryTech", "clayTech"]
researchPointCost = 4
techLevel = "wood"
treeCoord = "3,9"
description = "<style=\"fluff\"> На ноги твои, положи шелковые чулки,\nс обувью из лучшей кожи;\nСложите волосы золотыми браслетами,\nхорошо связать его нитями серебра;\nОбвяжи кольцами свои волшебные пальцы,\nИ руки твои с дерзкими ругательствами;\nИди в свою комнату,\nВозвращайся к этому дому.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IV\n\nВаш лагерь приобрел шкуру животного, которую можно загонять под кожу.\n\nРазблокировать:\n<link=\"curedhide\"><style=\"link>Cured Hide</style></link>\n<link=\"leatherjerkin\"><style=\"link>Кожа Джеркин</style></link>\n<link=\"rawleather\"><style=\"link>Raw Leather</style></link>\n\n<link=\"curing0\"><style=\"link\">Curing Workshop</style></link>\n<link=\"leatherworker1\"><style=\"link\"> Шахта кожаного рабочего</style></link>\n<link=\"tanner0\"><style=\"link\"> Загарные ванны</style></link>\n\nПриводит к:\n<link=\"leatherArmorTech\"><style=\"link\"> Технология: Кожаная броня</style></link> (с <link=\"armorTech\"><style=\"link\") Технология: деревянная броня</style></link>"

[spinningTech]
display_name = "Технология: Spinning"
treename = "Spinning"
prerequisite = ["carpentryTech", "clayTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "2,8"
description = "<style=\"fluff\"> Внутри он слышал, как девы крутятся и поют, оплакивая счастье своей прежней жизни и надеясь, что может появиться какой-то спаситель.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIII: Первое путешествие Калевиды в Аид\n\nМногие растительные волокна можно превратить в прочные струны, для всего, от рыболовных сетей до струн.\n\nПредпосылки: <link=\"carpentryTech\"><style=\"link\"> Технология: Карпентри</style></link>, <link=\"clayTech\"><style=\"link> Технология: Pottery</style></link>\n\nРазблокировать:\n<link=\"rope\"><style=\"link>Rope</style></link>\n<link=\"coarsefiber\"><style=\"link>Coarse Fiber</style></link>\n<link=\"coarsethread\"><style=\"link>Coarse Thread</style></link>\n<link=\"finefiber\"><style=\"link\"> Fine Fiber</style></link>\n<link=\"finethread\"><style=\"link\"> Отличная нить </style></link>\n\n<link=\"retting0\"><style=\"link\">Retting Yard</style></link> (с <link=\"clayTech\"><style=\"link>) Технология: Pottery</style></link>\n<link=\"ropemaking1\"><style=\"link\">Rope-maker's Shack</style></link>\n<link=\"spinning2\"><style=\"link\">Spinner's Shed</style></link> (с <link=\"plankTech\"><style=\"link\"> Технология: Planks</style></link>\n\nПриводит к:\n<link=\"archeryTech\"><style=\"link\"> Технология: Archery</style></link> (с <link=\"spearthrowerTech\"><style=\"link>) Технология: Spear-thrower</style></link>\n<link=\"clothArmorTech\"><style=\"link\"> Технология: ткачество</style></link>"

