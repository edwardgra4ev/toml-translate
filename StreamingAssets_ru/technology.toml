# 3.0 stone technologies

[simpleStoneTech]
display_name = "Технология: простые каменные структуры"
treename = "Simple Stone Structures"
techLevel = "wood"
treeCoord = "1,5.5"
description = "<style=\"fluff\"> Чтобы камни падали и болели,\nИ грядки железа погибают.\nКамни и металлы не шумят\nВ руках захватчика.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XLV\n\nГоблины научились использовать камни и камни, которые они могут найти.\n\nUnlocked by: discovering <link=\"roughstone\"><style=\"link\">Rough Stone</style></link> или <link=\"dressedstone\"><style=\"link\">Dressed Stone</style></link>.\n\nРазблокировать:\n<link=\"cobblestone road\"><style=\"link>Cobblestone Road</style></link>\n<link=\"stonepavement\"><style=\"link>Каменный тротуар</style></link>"

[stoneTech]
display_name = "Технологии: Стоун"
treename = "Stone"
techLevel = "stone"
prerequisite = "dwarvenToolTech"
researchPointCost = 10
treeCoord = "7,6.5"
description = "<style=\"fluff\"> В настоящее время они прошли через каменную дверь в каменную галерею, также вымощенную камнем, и, пройдя через нее на небольшое расстояние, прибыли в комнату, в которой стены и мебель были полностью из железа. «Это, — сказала старшая сестра, — комната старого Сарвика, где его люди-слуги собираются и работают или развлекаются, и где их иногда пытают всевозможными способами».\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIV: Дворец Сарвика\n\nГоблины приобрели инструменты для добычи камня.\n\nПредпосылки: <link=\"dwarvenToolTech\"><style=\"link\"> Технология: Dwarven Tools</style></link>\n\nРазблокировать:\n<link=\"stonequarry\"><style=\"link>Каменный карьер</style></link>\n<link=\"stonecutter1\"><style=\"link\">Stone-cutter's Shack</style></link>\n\n<link=\"dressedstone\"><style=\"link>Dressed Stone</style></link>\n<link=\"roughstone\"><style=\"link>Rough Stone</style></link>\n\nПриводит к:\n<link=\"stoneConstructionTech\"><style=\"link> Технология: Каменная конструкция</style></link> (с <link=\"beamTech\"><style=\"link\">) Технология: Beams</style></link>"

