# 7.0 Farming technologies

[farmingTech]
display_name = "Технология: сельское хозяйство"
treename = "Farming"
techLevel = "wood"
treeCoord = "5,4"
description = "<style=\"fluff\"> Пусть зеленеют стебли,\nПусть сами уши растут,\nИ стократное производство,\nОт моего вспашки и посева.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II\n\nГоблины открыли для себя сельское хозяйство и теперь знают, как сажать урожай!\n\nСельское хозяйство потребляет <link=\"плодородие\"><style=\"link\"> плодородие почв</style></link> и превращает его в урожай. Как только плодородие закончится, фермерский участок ничего не будет производить.\n\nОригинальное название: Unlocked by: Discovering Seeds\n\nРазблокировать:\n<link=\"farmplot\"><style=\"link>Farm Plot</style></link>\n<link=\"nettleprocessor0\"><style=\"link\"> Nettle Yard</style></link>\n<link=\"turniphole\"><style=\"link>Turnip Hole</style></link>\n<link=\"thresher1\"><style=\"link\"> Threshing Shack</style></link>\n\nПриводит к:\n<link=\"improved farming tech\"><style=\"link\"> Технология: улучшенное сельское хозяйство</style></link>\n<link=\"slashAndBurnTech\"><style=\"link\"> Технология: Slash-and-burn Farming</style></link>\n<link=\"bakingTech\"><style=\"link\"> Технология: выпечка </style></link> (с <link=\"mokingTech\"><style=\"link\">) Технология: курение</style></link>\n<link=\"clayfarmingTech\"><style=\"link\"> Технология: Clay Farming</style></link> (с <link=\"dwarvenTech\"><style=\"link>) Технология: Dwarven Metal</style></link>"
# <link="mushroomTech"><style="link">Technology: Mushroom Farming</style></link>

[slashAndBurnTech]
display_name = "Технология: Slash-and-burn Farming"
treename = "Slash-and-burn Farming"
prerequisite = ["farmingTech"]
techLevel = "wood"
researchPointCost = 6
treeCoord = "6,3.5"
description = "<style=fluff> А потом эта птица небесная,\nПожар между ветвями;\nВскоре пламя раздувается северными ветрами,\nИ восточные ветры придают им силы,\nСожги деревья всех описаний,\nСожги их всех до праха и пепла,\nТолько берёза осталась стоять.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II\n\nВаши гоблины научились использовать <link=\"ashes\"><style=\"link\">ashes</style></link> для увеличения <link=\"fertility\"><style=\"link\">fertility</style></link> <link=\"farming\"><style=\"link\">farm plots</style></link>.\n\nПредпосылки: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>\n\nРазблокировать:\n<link=\"slashandburn\"><style=\"link>Slash and Burn Plot</style></link>\n\nПриводит к:\n<link=\"fertilizerTech\"><style=\"link\"> Технология: Удобрение</style></link> (с <link=\"butcheryTech\"><style=\"link>) Технология: Butchery</style></link>"

#[mushroomTech]
#display_name = "Technology: Mushroom Farming"
#treename = "Mushroom Farming"
#prerequisite = "farmingTech"
#techLevel = "wood"
#treeCoord = "6,5"
#researchPointCost = 900
#description = """The goblins have figured out the secret of growing mushrooms.
#
#Prerequisites: <link="farmingTech"><style="link">Technology: Farming</style></link>"""

[fertilizerTech]
display_name = "Технология: удобрения"
treename = "Fertilizer"
prerequisite = ["slashAndBurnTech", "butcheryTech"]
techLevel = "wood"
treeCoord = "7,3.5"
researchPointCost = 20
description = "<style=\"fluff\"> И мы рассказали им о некоторых способах, с помощью которых они могли бы принести более быструю жизнь в почву; и это они стремились сделать, будучи вновь живыми после столь долгого периода полужизни.\n\nУильям Хоуп Ходжсон «Ночная земля»\n\nГоблины понимают, что органическое вещество, даже отходы, можно использовать для восстановления <link=\"фертильность\"><style=\"link\">fertility</style></link> в почве.\n\nТехнология: Удобрение разблокирует <link=\"muckingdef\"><style=\"link\"> фазу выдержки</style></link> в сельском хозяйстве, а также возможность оставить участок фермы <link=\"fallowdef\"><style=\"link\">fallow</style></link>.\n\nПредпосылки: <link=\"slashAndBurnTech\"><style=\"link\"> Технология: Slash-and-burn Farming</style></link>, <link=\"butcheryTech\"><style=\"link\"> Технология: Butchery</style></link>\n\nРазблокировать:\n<link=\"bonemeal\"><style=\"link>\"Bone Meal</style></link>\n<link=\"woodchips\"><style=\"link\"> Midden</style></link>\n\n<link=\"midden\"><style=\"link\"> Midden</style></link>"

[clayfarmingTech]
display_name = "Технология: Clay Farming"
treename = "Clay Farming"
prerequisite = ["farmingTech", "dwarvenToolTech"]
techLevel = "wood"
treeCoord = "7,4.5"
researchPointCost = 10
description = "<style=\"fluff\"> Долг нового короля состоял в том, чтобы вспахать страну и защищать ее, и поэтому он решил работать с мечом рядом с ним. Рано и поздно он вспахивал, запасая страну кукурузой, травой, деревьями и ягодами.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто VIII: Конкурс и расставание братьев\n\nТеперь, когда у них есть доступ к металлическим инструментам для копания, гоблины могут обрабатывать глиняные почвы <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПредпосылки: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>, <link=\"dwarvenToolTech\"><style=\"link> Технология: Dwarven Tools</style></link>\n\nРазблокировать:\n<link=\"clayfarmplot\"><style=\"link\"> Heavy Farm Plot</style></link>"

[improved_farming_tech]
display_name = "Технологии: улучшение сельского хозяйства"
treename = "Improved Farming"
prerequisite = ["farmingTech"]
techLevel = "wood"
treeCoord = "6,5"
researchPointCost = 10
description = "Гоблины научились более эффективно заниматься сельским хозяйством: сбор урожая и посев семян теперь занимают значительно меньше времени.\n\nПредпосылки: <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>\n\nРазблокировать:\n<link=\"campbonus def\"><style=\"link\">Camp Bonus</style></link>: <link=\"improved sow def\"><style=\"link>Improved Sowing</style></link>\n<link=\"campbonus def\"><style=\"link\">Camp Bonus</style></link>: <link=\"improved harvesting def\"><style=\"link>Improved Harvesting</style></link>"

# 8.0 Shamanism technologies

[shamanismTech]
display_name = "Технология: шаманизм"
treename = "Shamanism"
keyword = "shamanism"
techLevel = "wood"
treeCoord = "1,1"
description = "<style=\"fluff\"> Он долго размышлял и размышлял.\nГде найти эти волшебные слова?\nНайдите потерянные слова Учителя.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XVI\n\nПо крайней мере один гоблин в вашем лагере - <link=\"hardblooded\"><style=\"link\">hard-blooded</style></link> и <link=\"hardy\"><style=\"link\">hardy</style></link>. Теперь вы можете построить <link=\"shamanhut\"><style=\"link\">shaman's hut</style></link>, и если вы это сделаете, ваши гоблины выберут <link=\"shaman def\"><style=\"link\">shaman</style></link>.\n\nРазблокировка: <link=\"shamanhut\"><style=\"link\"> Шаманский хат</style></link>\n\n<link=\"level earth\"><style=\"link>Level Earth</style></link>\n<link=\"lower earth\"><style=\"link>Нижняя Земля</style></link>\n<link=\"raise earth\"><style=\"link>Raise Earth</style></link>\n<link=\"startfire01\"><style=\"link>Start Fire</style></link>\n<link=\"summonwater01\"><style=\"link\">Summon Water</style></link>\n\nПриводит к:\n<link=\"spirit law\"><style=\"link\"> Технологии: Песни Мертвых</style></link>\n<link=\"windlaw\"><style=\"link\"> Технологии: Песни ветра</style></link>\n<link=\"woodmagicTech\"><style=\"link\"> Технология: Деревянные магические структуры</style></link> (с <link=\"carpentryTech\"><style=\"link\") Технология: Карпентри</style></link>"

[woodmagicTech]
display_name = "Технология: Деревянные магические структуры"
