[charcoalTech]
display_name = "Технология: Charcoal"
treename = "Charcoal"
prerequisite = ["smokingTech"]
researchPointCost = 12
techLevel = "wood"
treeCoord = "8,3"
description = "<style=\"fluff\"> Демоны непрестанно пытаются смягчить свои цепи, нагружая вокруг себя петухов древесного угля, но когда петух на рассвете воронит, их оковы снова становятся толще.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XX: Armageddon\n\nКогда они сжигают древесину, гоблины обнаруживают, что иногда древесина превращается в совершенно новое вещество, которое горит намного горячее: древесный уголь.\n\nПредпосылки: <link=\"mokingTech\"><style=\"link\"> Технология: Курение</style></link>\n\nРазблокировать:\n<link=\"уголь\"><style=\"link>Уголь</style></link>\n\n<link=\"charcoal clamp><style=\"link>Угольный зажим</style></link>\n\nПриводит к:\n<link=\"forgingTech\"><style=\"link\"> Технология: ковка </style></link> (с <link=\"stoneConstructionTech\"><style=\"link>) Технология: каменная конструкция</style></link>"

