[windmillsTech]
display_name = "Технологии: ветряные мельницы"
treename = "Windmills"
prerequisite = ["bakingTech", "beamTech"]
researchPointCost = 12
techLevel = "wood"
treeCoord = "7,2"
description = "<style=\"fluff\"> И в этом городе не было ничего, что было бы хорошо для души. Ибо оно не знало, что красота желательна; поэтому оно делало много вещей машинами и торопилось всеми путями своими, хвасталось своим превосходством над другими городами и становилось все богаче и богаче, и не было никого, чтобы жалеть его.\n\nLord Dunsany, the Kith of the Elf Folk (1908)[править править код]\n\nГоблины изобрели ветровые машины.\n\nПредпосылки: <link=\"bakingTech\"><style=\"link\"> Технология: выпечка </style></link>, <link=\"beamTech\"><style=\"link> Технология: Beams</style></link>\n\nРазблокировать:\n<link=\"mill3\"><style=\"link\"> Windmill</style></link>"

[burialTech]
display_name = "Технология: Burial"
treename = "Burial"
techLevel = "wood"
treeCoord = "2,2"
description = "<style=\"fluff\"> Tuonetar дает такой ответ:\n\"Древний менестрель, Вяйнямёйнен,\nСкажи мне, что привело тебя сюда,\nПриведи тебя в царство Маны,\nСудам Туонелы,\nЭре Туони послал своих ангелов\nВ твой дом в Калевале,\nТам, чтобы разрезать твою волшебную нить жизни.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XVI\n\nК сожалению, умер гоблин. Если их тело может быть восстановлено, их товарищи могут построить <link=\"grave0\"><style=\"link\">grave</style></link>, чтобы похоронить их.\n\nРазблокировать:\n<link=\"grave0\"><style=\"link>Grave</style></link>"

# 2.0 Clay and brick technologies

[clayTech]
display_name = "Технология: Pottery"
treename = "Pottery"
techLevel = "wood"
treeCoord = "1,8.5"
description = "<style=\"fluff\"> О'эр, огонь крана висел,\nНа кране были крючки из меди,\nНа крючках бурлящие сосуды\nНаполнен медвежьим стейком для пиршества.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XLVI\n\nГлина может быть сформирована и выпущена в прочные глиняные сосуды, такие как <link=\"claypot\"><style=\"link\">pots</style></link> для хранения и приготовления пищи.\n\nРазблокировано: <link=\"claypit\"><style=\"link\"> Clay Pit</style></link>\n\nРазблокировать:\n<link=\"scuttlebutt\"><style=\"link\">Scuttlebutt</style></link>\n<link=\"retting0\"><style=\"link\">Retting Yard</style></link> (с <link=\"spinningTech\"><style=\"link\") Технология: Spinning</style></link>\n\nПриводит к:\n<link=\"leatherTech\"><style=\"link\"> Технология: кожа</style></link> (с <link=\"butcheryTech\"><style=\"link>) Технология: Butchery</style></link>\n<link=\"pinningTech\"><style=\"link\"> Технология: Spinning</style></link> (с <link=\"carpentryTech\"><style=\"link>) Технология: Карпентри</style></link>"
# <link="potter1"><style="link">Potter's Shack</style></link> (with <link="plankTech"><style="link">Technology: Planks</style></link>)

#[chalkTech]
#display_name = "Technology: Chalk"
#treename = "Chalk"
#prerequisite = ["stoneTech"]
#techLevel = "stone"
#researchPointCost = 8
