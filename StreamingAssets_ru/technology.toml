# 4.0 metal technologies

[dwarvenTech]
display_name = "Технология: Dwarven Metal"
treename = "Dwarven Metal"
techLevel = "wood"
treeCoord = "5,7.5"
description = "<style=\"fluff\"> Теперь, когда они пришли к кузнице, Синдри положил свиную шкуру в очаг и нанес удар Броккру, и не прекращал работы, пока не вынул из очага то, что положил в него.\n\n- Проза Эдда, транс. Arthur Gilchrist Brodeur, Skáldskaparmál, XXXV\n\nВаши гоблины обнаружили гномьи металлы!\n\nВещество из <link=\"birdhome\"<style=\"link\"> крайнего юга</style></link>. Мягче и податливее, чем железо, карликовый металл может быть холодно кован у кузнеца и превращен в различное оружие и инструменты.\n\nРазблокировано: <link=\"dwtrinket\"><style=\"link>Dwarven Trinket</style></link>\n\nРазблокировать:\n<link=\"smithy0\"><style=\"link\">Smithy</style></link>\n\nПриводит к:\n<link=\"dwarvenToolTech\"><style=\"link> Технология: Dwarven Tools</style></link> (с <link=\"carpentryTech\"><style=\"link\"> Технология: Карпентри</style></link>"

[dwarvenToolTech]
display_name = "Технология: Dwarven Tools"
treename = "Dwarven Tools"
prerequisite = ["dwarvenTech", "carpentryTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "6,7.5"
description = "<style=\"fluff\"> После этого Локи пошел к тем гномам, которых называют Сынами Ивальди; и они сделали волосы, и Скидбладнир тоже, и копье, которое стало владением Одина, и было названо Гунгнир.\n\n- Проза Эдда, транс. Arthur Gilchrist Brodeur, Skáldskaparmál, XXXV\n\nВаши гоблины поняли, как делать инструменты из гномьего металла.\n\nПредпосылки: <link=\"dwarvenTech\"><style=\"link\"> Технология: Dwarven Metal</style></link>\n\nРазблокировать:\n<link=\"dwaxe\"><style=\"link>Dwarven Axe</style></link>\n<link=\"dwbillhook\"><style=\"link>Dwarven Billhook</style></link>\n<link=\"dwdiggingbar\"><style=\"link>Dwarven Digging Bar</style></link>\n<link=\"dwhoe\"><style=\"link>Dwarven Hoe</style></link>\n<link=\"dwpick\"><style=\"link>Dwarven Pick</style></link>\n<link=\"dwshovel\"><style=\"link>Dwarven Shovel</style></link>\n<link=\"dwspear\"><style=\"link\">Dwarven Spear</style></link> (с <link=\"weaponsTech\"><style=\"link>) Технология: Оружие</style></link>\n<link=\"dwshield\"><style=\"link\">Dwarven Shield</style></link> (с <link=\"armorTech\"><style=\"link\") Технология: деревянная броня</style></link>\n\nПриводит к:\n<link=\"clayfarmingTech\"><style=\"link\"> Технология: Clay Farming</style></link> (с <link=\"farmingTech\"><style=\"link>) Технология: Сельское хозяйство</style></link>\n<link=\"weaponsmithingTech\"><style=\"link\"> Технология: кузнечное оружие</style></link> (с <link=\"weaponsTech\"><style=\"link>) Технология: Оружие</style></link>"

[forgingTech]
display_name = "Технология: ковка"
treename = "Forging"
prerequisite = ["charcoalTech", "stoneConstructionTech"]
techLevel = "stone"
researchPointCost = 12
treeCoord = "9,4"
description = "<style=\"fluff\"> Найден холм в болотистой местности,\nгде железо спрятано в изобилии;\nТам он построил свою плавильную печь,\nТам он положил свои кожаные колокольчики.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nС углем и камнем гоблины могут начать ковку металлов.\n\nПредпосылки: <link=\"stoneConstructionTech\"><style=\"link> Технология: Каменная конструкция</style></link>, <link=\"charcoalTech\"><style=\"link> Технология: Уголь</style></link>\n\nРазблокировать:\n<link=\"ironaxe\"><style=\"link>Железный топор</style></link>\n<link=\"ironbillhook\"><style=\"link>Iron Billhook</style></link>\n<link=\"iron digging bar\"><style=\"link>Iron Digging Bar</style></link>\n<link=\"iron hoe\"><style=\"link>Iron Hoe</style></link>\n<link=\"iron pick\"><style=\"link>Iron Pick</style></link>\n<link=\"ironshovel\"><style=\"link>Iron Shovel</style></link>\n<link=\"wroughtiron\"><style=\"link\"> Кованое железо</style></link>\n\n<link=\"smithy2\"><style=\"link\">Blacksmith's Shed</style></link>\n\nПриводит к:\n<link=\"bogIronTech\"><style=\"link\"> Технология: Bog Iron</style></link>"

[bogIronTech]
display_name = "Технология: Bog Iron"
treename = "Bog Iron"
prerequisite = "forgingTech"
techLevel = "stone"
researchPointCost = 16
treeCoord = "10,4"
description = "<style=\"fluff\"> Таково железо в болотных землях,\nПротягивая водоемы,\nСкрытый хорошо для многих возрастов,\nСпрятанный в березовых лесах,\nОн не мог прятаться вечно.\nВ поисках своего брата.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nГоблины научились искать болотное железо и плавить его в пригодный для использования металл.\n\nПредпосылки: <link=\"forgingTech\"><style=\"link\"> Технология: ковка</style></link>\n\nРазблокировать:\n<link=\"bogironore\"><style=\"link>Bog Iron Ore</style></link>\n<link=\"roastedbogironore\"><style=\"link>Roasted Bog Iron Ore</style></link>\n<link=\"wetbogiron\"><style=\"link>Wet Bog Iron Ore</style></link>\n\n<link=\"bog iron collector2\"><style=\"link\">Bog Iron Collector's Shed</style></link>\n<link=\"oreroastingpit0\"><style=\"link\"> Яма для обжарки руды</style></link>\n<link=\"bloomery4\"><style=\"link>Каменная Блумерия</style></link>\n\nПриводит к:\n<link=\"ironWeaponTech\"><style=\"link> Технология: Железное оружие</style></link> (с <link=\"weaponsmithingTech\"><style=\"link>) Технология: кузнечное оружие</style></link>\n<link=\"ironArmorTech\"><style=\"link\"> Технология: Iron Armor</style></link> (с <link=\"dwarvenArmorTech\"><style=\"link>) Технология: кузнечное бронирование</style></link>\n"

