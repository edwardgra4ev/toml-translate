[hydraulicTech]
display_name = "Технология: Hydraulics"
treename = "Hydraulics"
prerequisite = ["plankTech"]
researchPointCost = 6
techLevel = "wood"
treeCoord = "3,2.5"
description = "<style=\"fluff\"> Прекрати, о катаракта, твой рев,\nПрекрати, водопад, пеня!\nДевы пены и тока,\nСидя на скалах в воде,\nНа каменных блоках в реке,\nВозьми пену и белоснежные луга\nВ твоих объятиях и в их гневе.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XL\n\nГоблины становятся все более знакомыми с работой на воде и изобрели несколько интересных приспособлений для ее управления.\n\nПредпосылки: <link=\"plankTech\"><style=\"link\"> Технология: Planks</style></link>\n\nРазблокировать:\n<link=\"screwpump\"><style=\"link\">Screw Pump</style></link>\n<link=\"wooden floodgate\"><style=\"link>Wooden Floodgate</style></link>"

[barrelTech]
display_name = "Технология: Barrelmaking"
treename = "Barrel-making"
prerequisite = ["plankTech"]
researchPointCost = 8
techLevel = "wood"
treeCoord = "4,7.5"
description = "<style=\"fluff\"> Поэтому Варрак Лапландец взял штурвал и управлял судном на севере в течение многих дней и ночей. Первой опасностью, с которой они столкнулись, был большой водоворот, грозивший поглотить корабль. Затем Варрак выбросил за борт небольшую бочку, завернутую в красные ткани и украшенную красными стримерами. Эта приманка была проглочена китом, который отправился в полет, и отбуксировал корабль в безопасное место.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто XVI: Путешествие Калевиде\n\nГоблины научились делать бочки для хранения жидкостей. Они также работают как флоатильные устройства.\n\nПредпосылки: <link=\"plankTech\"><style=\"link\"> Технология: Planks</style></link>\n\nРазблокировать:\n<link=\"wood barrel\"><style=\"link>Wooden Barrel</style></link>\n\n<link=\"pontoon bridge\"><style=\"link>Pontoon Bridge</style></link>"
