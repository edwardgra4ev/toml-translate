[stoneFortTech]
display_name = "Технология: каменные укрепления"
treename = "Stone Fortifications"
prerequisite = "stoneConstructionTech"
techLevel = "stone"
researchPointCost = 12
treeCoord = "9,6"
description = "<style=\"fluff\"> Олев построил теперь великолепный город, укрепленный башнями и рвами, вокруг кургана Калева. К нему стекалось большое количество людей, и Калевид назвал его Линданисой, в память о его матери.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. W.F. Kirby, Canto XVII: The Heroes and the Dwarf\n\nГоблины разработали военную технику в камне.\n\nПредпосылки: <link=\"stoneConstructionTech\"><style=\"link> Технология: каменная конструкция</style></link>\n\nРазблокировать:\n<link=\"stonewall\"><style=\"link>Drystone Wall</style></link>"

