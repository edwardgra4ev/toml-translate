prerequisite = ["shamanismTech", "carpentryTech"]
researchPointCost = 6
description = "Гоблины научились строить более эффективные магические структуры.\n\nПредпосылки: <link=\"shamanismTech\"><style=\"link\"> Технология: Шаманизм</style></link>, <link=\"carpentryTech\"><style=\"link> Технология: Карпентри</style></link>\n\nРазблокировать:\n<link=\"tallravenstatue\"><style=\"link\"> Статуя Высокого Ворона</style></link>"

[spirit_law]
display_name = "Оригинальное название: Songs of the Dead"
treename = "Songs of the Dead"
keyword = "shamanism"
prerequisite = "shamanismTech"
techLevel = "wood"
researchPointCost = 8
treeCoord = "4,2"
description = "<style=\"fluff\"> Однажды летом была ведьма, которая положила все сено в сарай с головой ветра. Потом пришла другая ведьма и сбила весь сарай. Ничего хорошего.\n\nMuurla, 1915. <style=\"link\"><link=\"fls\">SKS archives</link></style>.</style>\n\nШаман нашел слова, чтобы начать общение с духами леса.\n\nПредпосылки: <link=\"shamanismTech\"><style=\"link\"> Технология: Шаманизм</style></link>\n\nРазблокировать:\n<link=\"conscript spirits 01\"><style=\"link\">Conscript Spirits 1</style></link>\n<link=\"conscript spirits 02\"><style=\"link\">Conscript Spirits 2</style></link>"

[windlaw]
display_name = "Технологии: Песни ветра"
treename = "Songs of the Wind"
keyword = "shamanism"
prerequisite = "shamanismTech"
techLevel = "wood"
researchPointCost = 6
treeCoord = "4,1"
description = "<style=\"fluff\"> Я спросил его, в чем причина этого, и обнаружил, что он полностью одержим идеей, что Фины — волшебники, и особенно имеют власть над ветрами и бурями.\n\nРичард Генри Дана-младший, за два года до мачты (1840)\n\nШаман нашел слова, чтобы начать использовать ветры для своей магии.\n\nПредпосылки: <link=\"shamanismTech\"><style=\"link\"> Технология: Шаманизм</style></link>\n\nРазблокировать:\n<link=\"changewindspell\"><style=\"link\">Изменить ветер</style></link>\n<link=\"summonwindhead\"><style=\"link\">Summon Windhead</style></link>\n\n<style=\"fluff\"> Вера в то, что у финнов были магические силы, которые могли повлиять на ветры, подтверждается в эпоху викингов, и, как показывает цитата Ричарда Генри Даны, пережила Эпоху паруса. В средневековых историях не всегда ясно, имеют ли они в виду финнов или саамов, но позже вера четко отождествляется с финнами."