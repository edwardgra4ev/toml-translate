#Prerequisites: <link="windmillsTech"><style="link">Technology: Windmills</style></link>, <link="hydraulicTech"><style="link">Technology: Hydraulics</style></link>
#
#Unlocks:
#<link="sawMillTech"><style="link">Technology: Sawmills</style></link> (with <link="bogIronTech"><style="link">Technology: Bog Iron</style></link>)"""

[stoneConstructionTech]
display_name = "Технология: каменное строительство"
treename = "Stone Construction"
prerequisite = ["stoneTech", "beamTech"]
techLevel = "stone"
researchPointCost = 12
treeCoord = "8,6"
description = "<style=\"fluff\"> Они разрушили один из холмов Бога, но сделали Баббулкунд. Она резная, не построенная; ее дворцы едины с ее террасами, нет ни соединения, ни расщелины.\n\nЛорд Дансани, Падение Баббулкунда (1908)\n\nГоблины придумали, как строить каменные здания.\n\nПредпосылки: <link=\"stoneTech\"><style=\"link\"> Технология: Stone</style></link>, <link=\"beamTech\"><style=\"link> Технология: Beams</style></link>\n\nРазблокировать:\n<link=\"housing4a\"><style=\"link>Каменный и лесной коттедж</style></link>\n\nПриводит к:\n<link=\"forgingTech\"><style=\"link\"> Технология: ковка </style></link> (с <link=\"charcoalTech\"><style=\"link>) Технология: Уголь</style></link>\n<link=\"stoneFortTech\"><style=\"link\"> Технология каменных укреплений</style></link>"

