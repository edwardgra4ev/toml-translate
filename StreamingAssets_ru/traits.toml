# temperament traits

[outdoorsgoblin]
display_name = "Темперамент: Outdoorsgoblin"
keyword = "temperament"
description = "<style=\"fluff\"> Когда я был ребенком, я жил в большом\nВ жилищах моей матери;\nВ лес я пошел за ягодами,\nПошел за малиной на возвышенности,\nСобрав клубнику на горах,\nСобирались один день, потом второй.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXV\n\nЭтот гоблин любит работать на открытом воздухе и не против покинуть лагерь.\n\n<style=\"fluff\"> У каждого гоблина есть характерная черта, которая определяет, какую работу они предпочитают делать."

[camper]
display_name = "Темперамент: Кампер"
keyword = "temperament"
description = "<style=\"fluff\"> Когда сильный человек, Унтамойнен,\nПосмотрел ранним вечером,\nКак Куллерво прогрессировал,\nВ своих трудах в лесу;\nМало что было сделано,\nОн не был достоин героя.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXI\n\nЭтот гоблин предпочитает оставаться внутри лагеря.\n\n<style=\"fluff\"> У каждого гоблина есть характерная черта, которая определяет, какую работу они предпочитают делать."

[crafter]
display_name = "Темперамент: Crafter"
keyword = "temperament"
description = "<style=\"fluff\"> Удивительные вещи могут быть построены\nОт мощей этого чудовища,\nЕсли бы они были в печи кузнеца,\nИ тогда колдовство рассеется.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XL\n\nЭтот гоблин предпочитает работать в мастерской.\n\n<style=\"fluff\"> У каждого гоблина есть характерная черта, которая определяет, какую работу они предпочитают делать."

[laborer]
display_name = "Темперамент: рабочий"
keyword = "temperament"
description = "<style=\"fluff\"> Вот слова Куллервоинена:\n\"Дайте мне работу рано утром,\nВечером занятия,\nТруд, достойный твоего слуги».\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXII\n\nЭтот гоблин предпочитает ручной труд работе в мастерской.\n\n<style=\"fluff\"> У каждого гоблина есть характерная черта, которая определяет, какую работу они предпочитают делать."

# physical traits

[brawny]
display_name = "Брауни"
keyword = "physicaltrait"
strengthWorkSpeedMod = +0.2
carryingCapacityMod = +0.5
hit_point_bonus = +1
constitution_mod = +10
fight_damage_mod = +1
description = "<style=\"fluff\"> Куллервоинен делает то, что просит.\nПугает лосося силами\nЕго могучие руки и плечи,\nСила молодости и магии.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXV\n\nЭтот гоблин мощно выстроен и силен.\n\n<style=\"characteristics\"><link=\"carrying capacity def\"><style=\"link\">Carrying Capacity</style></link>: <style=\"bonus\">+0.5</style>\n<link=\"constitutionDef\"><style=\"link\">Конституция</style></link>: <style=\"bonus\">+10</style>\n<link=\"fight damage mod def\"><style=\"link\"> Модификатор боевых повреждений</style></link>: <style=\"бонус\">+1</style>\n<link=\"hitpoints\"><style=\"link\">Hit Points</style></link>: <style=\"bonus\">+1</style></style>"

[nimble]
display_name = "Нить"
keyword = "physicaltrait"
finesseWorkSpeedMod = +0.2
agility_mod = +10
fight_damage_mod = +1
shootDamageModifier = +1
toolToughness = +5
description = "<style=\"fluff\"> Мерри летает на золотом шаттле,\nИз проворных пальцев девушки,\nБыстрые качания токарного станка в ткачестве,\nБыстрый пролет гребня серебра,\nИз пальцев неба рожденной девы,\nСплетение паутины дивной красоты.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение VIII\n\nЭтот гоблин проворный.\n\n<style=\"characteristics\"><link=\"agilityDef\"><style=\"link\">Agility</style></link>: <style=\"bonus\">+10</style>\n<link=\"fight damage mod def\"><style=\"link\"> Модификатор боевых повреждений</style></link>: <style=\"бонус\">+1</style>\n<link=\"tooltoughnessDef\"><style=\"link\">Tool Toughness</style></link>: <style=\"bonus\">+5</style></style>"

[clumsy]
display_name = "неуклюжий"
keyword = "physicaltrait"
finesseWorkSpeedMod = -0.2
agility_mod = -10
shootDamageModifier = -1
toolToughness = -10
mishapChance = +20
description = "<style=\"fluff\"> Вечером третьего дня,\nЗлой Хиси хватает топор,\nЛемпо берет кривую ручку,\nОтворачивается топор в падении,\nПоражает скалы и разбивается на куски;\nИз скал отскакивают фрагменты.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение VIII\n\nЭтот гоблин чаще других страдает от несчастных случаев.\n\n<style=\"characteristics\"><link=\"agilityDef\"><style=\"link\">Agility</style></link>: <style=\"malus\">-10</style>\n<link=\"tooltoughnessDef\"><style=\"link\">Tool Toughness</style></link>: <style=\"malus>-10</style></style>"


# experience traits

[hardy]
display_name = "Харди"
keyword = "experiencetrait"
constitution_mod = +5
willpower_mod = +5
description = "<style=\"fluff\"> Мудрый и древний,\nОтветил так юный менестрель:\n\"Если ты не Джоукаайнен,\nТы дашь мне всю дорогу,\nЯ на много лет старше тебя».\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение III\n\nЭтот гоблин пережил зиму в лагере.\n\n<style=\"characteristics\"><link=\"constitutionDef\"><style=\"link\">Constitution</style></link>: <style=\"bonus\">+5</style>\n<link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"bonus\">+5</style></style>"

[scarred]
display_name = "Шрам"
keyword = "experiencetrait"
willpower_mod = +5
description = "<style=\"fluff\"> Прямой путь крепче вырос в теле,\nИ раны были соединены,\nБыстро страшная боль ушла.\nСильный и выносливый рос герой.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение IX\n\nЭтот гоблин пережил травму.\n\n<style=\"characteristics\"><link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"bonus\">+5</style></style>"

[veteran]
display_name = "ветеран"
keyword = "experiencetrait"
willpower_mod = +10
fighting_mod = +10
description = "<style=\"fluff\"> \"Что мой клинок хороший и надежный,\nДоказано на головах героев,\nПроверено много костей\".\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXVII\n\nЭтот гоблин был в бою и дожил до того, чтобы рассказать историю.\n\n<style=\"characteristics\"><link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"bonus\">+10</style>\n<link=\"fightingSkill\"><style=\"link\">Fighting</style></link>: <style=\"bonus\">+10</style></style>"

