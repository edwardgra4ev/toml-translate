# personality traits

[timid]
display_name = "твердый"
keyword = "personalitytrait"
willpower_mod = -10
agility_mod = +5
description = "<style=\"fluff\"> Если ты отправишься в лес,\nТам собирают осины-фаготы,\nНе шумите и не шумите,\nСобери все свои палки в тишине,\nСоберите тихо березовое дерево.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXIII\n\nЭтот гоблин немного глуповат.\n\n<style=\"characteristics\"><link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"malus\">-10</style>\n<link=\"agilityDef\"><style=\"link\">Agility</style></link>: <style=\"bonus\">+5</style></style>"

[hardblooded]
display_name = "кровожадный"
keyword = ["personalitytrait", "immuneToFear"]
willpower_mod = +10
description = "<style=\"fluff\"> Мой сын может видеть смертников. Он был провидцем с тех пор, как напился в Киттиле и взял на руки труп.\n\n- Enontekiö, 1930. <style=\"link\"><link=\"fls\">SKS archives</link></style>.</style>\n\nЭтот гоблин видел смерть и не вздрогнул.\n\n<style=\"characteristics\"><link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"bonus\">+10</style></style>"

[softblooded]
display_name = "мягкокровный"
keyword = ["personalitytrait"]
willpower_mod = -5
description = "Этот гоблин — нежное существо, которое отворачивается от более жестоких частей жизни.\n\n<style=\"characteristics\"><link=\"willpowerDef\"><style=\"link\">Willpower</style></link>: <style=\"malus\">-5</style></style>"

# special traits

[shamantrait]
display_name = "Шаман"
visual_priority = 1_000_000
description = "<style=\"fluff\"> Великолепно пел мудрый Вяйнямёйнен,\nДо медноносных гор,\nИ кремниевые скалы и уступы\nУслышав его волшебные тона,\nГорные скалы были разорваны на куски,\nВесь океан вздымался и опускался;\nИ отдаленные холмы перекликались.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение III\n\nЭтот гоблин был выбран своей общиной в качестве шамана."

