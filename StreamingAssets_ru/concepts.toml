# Structure tiers

[earthfasttier]
display_name = "быстрый"
description = "Очень простой стиль здания, состоящий из деревянных столбов, вбитых в землю. Земные здания быстро и легко строить, но не очень долговечны в долгосрочной перспективе. В игре они называются <b>shacks</b>."

[planktier]
display_name = "Планки и поляки"
description = "Здания, построенные из столбов и досок. Они более долговечны, чем земляные конструкции, но по-прежнему чувствительны к износу и повреждениям от погоды и других событий. Планковые здания называются <b>sheds</b>."

[beamtier]
display_name = "каюты"
description = "Более крепкие здания построены из взаимосвязанных деревянных балок. Стены, построенные из балок, очень твердые, но в конечном итоге разрушаются, если балки находятся в постоянном контакте с землей. Эти здания называются <b> кабины </b>."

[cottagetier]
display_name = "Коттеджи"
description = "Структуры, построенные из комбинации камня и дерева, называются коттеджами."

[stonetier]
display_name = "Каменное строительство"
description = "Структуры, собранные из добытого камня. Они очень жесткие, могут длиться почти вечно, но требуют много работы и времени для строительства."

[bricktier]
display_name = "Кирпичная конструкция"
description = "Структуры, построенные из обожженных глиняных кирпичей. Кирпичная конструкция не такая прочная, как твердый камень, но ее гораздо проще построить."

# Structure types etc

[firehazard]
display_name = "Опасность пожара"
description = "Это здание использует огонь для приготовления пищи или крафта и генерирует искры, которые могут вызвать пожары рядом с ним. Будьте осторожны, где вы его размещаете!"

[workshop]
display_name = "Семинары"
description = "Мастерские превращают сырье в инструменты, более совершенные материалы или другие полезные вещи. Работники назначаются на семинары автоматически при заказе предметов в <link=\"second tutorial\"><style=\"link\">stock manager</style></link>."

[potteryworkshop]
display_name = "Поттер"
description = "Поттеры преобразуют <link=\"rawClay\"><style=\"link\">clay</style></link> в полезные предметы, такие как горшки.\n\nPottery <link=\"workshop\"><style=\"link\">workshops</style></link> включает в себя <link=\"potter0\"><style=\"link\">Potter's Yard</style></link>."

[smithyworkshop]
display_name = "Смити"
description = "<link=\"smithy0\"><style=\"link\">Smithies</style></link> являются <link=\"workshop\"><style=\"link\">workshops</style></link> этот процесс <link=\"dwarvenTech\"><style=\"link\">metals</style></link>."

# Terrain types

[claysoil]
display_name = "Глиняная почва"
description = "Более тяжелые глинистые почвы встречаются в низменных районах. Эти места обычно проводили большое количество времени под водой, когда ледники таили, и вода отвоевала более легкие почвы. Глиняные почвы труднее работать и требуют <link=\"shovel\"><style=\"link\">более тяжелых инструментов</style></link>, но являются более <link=\"fertility\"><style=\"link\">fertile</style></link> и сохраняют питательные вещества из удобрений более эффективно, чем более легкие почвы.\n\nЕсли много трафика проходит через глиняную плитку, она вырождается в <link=\"mud\"><style=\"link\">mud</style></link>, что замедляет движение.\n\nНекоторые растения <link=\"florapreferences\"><style=\"link\">предпочитают </style></link> расти в глинистых почвах."

[sandsoil]
display_name = "Песчаная почва"
description = "Наиболее распространенным типом почвы в северном климате, который когда-то был под ледниками, является ледниковая долина, преимущественно песчаная почва с глиной и гравием, смешанным в ней. Эта долина была сформирована, когда ледник поднял почву и размыл камни, по которым она текла, и отложился, когда она уходила. Песчаная почва относительно проста в работе, и ее можно переворачивать и копать простыми инструментами, но она не очень <link=\"фертильность\"><style=\"link\">fertile</style></link>. Из-за того, что песок рыхлый, он не очень хорошо сохраняет питательные вещества, а удобрения только частично эффективны.\n\nЕсли через песчаную плитку проходит много трафика, она вырождается в <link=\"mud\"><style=\"link\">mud</style></link>, что замедляет движение.\n\nНекоторые растения <link=\"florapreferences\"><style=\"link\">предпочитают</style></link> песчаную почву."

[underworldtile]
display_name = "Исполнитель: Underworld Tile"
description = "По мере того, как спреды вашего лагеря <link=\"culturedef\"><style=\"link\">culture</style></link>, все больше и больше плиток на карте приобретут атрибут подземного мира. Некоторые растения будут расти только на подземных плитках."

# Tools

[efficiencydef]
display_name = "Эффективность"
description = "Эффективность инструмента — это мера того, насколько легче он делает работу. Эффективность инструмента умножает труд пользователя. Например, гоблин, использующий инструмент с эффективностью 2.0, может получить столько же работы, сколько два гоблина без инструментов.\n\nОбратите внимание, что некоторые работы, такие как вырубка деревьев, не могут быть выполнены без соответствующих инструментов."

[tooltoughnessDef]
display_name = "Инструмент жесткости"
description = "Прочность инструмента или <link=\"weapondef\"><style=\"link\">weapons</style></link> определяет, насколько вероятно, что он выйдет из употребления. Чем выше жесткость, тем меньше вероятность того, что предмет сломается."

# Materials

[woodmaterial]
display_name = "Древесина"
description = "Северные леса полны полезной древесины. В то время как ручки и другие части более продвинутых инструментов могут быть сделаны из дерева, деревянные инструменты и <link=\"weapondef\"><style=\"link\">оружие </style></link> относятся конкретно к предметам, где бизнес-конец сделан из дерева, таким как палка для копания или деревянное копье. Древесина является относительно мягким материалом для этого, поэтому деревянные инструменты и оружие будут относительно легко ломаться, а деревянное оружие будет изо всех сил пробивать броню.\n"

[bonematerial]
display_name = "косточка"
description = "Кость является полезным материалом для инструментов и оружия, так как она проста в работе и может держать очень острый край."

[irondef]
display_name = "железо"
description = "Железо является полезным материалом для инструментов, <link=\"weapondef\"><style=\"link\">оружие</style></link> и броня, так как оно намного тяжелее гномового металла или любых органических материалов. Железо плавится только при высоких температурах, поэтому для производства железных артефактов требуется кузница. Железные инструменты иногда можно найти в <link=\"ruinsdef\"><style=\"link\">ruins</style></link>."

# Combat

[armorAndDamage]
display_name = "Броня и повреждения"
description = "<style=\"fluff\"> Потом кузнец Ильмаринен,\nИзвлек из пояса свой широкий меч,\nИз ножен его лезвие чести,\nПытался убить щуку Нортленда\nс оружием его ковки;\nНо он разбил меч на куски,\nНе навредил водному чудовищу.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XL\n\nБроня увеличивает значение брони существа</b>. Значение брони - это сумма бонусов брони существа <link=\"hitpoints\"><style=\"link\">hit points</style></link>.\n\nКогда существо подвергается нападению, если значение ущерба от нападения превышает значение его брони, оно получает статус повреждения. Последствия состояния повреждения зависят от его типа. Типы повреждений включают <link=\"dtcrushing\"><style=\"link\">crushing</style></link>, <link=\"dtslashing\"><style=\"link\">slashing</style></link> и <link=\"dtburning\"><style=\"link\">burning</style></link>."

[dangerous_object_def]
display_name = "Опасный объект"
description = "Этот предмет на самом деле не предназначен для использования в качестве оружия, но если вы получите удар с ним, это будет больно! Опасные предметы наносят двойной урон по сравнению с другим самодельным оружием."

[dtburning]
display_name = "Сжигание повреждений"
description = "<style=\"fluff\"> Прямая дорога Огонь начал его рев,\nтрудился, чтобы поглотить брата своего,\nЕго любимый младший брат.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение IX\n\nОгонь опасен для всего живого и наносит горящий ущерб."

[dtcrushing]
display_name = "Сокрушительный ущерб"
description = "Сокрушительный ущерб в основном наносится <link=\"wthammer\"><style=\"link\">Hammer</style></link> <link=\"weapondef\"><style=\"link\">weapons</style></link>. Ущерб от разрушения, как правило, менее изнурительный, чем <link=\"dtslashing\"><style=\"link\">slashing damage</style></link>. Броня преобразует урезание повреждений в дробление повреждений."

[dtslashing]
display_name = "Сокращение ущерба"
description = "<style=\"fluff\"> Лемпо направляет заточенный топор,\nИ вены упали Hiisi severs.\nБыстрый поток крови,\nИ ручей малинового цвета.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение VIII\n\nПовреждение резка производится всеми видами ребра и тяги <link=\"weapondef\"><style=\"link\">оружие</style></link>, а также когти и зубы. Броня преобразует повреждение резания в <link=\"dtcrushing\"><style=\"link\">crushing damage</style></link>."

[improvweapon]
display_name = "Импровизированное оружие"
description = "Этот предмет на самом деле не предназначен для использования в качестве оружия, поэтому любой, кто вооружен им, подвергается наказанию за их <link=\"fightingSkill\"><style=\"link\"> Боевой навык </style></link>. Импровизированное оружие обычно требует использования обеих рук."

[largeweapon]
display_name = "Большое оружие"
description = "Большие орудия берутся двумя руками за оружие и поэтому не могут использоваться вместе со щитом."

[reachweapon]
display_name = "достигать"
