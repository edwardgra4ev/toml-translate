# Fluff

[birdhome]
display_name = "Птичий дом"
description = "<style=\"fluff\"> Говорят, что птичий дом находится в теплых землях, куда птицы мигрируют осенью. (...) В Оулу когда-то видели человека из Птичьего дома: они были так малы, что не могли дотянуться до колена человека, чтобы ударить его, но выглядели так, будто у них была борода.\n\nPudasjärvi. <style=\"link\"><link=\"fls\">SKS архивы</link></style>.</style>\n\n\nКак и многие сибирские народы, предки финнов считали, что земля плоская, а небо искривлено над ней, как палатка. Северная Звезда была самой высокой точкой неба, поэтому чем дальше на юг вы шли, тем ниже было небо, пока оно не встретило землю. Поэтому было понятно, что на крайнем юге люди должны быть <link=\"dwarves\"><style=\"link\"> очень короткими</style></link>, потому что небо так близко. Зимой мигрирующие птицы летали на юг, а финны до сих пор называют Млечный Путь птичьим следом. Считалось, что лето птицы провели на крайнем юге, поэтому называли его линтукото, птичьим домом. Финны верили, что пока птицы там, они будут сражаться с гномами Птичьего дома за еду. По какой-то причине считалось, что краны и гномы питают особую ненависть друг к другу. Вот почему краны иногда опускают <link=\"dwtrinket\"><style=\"link\">dwarven trinkets</style></link>, когда они возвращаются с юга."

[dwarves]
display_name = "Гномы"
description = "<style=\"fluff\"> Согласно народной сказке, люди Птичьего дома были очень маленькими гномами. История не помнит, откуда они родом, но финны, которые раньше ездили на грузовиках в Санкт-Петербург, сказали, что видели там гномов из птичьего дома.\n\n- Sortavala. <style=\"link\"><link=\"fls\">SKS архивы</link></style>.</style>\n\nУменьшительные уроженцы <link=\"birdhome\"><style=\"link\"> Bird-home</style></link>, гномы путешествуют по всему миру. Они известны своим <link=\"dwarvenTech\"><style=\"link\">metalwork</style></link> и своей любовью к алкоголю."

[fls]
display_name = "Финское литературное общество SKS"
description = "<style=\"fluff\"> Соберу ли я эти песни вместе?\nОт холода и мороза собирают их?\nПринесу ли я это гнездо ящиков,\nХранители золотых легенд,\nЗа стол в моей каюте,\nПод расписными стропилами,\nВ этом знаменитом и древнем доме?\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), проем\n\nФинское литературное общество SKS является культурной организацией, основанной в 1831 году для сбора и записи финского наследия и продвижения финской культуры и литературы. SKS ведет обширные архивы финской народной и устной культуры, которые восходят к оригинальному произведению Элиаса Лённрота, которое привело к <style=\"link\"><link=\"kalevala\">Kalevala</link></style>.\n\nЦитаты из материалов SKS в игре взяты из коллекции легенд веры, использованной с разрешения Финского литературного общества. Материал был собран со всей Финляндии в течение 19 и 20 веков. Тексты были переведены и адаптированы Майклом Халилой, Korppi Games."

[grimm]
display_name = "Сказки Гримма"
description = "Коллекция немецких народных сказок, опубликованных братьями Якобом и Вильгельмом Гриммом с 1812 года, вероятно, вдохновила на создание «стиля = «ссылка»> «ссылка = «калевала»> Калевала</link></style>»."

[kalevala]
display_name = "Калевала"
description = "<style=\"fluff\"> Овладевая импульсивным желанием,\nСильное внутреннее побуждение,\nТеперь я готов петь,\nГотовы начать пение.\n\n- Калевала, транс. Джон Мартин Кроуфорд (1888), проем\n\nФинский национальный эпос, созданный Элиасом Лённротом (1802-1884) на основе традиционной финской и карельской поэзии. Лённрот сильно отредактировал устную поэзию, чтобы создать единую христианско-националистическую эпопею своего собственного дизайна.\n\nЦитаты из Калевалы в лагере Гоблин взяты из перевода на английский язык 1888 года Джона Мартина Кроуфорда. Написание имен восстановлено в надлежащей финской форме."

[kalevipoeg]
display_name = "Калевипог"
description = "Эстонский национальный эпос, созданный Фридрихом Рейнхольдом Крейцвальдом (1803-1882). Крейцвальд окончил медицинский факультет Тартоского университета в 1833 году и заинтересовался эстонским фольклором. Вдохновленный публикацией в 1835 году «Kalevala» («Калевала»), он начал работать над эпической поэмой, основанной на эстонских народных сказках. Это стало Калевипоэгом, Сыном Калева, изданным в 1853 году, но запрещенным русскими цензорами. В ней рассказывается о приключениях могущественного гиганта Сохни, сына Калева, в Эстонии, Финляндии и за рубежом.\n\nЦитаты из Калевипоэга в лагере Гоблин взяты из перевода прозы У. Ф. Кирби 1894 года на английский язык."

[underworld_fluff]
display_name = "Подземный мир"
description = "Подземный мир является домом гоблинов.\n\n<style=\"fluff\"> Подземный мир в финнической мифологии - это другое, более темное место, где обитают духи и существа, такие как гоблины. Это не злое место, а среда, похожая на средний мир."

# Loading screen texts

[loading1]
description = "В первобытные времена дева,\nКрасивая дочь эфира,\nПрошла через века своего существования\nВ великом пространстве небесном,\nО'эр, прерии еще не разрослись."

[loading2]
description = "Семьсот лет она блуждала,\nДевять лет существования человека,\nСплюнь океан сюда, туда,\nОн не мог подняться над водой."

[loading3]
description = "Там, где ее рука повернулась к воде,\nВозник плодородный холм;\nГде же ее нога отдыхала,\nТам она сделала отверстие для рыб."

[loading4]
description = "Там, где ее голова была направлена к земле,\nПоявились широкие бухты и заливы;\nКогда с берега она проплыла расстояние,\nИ на спине ее она отдыхала,\nТам камни, которые она сделала и смоделировала."

[loading5]
description = "Ветхий Завет (Ветхий Завет)\nС ногами на острове,\nНа омываемом океаном острове,\nШирокий простор, лишенный зелени."

[loading6]
description = "Кто за него посеет остров,\nКто для него должен разбрасывать семена;\nВ конце концов, подумал Пеллервоинен,\nПервородный из равнин и прерий."

[loading7]
description = "Кого должны разбрасывать семена леса.\nИ, таким образом, соглашаясь,\nСеет с усердием остров,\nСемена на землях, которые он разбрасывает."

[loading8]
description = "Вскоре плодородные семена проросли,\nВскоре деревья стали расти,\nВскоре появились верхушки ели,\nИ сосны были далеко разбросаны."

[loading9]
description = "Теперь герой, Вяйнямёйнен,\nВстает ввысь, чтобы посмотреть на него,\nКак растут семена Сампсы,\nКак обрабатывается калия;\nВидит, как густо распространяются молодые деревья,\nВидит, как лес поднимается в красоте."

# Tutorials

[first_tutorial]
display_name = "Добро пожаловать в лагерь Гоблин!"
description = "Одной из ваших самых важных задач является сохранение ваших гоблинов <link=\"food sources\"><style=\"link\">fed</style></link>. Если они проголодаются, они уйдут!\n\nНомер в верхнем левом углу экрана показывает, сколько месяцев у вас есть запасы еды. Если рядом с ним красный индикатор, то вы, вероятно, не производите достаточно пищи, чтобы кормить гоблинов!\n\nГоблины едят сами по себе, но им нравится есть на <link=\"kitchendef\"><style=\"link\">kitchens</style></link>. Если у вас есть еда, это хорошая идея, чтобы построить кухню.\n\nОбратите внимание, что для того, чтобы построить конструкцию, вам не нужно приобретать материалы заранее. Просто выберите структуру, постройте ее, и гоблины получат то, что им нужно.\n\nСферы уведомлений в верхней части экрана содержат важную для вас информацию. Взгляните на них, чтобы начать доставлять гоблинам что-нибудь поесть.\n"

[second_tutorial]
display_name = "Хранение и фондовый менеджер"
description = "Когда ваши гоблины найдут полезные вещи в новом мире, они будут перечислены в Фондовом менеджере.\n\nВы также можете использовать менеджера по акциям, чтобы установить цели для предметов. Например, если вы нашли несколько грибов <link=\"mushroom\"><style=\"link\">mushrooms</style></link>, вы можете установить целевое число грибов в Менеджере по запасам, и ваши гоблины постараются увидеть, что у вас есть хотя бы столько грибов в любое время.\n\nГоблины умные существа (ну, иногда), и они могут понять, как делать вещи. Таким образом, вам не нужно устанавливать целевые показатели фондового менеджера для компонентов. Например, если вы хотите, чтобы ваши гоблины построили <link=\"stoneaxe\"><style=\"link\">stone axes</style></link>, вам не нужно устанавливать цель для <link=\"branch\"><style=\"link\">branches</style></link>. Гоблины поймут, что им нужно получить ветки и сделать это.\n\nЕсли предметы останутся лежать, они разлагаются и в конечном итоге будут уничтожены. Чтобы этого избежать, вашим гоблинам понадобятся места для <link=\"storage\"><style=\"link\">store</style></link> items. Правильно хранимые предметы будут распадаться медленнее или вообще не будут. Предметы могут храниться в складах или запасах.\n\nЕсли вы нажмете на элемент, кнопка «Заявление» означает, что гоблины будут использовать его и хранить его надлежащим образом. Кнопка \"Игнорировать\" означает, что они оставят ее там."

[defence_tutorial]
display_name = "Защитите свой лагерь"
description = "Этот новый мир может быть опасным местом, и вы должны думать о защите своего лагеря от врагов.\n\nВ начале игры доступны два вида защиты: укрепления и здания охраны. Укрепления могут замедлить врагов и затруднить им доступ к вашим гоблинам или зданиям. Вы также можете копать защитные рвы, даже рвы, чтобы защитить свой лагерь.\n\nОбычно, однако, вам понадобится охрана, чтобы защитить свой лагерь. Гоблины могут быть автоматически призваны на временную караульную службу. Вы можете отрегулировать, сколько гоблинов написано в окне Джобса. Составленные гоблины активируются, когда враги находятся рядом, и вооружаются ближайшим импровизированным оружием. Они не будут использовать щиты или броню.\n\nВы можете назначить гоблинов штатными охранниками, построив охранное здание. Выбор караула позволяет вам решить, как оборудован гоблин. Стражи будут сражаться с врагами, которые атакуют ваш лагерь.\n\nПри строительстве охранных зданий помните, что не слишком много гоблинов находятся на караульной службе или иным образом не заняты работой в лагере, или рабочие места будут быстро накапливаться."

[jobs_tutorial]
display_name = "Работа"
description = "У ваших гоблинов много работы!\n\nКогда вы говорите своим гоблинам что-то делать, например, строить структуру или рубить дерево, они получают работу. Срубить дерево — это одна работа, но построить здание — это много работы: подготовка земли, получение материалов, доставка их на строительную площадку и так далее.\n\nВы можете увидеть, сколько незавершенных рабочих мест у ваших гоблинов, посмотрев на количество рабочих мест в верхней строке. Он показывает количество выдающихся рабочих мест на одного гоблина. Если число зеленое, то рабочих мест не так много; когда оно становится желтым, на одного гоблина приходится несколько рабочих мест. Оранжевый и красный означают много работы.\n\nВы можете увидеть, какие работы являются выдающимися, нажав кнопку «Вакансии» в нижней части экрана. В нем будет отображаться список всех рабочих мест, а также кнопка, на которой можно изменить приоритеты работы. Работа, которая не может быть выполнена прямо сейчас; им нужен инструмент или компонент, или какая-то другая работа должна быть завершена, прежде чем они могут быть выполнены.\n\nБудьте осторожны, чтобы не назначать слишком много рабочих мест своим гоблинам! Если число рабочих мест очень велико, дайте гоблинам минутку, чтобы очистить их отставание, или дела не будут выполнены.\n"

[mud_tutorial]
display_name = "грязь"
description = "Грязь появилась в вашем лагере!\n\nКогда гоблины ходят по плитке, она становится изношенной. Когда плитка становится достаточно изношенной, она превращается в <link=\"mud\"><style=\"link\">mud</style></link>. Грязь довольно сильно замедляет движение!\n\nЧтобы вашим гоблинам было легче передвигаться по лагерю, рассмотрите возможность покрытия грязевых плиток дорогами, например <link=\"duckboard\"><style=\"link\">duckboards</style></link>."

[basic_tools_tutorial]
display_name = "Основные инструменты"
description = "Чтобы ваш лагерь работал, рекомендуется открыть <link=\"second tutorial\"><style=\"link\">stock manager</style></link> и заказать некоторые <link=\"basictoolsdef\"><style=\"link\">basic tools</style></link>.\n\n<link=\"stoneaxe\"><style=\"link\"> Каменные топоры</style></link> необходимы для вырубки деревьев и рубки дров. <link=\"diggingstick\"><style=\"link\"> Копающие палочки </style></link> используются для изменения уровня земли и удаления пней деревьев. <link=\"claypot\"><style=\"link\"> Глиняные горшки </style></link> являются вашими первыми доступными ведрами для тушения пожаров.\n\nЕсли вы закажете эти инструменты в менеджере акций, гоблины создадут их, или появятся уведомления, сообщающие вам, что вам нужно для их создания."

[ruins_tutorial]
display_name = "Руины"
description = "Ваши гоблины увидели некоторые заросшие руины в лесу.\n\nВ руинах можно найти интересные и полезные вещи, но будьте осторожны! Руины, вероятно, будут глубоко в <link=\"forestcover\"><style=\"link\">forest-cover</style></link>. Лесной покров выглядит как туман на карте, и если вы закажете в него гоблинов, они заблудятся.\n\nЛесной покров можно очистить, вырубив деревья и кусты, или построив <link=\"ravenstatue\"><style=\"link\">raven statues</style></link>.\n\nНа карте больше руин, чем на первых, и все они содержат предметы, которые стоит открыть.\n"

[sacrifice_tutorial]
display_name = "Жертвы"
description = "Каждое лето гоблины делают <link=\"sacrifice def\"><style=\"link\">жертвы</style></link> Хранителям <link=\"деревянники\"><style=\"link\">леса</style></link> и <link=\"водоводы\"><style=\"link\">река</style></link>.\n\nЧтобы принести жертвы, создайте <link=\"bonfire\"><style=\"link\">bonfire</style></link>. В начале лета вам предложат менеджера жертвоприношений, где вы выберете, чем пожертвовать. Затем гоблины отнесут жертвенные предметы к костру, а когда наступит лето, зажгут его. Жертвенные предметы, которые вам нужны, определяются тем, какие структуры вы построили. Например, для каждого <link=\"fishing1\"><style=\"link\">fisher-goblin's shack</style></link>, который вы строите, водопроводчики будут ожидать одну <link=\"ceremonialfish\"><style=\"link\">ceremonial fish</style></link> в качестве жертвы. Жертвенные предметы можно заказать в <link=\"second tutorial\"><style=\"link\">stock manager</style></link>, как и любые другие предметы.\n\nЖертвы предоставляют <link=\"culturedef\"><style=\"link\">culture points</style></link> и повышают уровень <link=\"sac tree def\"><style=\"link\">sacrificial tree</style></link>. Вам не нужно идти на жертвы, но будьте осторожны: духи разозлятся!"

[tech_tutorial]
display_name = "Технология"
description = "Теперь у вас достаточно <link=\"researchpoints\"><style=\"link\">research points</style></link>, чтобы открыть новую технологию! Технологии открывают новые элементы и структуры и пути к новым технологиям.\n\nТехнологическая кнопка в нижней части экрана открывает технологическое дерево. В дереве есть два вида технологий. Некоторые из них могут быть разблокированы с помощью точек исследования, а некоторые - путем обнаружения предмета или события в игре.\n\nТочки исследования накапливаются каждый сезон. Вы можете получить больше точек исследования, призвав <link=\"sac tree def\"><style=\"link\">жертвенное дерево</style></link> и сделав <link=\"sacrifice def\"><style=\"link\">жертвы</style></link>, чтобы выровнять его."

[shaman_tutorial]
display_name = "шаманизм"
description = "Теперь у вас есть гоблин, который имеет право быть назначенным <link=\"shaman def\"><style=\"link\">shaman</style></link>. Шаман - это специалист по ритуалам, который может общаться с духами мертвых и получить доступ к подземному миру.\n\nШаман может использовать <link=\"vaki def\"><style=\"link\">väki</style></link> для заклинаний. Вы можете разблокировать больше заклинаний, исследуя магические технологии.\n\nЧтобы назначить шамана, создайте <link=\"shamanhut\"><style=\"link\">shaman's hut</style></link>."

[reachability_tutorial]
display_name = "достижимость"
description = "Достижимость - это техническая концепция в лагере Гоблин.\n\nЧтобы определить, можно ли получить доступ к структуре или предмету, или если гоблин застрял где-то, игра проверяет, может ли он найти путь от него к центру лагеря. Центром лагеря является либо вратная скала, либо, если она была вызвана, жертвенное дерево. Если игра не может найти такой путь, объект помечается как недостижимый.\n\nТак что не стройте свой лагерь таким образом, чтобы были сооружения, до которых нельзя добраться от шлюзовой скалы или жертвенного дерева. Если гоблин отмечен как недосягаемый, постарайтесь убедиться, что у него есть путь к шлюзовой скале или жертвенному дереву."

[last_tutorial]
display_name = "Наслаждайтесь лагерем Гоблин!"
description = "Теперь вы прочитали все учебники для лагеря Гоблин. Наслаждайтесь игрой!"

[nettle_farming_tutorial]
display_name = "Скотоводство"
description = "Сельскохозяйственный участок, засаженный семенами крапивы, будет производить растения крапивы. Они должны быть обработаны в <link=\"nettleprocessing\"><style=\"link\">nettleyard</style></link>, чтобы получить <link=\"nettleseedbag\"><style=\"link\">nettle seeds</style></link>, съедобный <link=\"nettlebunch\"><style=\"link\">nettle leaves</style></link> и <link=\"nettlestems\"><style=\"link\">nettle stems</style></link>, которые могут быть сведены в волокно.\n\nВы можете сделать это, построив крапивный двор и заказав крапивные листы или стебли крапивы в менеджере по запасам."

