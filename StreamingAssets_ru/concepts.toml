# 1.0 Game intro texts

[demointro]
description = "На протяжении веков пути между мирами были закрыты.\n\nНо теперь как будто ветер дул и тряс Великое Дерево, и ворота снова открываются.\n\nНебольшая группа любопытных гоблинов, спасающихся от жестокого правления короля Гоблина подземного мира, нашла портал в среднее царство. За его пределами находится красивый, но опасный северный лес. Любопытные гоблины хотели бы сделать для себя в нем новый дом. Теперь вам предстоит вести их по пути в новый мир."

[endOfDemo]
display_name = "Демо-конец"
description = "Спасибо за демо-версию Goblin Camp!\n\nНадеемся, вам понравилось пробовать нашу игру. Если вам понравилось то, что вы увидели, пожалуйста, <style=\"link\"><link=\"steam\"> купите полную версию в Steam</style></link>.\n"

[gameOver]
display_name = "Игра закончена"
description = "Все гоблины либо погибли, либо покинули лагерь!\n\nВозможно, однажды путешественник наткнется на остатки вашего лагеря и задастся вопросом, что случилось с людьми, которые здесь жили. Но на данный момент сайт заброшен и заброшен."

