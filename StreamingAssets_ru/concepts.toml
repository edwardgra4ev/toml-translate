# 5.1 Farming bonuses

[campbonus_def]
display_name = "Кэмп Бонус"
description = "Лагерные бонусы - это бонусы, которые ваш лагерь получил, которые улучшают производительность ваших гоблинов на некоторых мероприятиях в лагере. Их можно разблокировать, исследуя технологии."

[improved_harvesting_def]
display_name = "Улучшенный сбор урожая"
description = "По мере того, как растет их опыт ведения сельского хозяйства, ваши гоблины научились более эффективно собирать поля."

[improved_sowing_def]
display_name = "Улучшенный посев"
description = "По мере того, как ваши гоблины становятся более опытными в сельском хозяйстве, они научились более эффективно сажать семена, что значительно ускоряет посев."

# Farming interface texts

[now_indicator]
display_name = "Теперь"
description = "Текущий <link=\"календарь\"><style=\"link\">date</style></link>"

[muckingdef]
display_name = "гребаный"
description = "Смачивание поля означает повышение его <link=\"fertility\"><style=\"link\">fertility</style></link> путем внесения на фермерский участок предметов со значениями фертильности."

[tilling]
display_name = "Пока"
description = "Сельскохозяйственный участок должен быть обработан, прежде чем семена могут быть посеяны. Подбор <link=\"sandsoil\"><style=\"link\">sandy soil</style></link> может осуществляться вручную, но инструмент <link=\"digging\"><style=\"link\">digging tool</style></link> ускорит работу. Для перегонки <link=\"claysoil\"><style=\"link\">clay soils</style></link> требуется <link=\"shovel\"><style=\"link\">metal tools</style></link>.\n\nНа фазе обработки любые предметы со значениями фертильности на сельскохозяйственном участке будут всасываться в почву и вносить свой вклад в участок <link=\"fertility\"><style=\"link\">fertility</style></link>.\n\nПоскольку он рыхлый, <link=\"sandsoil\"><style=\"link\">sandy почва</style></link> не очень хорошо сохраняет питательные вещества, а удобрения только частично эффективны.\n"

[sowing]
display_name = "соу"
description = "Для выращивания сельскохозяйственных культур необходимо сеять семена в <link=\"tilling\"><style=\"link\">tilled</style></link> почву."

[harvest]
display_name = "урожай"
description = "Зрелые культуры будут собраны."

