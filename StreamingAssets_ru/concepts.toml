# 3.0 General concepts

[water]
display_name = "вода"
description = "<style=\"fluff\"> Старейшая из них – вода.\nМагия - дитя морской пены.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение III\n\nВода полезна для питья и тушения пожаров, но опасна в больших количествах."

[workshop_efficiency]
display_name = "Семинар Эффективность"
description = "Эффективность работы мастерской <link=\"workshop\"><style=\"link\">workshop</style></link></b> заключается в том, насколько быстрее работает гоблин. Мастерская с эффективностью +20% означает, что гоблин завершит все, что они там делают, обычно создавая предмет или готовя еду, намного быстрее."

# 3.1 Central concepts

[foodpoint]
display_name = "Еда"
description = "Питательная ценность пищи измеряется в <b> точках питания </b>. Один гоблин нуждается в одном продукте питания каждый сезон, чтобы выжить. Они также нуждаются в определенных питательных веществах в пище. Если гоблины не получают достаточно <link=\"fiber\"><style=\"link\">fiber</style></link> или <link=\"protein\"><style=\"link\">protein</style></link>, или достаточно <link=\"fresh\"><style=\"link\">fresh food</style></link>, они будут страдать от дефицита питательных веществ.\n\nГоблины могут есть пищу, хранящуюся в лагере, но они счастливее, когда могут есть на кухнях. Каждая кухня готовит пищу для гоблинов, равную их вместимости, и старается приготовить блюдо, включающее все необходимые питательные вещества."

[population_def]
display_name = "Население"
description = "Ваше население - это общее количество жителей, которое имеет ваше поселение. Если лагерь производит достаточно пищи, чтобы прокормить своих жителей, и никто из них не умер в последнее время, больше гоблинов могут решить попытать счастья в среднем мире и присоединиться к вашему лагерю.\n\nЕсли в вашем лагере есть <link=\"shaman def\"><style=\"link\">shaman</style></link>, они также могут увеличить ваш <link=\"population def\"><style=\"link\">population</style></link>, отбрасывая <link=\"summongoblins\"><style=\"link\">Summon Goblins</style></link>."

[sac_tree_def]
display_name = "Жертвенное дерево"
description = "Жертвенное дерево является церемониальным центром лагеря гоблинов. Он содержит портал в <link=\"underworld fluff\"><style=\"link\">underworld</style></link> и действует как центр гоблина <link=\"culturedef\"><style=\"link\">culture</style></link>. Дерево может быть вызвано <link=\"shaman def\"><style=\"link\">shaman</style></link>.\n\nЖертвенное дерево предоставляет бонусы к <link=\"researchpoints\"><style=\"link\">research</style></link> и <link=\"vaki def\"><style=\"link\">väki</style></link>. По мере того, как гоблины делают <link=\"sacrifice def\"><style=\"link\">sacrifices</style></link>, дерево выравнивается и бонусы увеличиваются."

# 3.2 Other concepts

[adjacencyDef]
display_name = "Соседство"
description = "Некоторые здания получают бонусы, когда они построены рядом с другими зданиями. Например, рыбацкая мастерская <link=\"fishingworkshop\"><style=\"link\">fishing workshop</style></link> может совместно использовать инструменты и материалы плотника <link=\"carpenter\"><style=\"link\">, поэтому рыболовная мастерская будет работать более эффективно, если рядом с ней есть плотник."

[calendar]
display_name = "Расписание"
description = "Год гоблина делится на четыре сезона по три месяца каждый. Изюминкой года является <link=\"sacrifice def\"><style=\"link\"> Midsummer</style></link>, а новый год начинается в начале осени."

[claim]
display_name = "Претензия"
description = "<b>Назначение </b> элемента направит жителей вашего лагеря на его получение и поместит его в <link=\"storage\"><style=\"link\">storage</style></link>, чтобы его можно было использовать позже."

[claimed_workshop]
display_name = "Заявить на семинар"
description = "Когда гоблин <b> требует <link=\"workshop\"><style=\"link\">workshop</style></link></b>, всякий раз, когда работа назначается этому семинару, она будет назначена гоблину, который утверждал ее, если это вообще возможно. Только если этот гоблин недоступен, другой гоблин получит работу."

[combat]
display_name = "сражаться"
description = "<style=\"fluff\"> После того, как будет дан последний бой,\nИ голова твоя будет разрублена на куски;\nУдарь умом, или ты погибнешь,\nУдарь и сделай все возможное для Нортленда.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXVII\n\nБой происходит, когда два существа вступают в бой. Они используют свои соответствующие <link=\"fightingSkill\"><style=\"link\"> Борьба с навыками </style></link>, чтобы попытаться <link=\"armorAndDamage\"><style=\"link\">damage</style></link> друг друга."

[culturedef]
display_name = "Культура"
description = "Поскольку гоблины процветают в среднем мире, они меняют его по своему образу и подобию. Это напоминает <link=\"underworld fluff\"><style=\"link\">underworld</style></link> они из. Культурная ценность лагеря — мера того, насколько сильно влияние гоблинов. По мере того, как ценность культуры становится выше, все больше и больше плиток вокруг порталов в подземный мир получают атрибут <link=\"underworldtile\"><style=\"link\">underworld</style></link>.\n\nКультуру приобретает <link=\"sacrifice def\"><style=\"link\">sacrificing</style></link> items in a <link=\"bonfire\"><style=\"link\">bonfire</style></link> at Midsummer."

[fishing_value_def]
display_name = "Рыбная ценность"
description = "Эта величина представляет собой количество рыбы, которое может быть извлечено за один год без истощения промысла.\nЧрезмерный вылов приведет к постоянному сокращению количества рыбы."

[florapreferences]
display_name = "Предпочтения растений"
description = "Разные растения предпочитают расти в разных местах. Некоторые растения нуждаются в обильном солнечном свете, в то время как другие предпочитают <link=\"shade\"><style=\"link\">shade</style></link>. Некоторые виды грибов нуждаются в тени для роста. Растения также могут предпочесть <link=\"sandsoil\"><style=\"link\">sandy</style></link> или <link=\"claysoil\"><style=\"link\">clay</style></link> почв.\n\nФлора чаще появляется в плитках с подходящими для них условиями, а некоторые растения вообще не будут расти в неподходящих условиях."

[food_waste]
display_name = "Пищевые отходы"
description = "Если набор <link=\"kitchendef\"><style=\"link\">kitchen</style></link> позволяет использовать пищевые отходы, это означает, что кухня будет готовить еду со всеми необходимыми <link=\"nutrientdef\"><style=\"link\">питательные вещества</style></link>, даже если это означает приготовление большего количества пищи, чем нужно гоблинам, питающимся на кухне."

[forestcover]
display_name = "лесной покров"
description = "<style=\"fluff\"> Однажды жена пекла, и она уронила пельмени, которые она делала на пол. Тогда она поклялась. Вскоре после этого она оказалась в лесу. Как бы все ее ни искали, ее не удалось найти. Много позже ее нашли мертвой, сидящей на склоне холма, в углублении в скале. В честь нее холм назван Жена-гора.\n\nSaarijärvi. <style=\"link\"><link=\"fls\">SKS архивы</link></style>.</style>\n\nФинляндцы верили, что можно заблудиться в лесу не в обычном смысле потери пути, а в гораздо более глубоком смысле: полностью покинуть нашу реальность и оказаться в какой-то параллельной вселенной, где вы, возможно, никогда не сможете вернуться.\n\nЛесной покров изображен на карте как туман. Затерянное в лесу существо некоторое время будет бесцельно бродить, пытаясь найти выход.\n\nДеревья, кусты и другие растения создают лесной покров между ними, поэтому лесной покров можно отодвинуть, очищая растительность, или путем строительства <link=\"ravenstatue\"><style=\"link\">raven statues</style></link>."

[hauling]
display_name = "вывоз"
description = "Когда предмет слишком тяжелый для гоблина, чтобы <link=\"carrying capacity def\"><style=\"link\">carry</style></link>, они должны <b>haul</b>, что означает перетаскивание его по земле. Перевозка по снегу происходит значительно быстрее."

[heating]
display_name = "нагревание"
description = "Когда становится холодно, структуры, в которых ваши гоблины и другие <link=\"houses\"><style=\"link\">live</style></link> и работа в которых должны быть <b>heated</b>, обычно используют <link=\"firewood\"><style=\"link\">firewood</style></link>. Гоблины постараются запастись дровами в зданиях, нуждающихся в отоплении."

[houses]
display_name = "Дома"
description = "<style=\"fluff\"> Поспешите в деревню мужа вашего,\nПоспешите в дом своей матери.\nСтранно, комнаты в других жилищах,\nСтранно, режимы в других деревнях.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIII\n\nДаже самые выносливые гоблины нуждаются в укрытии от стихии, особенно зимой. Если у гоблинов нет домов для проживания, их здоровье и <link=\"moraledef\"><style=\"link\">morale</style></link> пострадают. Зимой нежилые гоблины строят для себя временные убежища </style></link>, но они не будут столь эффективными в поддержании тепла, как надлежащее жилье."

[ignore]
display_name = "Игнорировать"
description = "Если вы заказываете своим гоблинам <b>ignore</b> элемент, они не помещают его в <link=\"storage\"><style=\"link\">storage</style></link>, и он не будет рассчитывать на <link=\"second tutorial\"><style=\"link\">stock manager</style></link>."

[meadowdef]
display_name = "Луга"
description = "Луга - низменные области, близкие к реке, в основном состоящие из <link=\"claysoil\"><style=\"link\">clay soil</style></link>. Луга обычно покрываются весенним наводнением, поэтому там не растут деревья."

[mud]
display_name = "грязь"
description = "Чем больше трафика проходит через песок или глиняную плитку, тем больше <b> мягкий</b> и изношенный. Чем грязнее плитка, тем труднее пройти. Таким образом, маршруты, по которым проходят ваши гоблины, будут постепенно усложняться и замедляться."

[nearbyruin]
display_name = "руины"
description = "Рядом находится неисследованный <link=\"ruinsdef\"><style=\"link\">ruin</style></link>."

[newgoblins]
display_name = "Больше гоблинов!"
description = "Слухи об успехе вашего поселения распространились в подземном мире, и все больше гоблинов решили присоединиться к вам. Если ваш лагерь производит достаточно пищи, чтобы прокормить своих жителей, и никто из них не умер в последнее время, больше гоблинов могут решить попытать счастья в среднем мире.\n\nЕсли в вашем лагере есть <link=\"shaman def\"><style=\"link\">shaman</style></link>, они также могут увеличить ваш <link=\"population def\"><style=\"link\">population</style></link>, отбрасывая <link=\"summongoblins\"><style=\"link\">Summon Goblins</style></link>."

[nutrientdef]
display_name = "питательные вещества"
description = "Гоблины нуждаются в определенных питательных веществах в пище. Если они не получают достаточно <link=\"fiber\"><style=\"link\">fiber</style></link> или <link=\"protein\"><style=\"link\">protein</style></link>, или достаточно <link=\"fresh\"><style=\"link\">fresh food</style></link>, они будут страдать от дефицита питательных веществ."

[ruinsdef]
display_name = "Руины"
description = "<style=\"fluff\"> Все подземное царство задрожало, стены дворца треснули и их фундаменты вздрогнули, арки склонились, и крыша стала шататься.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIV: Дворец Сарвика\n\nЛес старый, и многие люди жили здесь до гоблинов. Иногда следы этих прежних жителей можно встретить в виде руин. Изучение руин может выявить полезные предметы."

[ruins_explored]
display_name = ""
description = "Ваши гоблины исследовали руины и нашли в них следующие предметы:\n\n"

[score]
display_name = "счет"
description = "Ваш игровой счет очень просто основан на том, сколько гоблинов вам удалось выжить в вашем лагере и как долго. В конце каждого года ваш балл увеличивается на <link=\"population def\"><style=\"link\">population</style></link> вашего лагеря."

[shaman_def]
display_name = "Шаман"
description = "Шаман — это специалист, который может общаться с духовным миром.\n\nЧтобы быть избранным шаманом, гоблин должен быть <link=\"hardblooded\"><style=\"link\">hard-blooded</style></link> и <link=\"hardy\"><style=\"link\">hardy</style></link>."

[storage]
display_name = "хранение"
description = "Гоблины — опрятные существа, а предметы, которые хранятся в вашем лагере, хранятся. Это можно сделать на открытом воздухе <link=\"stockpile\"><style=\"link\">stockpiles</style></link>, или <link=\"storehouse\"><style=\"link\">storehouses</style></link>.\n\nНекоторые элементы, такие как <link=\"woodlog\"><style=\"link\">wooden logs</style></link>, могут храниться на открытом воздухе без каких-либо проблем. Другие предметы, такие как инструменты и особенно продукты питания, будут разрушаться, если храниться на открытом воздухе."

[unreachableDef]
display_name = "недостижимый"
description = "Игра нуждается в способе выяснить, не может ли структура быть достигнута, или существо попало в ловушку. Это работает так, что игра пытается проложить путь от толпы или структуры к центру лагеря.\n\nЦентр лагеря изначально является камнем-шлюзом, но будет жертвенным деревом, если его вызовут. Таким образом, если структура недостижима, это означает, что игра не может найти путь от нее к центру лагеря, и если существо, обычно гоблин, недостижимо, это означает, что игра не может найти путь, чтобы добраться до центра лагеря. Чтобы избежать этого, убедитесь, что есть способ добраться до скалы или жертвенного дерева."

[unreachableStructure]
display_name = "недостижимый"
description = "Эта структура <link=\"unreachableDef\"><style=\"link\"> не может быть достигнута из центра лагеря, поэтому ее нельзя использовать. Путь к входу в здание, вероятно, заблокирован или затоплен."

[unreahableMob]
display_name = "недостижимый"
description = "Это существо в ловушке! Он <link=\"unreachableDef\"><style=\"link\"> не может найти путь к центру лагеря</style></link>."

[weight_def]
display_name = "вес"
description = "Все предметы имеют вес. Базовый гоблин обычно может <link=\"carrying capacity def\"><style=\"link\">carry</style></link> на одну единицу веса. Более тяжелые предметы можно перемещать с помощью <link=\"hauling\"><style=\"link\">hauling</style></link>."

[workarea_def]
display_name = "Рабочие зоны"
description = "Рабочая зона лагеря — это зона, где гоблины будут собирать флору, и которую они будут защищать. Однако гоблины будут собирать и обрабатывать предметы по всей карте, если вы не скажете им игнорировать эти предметы.\n\nКогда вы строите статуи ворона, чтобы очистить <link=\"forestcover\"><style=\"link\">forest-cover</style></link>, они также расширяют вашу рабочую зону. Выбрав статую ворона, вы можете переключать рабочую зону вокруг нее."

# 3.3 Crops and farming

[compostingdef]
display_name = "компостирование"
description = "Компостирование – это способ восстановления <link=\"fertility\"><style=\"link\">fertility</style></link> в почве. Он разблокирован исследованием <link=\"fertilizerTech\"><style=\"link\"> Технология: Удобрение</style></link>.\n\nКомпостирование означает прием органических материалов и сброс их в <link=\"midden\"><style=\"link\">middens</style></link>. Там они распадаются и в конечном итоге образуют <link=\"compost\"><style=\"link\">compost</style></link>. Когда гоблины <link=\"muckingdef\"><style=\"link\">muck</style></link> поле, они будут разбрасывать компост по нему и доводить его до почвы, добавляя к почве значение плодородия компоста.\n\nМидденс нужно время от времени поворачивать с помощью <link=\"pitchfork\"><style=\"link\">pitchfork</style></link>, чтобы процесс компостирования продолжался."

[fallowdef]
display_name = "поддаваться"
description = "Поле, которое является фаллоу, не будет иметь семян, посеянных на нем, но будет <link=\"muckingdef\"><style=\"link\">mucked</style></link> и <link=\"tilling\"><style=\"link\">tilled</style></link> как обычно."

[farming]
display_name = "Сельское хозяйство"
description = "<style=\"fluff\"> Восстань, земля, из сна твоего,\nОт вековой спячки,\nПусть ячменные зерна прорастут,\nПусть сами лопасти начнутся.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\n<b>Сельское хозяйство</b> - это способ производства <link=\"foodpoint\"><style=\"link\">food</style></link> и других полезных продуктов путем выращивания сельскохозяйственных культур. Чтобы начать фермерство, создайте <link=\"farmplot\"><style=\"link>farm plot</style></link>, выберите семена, которые вы хотите посадить, и посмотрите, как они растут.\n\nКоличество посевов, производимых данным фермерским участком, определяется <link=\"fertility\"><style=\"link\">fertility</style></link> почвы. Каждая культура расходует часть плодородия участка, пока он не закончится. <link=\"claysoil\"><style=\"link\"> Глиняные почвы</style></link> более плодородны, чем <link=\"песчаный грунт\"><style=\"link\">sandy почв</style></link> и лучше сохраняют удобрения, но для выращивания глины необходимы более тяжелые инструменты.\n\nПоля обрабатываются и семена высаживаются в разное время года, в зависимости от семян, отобранных для фермерского участка."

[fertility]
display_name = "фертильность"
description = "<style=\"fluff\"> На лазурных водных хребтах,\nО могучей растрате перед ней.\nТам, где ее рука повернулась к воде,\nВозник плодородный холм.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение I\n\n<b>Фертильность</b> определяет продуктивность <link=\"фермерство\"><style=\"link\">фермерство</style></link>.\n\nКаждая плитка имеет значение плодородия, которое представляет собой питательные вещества в почве, которые доступны для растений, растущих в плитке. Когда посевы выращиваются на плитке, они истощают плодородие плитки. Плитка теряет столько же <b> точек бесплодия</b>, сколько растения производят <link=\"foodpoint\"><style=\"link\">food points</style></link>.\n\nПоскольку точки плодородия плитки сокращаются, она производит все меньше и меньше культур. Фертильность восстанавливается очень медленно. В финском сельском хозяйстве для восстановления плодородия сельскохозяйственному участку может потребоваться 30 или 40 лет.\n\nПлодородие плитки может быть увеличено <link=\"slashAndBurnTech\"><style=\"link\">slash-and-burn farming</style></link> или восстановлено путем обнаружения <link=\"fertilizerTech\"><style=\"link\">fertilizers</style></link>, чтобы разблокировать <link=\"compostingdef\"><style=\"link\">composting</style></link>. <link=\"sandsoil\"><style=\"link> Песчаные почвы </style></link> менее плодородны, чем <link=\"глинистый грунт\"><style=\"link\">глинистые почвы</style></link>, и сохраняют меньше питательных веществ из удобрений.\n\nЭффективную фертильность можно уменьшить с помощью <link=\"shade\"><style=\"link\">shade</style></link>."

[flaxdef]
display_name = "Льняной"
description = "Льня - это культура, выращенная для ее волокон, которые могут быть превращены в нить.\n\n<link=\"flaxseedbag\"><style=\"link\"> Семена льна</style></link> можно найти в <link=\"ruinsdef\"><style=\"link\">ruins</style></link> или выращивать в <link=\"wildflax\"><style=\"link\">wild</style></link>. Поиск семян льна обнаруживает <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>."

[nettledef]
display_name = "Жгучие крапивы"
description = """"""

[ryedef]
display_name = "ржаной"
description = "<link=\"ryeseedbag\"><style=\"link\">Семена ржи</style></link> можно найти в <link=\"ruinsdef\"><style=\"link\">ruins</style></link> или выращивать в <link=\"wildrye\"><style=\"link\">wild</style></link>. Поиск семян льна обнаруживает <link=\"farmingTech\"><style=\"link\"> Технология: Сельское хозяйство</style></link>."

[shade]
display_name = "оттенок"
description = "Растения обычно нуждаются в солнечном свете, чтобы жить, поэтому, когда свет блокируется теней, растения не растут так хорошо, как могли бы. Северные склоны холмов считаются в тени, потому что они получают меньше солнечного света.\n\nВ игре тень представляет собой не только физическую блокировку солнечного света, но и воздействие деревьев на окружающую почву. Деревья имеют обширные корневые системы, которые очень эффективно извлекают питательные вещества из почвы, и поэтому сельскохозяйственные культуры не будут расти вблизи деревьев. Чтобы представить корни, физически блокирующие рост растений, даже пни отбрасывают некоторый оттенок.\n\nОттенок уменьшает <link=\"fertility\"><style=\"link\">fertility</style></link> плиток. Некоторые растения <link=\"florapreferences\"><style=\"link\">предпочитают</style></link> разные уровни света."

#  3.4 Spirits, Keepers and sacrifices

[sacrifice_def]
display_name = "Жертвы"
description = "Это обычай гоблинов приносить жертвы духам каждое лето. Например, когда гоблины берут рыбу из реки или древесину из леса, они считают, что должны благодарить Хранителей <link=\"лесоводов\"><style=\"link\"> леса </style></link> и <link=\"водоводов\"><style=\"link\"> реки</style></link> за их подарки. На некоторых семинарах были определены предметы жертвоприношения. Например, для каждого <link=\"fishing1\"><style=\"link\">fisher-goblin's shack</style></link> речные духи ожидают жертвоприношения одной <link=\"ceremonialfish\"><style=\"link\">ceremonial fish</style></link>. Для каждого <link=\"carpenter\"><style=\"link\">carpenter's workshop</style></link> лесные духи ожидают по одному <link=\"woodenstatuette\"><style=\"link\">wooden statuette</style></link> и так далее.\n\nЖертвы помещаются в <link=\"bonfire\"><style=\"link\">bonfire</style></link> и сжигаются.\n\nУспешные жертвоприношения повышают уровень <link=\"culturedef\"><style=\"link\">culture</style></link> и повышают уровень <link=\"sac tree def\"><style=\"link\">жертвенное дерево</style></link>.\n\n<style=\"fluff\"> Финляндцы верили, что все живые существа имеют духов, и что если с духами не обращаться правильно, это будет иметь последствия. Раньше у финнов были разные ритуалы сбора урожая и охоты, такие как сложная церемония медведя, найденная в стихотворении XLVI «Kalevala», чтобы успокоить духов."

[woodskeepers]
display_name = "Хранители леса"
description = "Хранители леса — это духи, которые живут в лесу и следят за всеми его обитателями. Если гоблины возьмут ресурсы из леса, не уважая Хранителей Леса, они будут несчастны и посетят несчастья на лагере. Хранители могут быть умиротворены <link=\"sacrifice def\"><style=\"link\">жертвованием</style></link> им в середине лета, путем построения <link=\"bonfire\"><style=\"link\">bonfire</style></link>."

[waterskeepers]
display_name = "Хранители вод"
description = "Хранители Воды - это духи, которые правят рекой и другими водоемами вблизи лагеря. Если гоблины ловят рыбу в воде, не уважая своих Хранителей, им будет труднее ловить рыбу. Хранители могут быть умиротворены <link=\"sacrifice def\"><style=\"link\">жертвованием</style></link> им в середине лета, путем построения <link=\"bonfire\"><style=\"link\">bonfire</style></link>."

# 4.0 Longer explanatory texts

[basictoolsdef]
display_name = "Основные инструменты"
description = "Лагерь нуждается в нескольких видах повседневных инструментов для работы.\n\nЧтобы получить <link=\"woodmaterial\"><style=\"link\">wood</style></link> для строительства и других целей, гоблинам потребуется <link=\"chopping\"><style=\"link\">chopping tools</style></link> для вырубки деревьев. Ранним инструментом рубки является <link=\"stoneaxe\"><style=\"link\">stone axe</style></link>. Каменные топоры также могут быть использованы в качестве оружия, но будьте осторожны, чтобы не назначить все ваши топоры охранникам! Если это произойдет, ваши гоблины не смогут повалить деревья.\n\nЧтобы вырыть канавы и изменить уровень земли, гоблинам нужно <link=\"digging\"><style=\"link\">digging tools</style></link>. <link=\"diggingstick\"><style=\"link\">digging stick</style></link> - это простой инструмент для копания, который также служит инструментом <link=\"bartool\"><style=\"link\">bar tool</style></link> для удаления пней деревьев.\n\nКаменные топоры и палки для рытья можно построить на <link=\"carpenter1\"><style=\"link\">carpenter's shack</style></link> из <link=\"branch\"><style=\"link\">branches</style></link>. Вы можете заказать все инструменты, которые вы обнаружили в <link=\"second tutorial\"><style=\"link\">stock manager</style></link>.\n\nДля тушения пожаров гоблинам необходимо <link=\"bucket\"><style=\"link\">buckets</style></link>. Самое простое доступное ведро - это <link=\"claypot\"><style=\"link\">earthenware pot</style></link>, которое можно создать на <link=\"potter0\"><style=\"link\">potter's yard</style></link>.\n\nДля создания глиняных инструментов необходимо построить <link=\"claypit\"><style=\"link\">clay pit</style></link>. Это необходимо разместить на <link=\"claysoil\"><style=\"link\">clay soil</style></link>, которое можно найти через окно наложения грунта, доступное из кнопки наложения в нижней части игрового экрана. Посмотрите: низколежащие глинистые земли рядом с рекой часто <link=\"meadowdef\"><style=\"link\">flood</style></link>! Это хорошая идея, чтобы построить глиняную яму в районе дальше от реки.\n\nЭто хорошая идея, чтобы поддерживать запас основных инструментов в лагере в любое время. Это можно легко сделать, установив цели для них в менеджере по акциям, и гоблины построят новые, чтобы заменить сломанные или потерянные инструменты."

[food_sources]
display_name = "Источники продовольствия"
description = "Обеспечение поставок продуктов питания для вашего лагеря <link=\"foodpoint\"><style=\"link\">food</style></link> жизненно важно. Если гоблинам нечего есть, они уйдут! Есть несколько источников питания, которые ваш лагерь может использовать.\n\nСамый простой способ получить еду - это <b>собрать </b>. Многие продукты можно просто найти на карте: <link=\"гриб\"><style=\"link\">грибы</style></link> высоко в <link=\"fiber\"><style=\"link\">fiber</style></link> растут на земле, а такие растения, как <link=\"hazel\"><style=\"link\">hazel</style></link> и <link=\"blackcurrant\">blackcurrant</style></link>, можно собирать для еды. <link=\"nettle\"><style=\"link\">Наклеивание крапивы</style></link> часто можно найти в <link=\"meadowdef\"><style=\"link\">meadows</style></link>, и даже предоставить вам семена, чтобы вы могли начать сельское хозяйство.\n\nЧтобы начать собирать растения, просто найдите их на карте и прикажите своим гоблинам собрать их. Как только это будет сделано, еда, которую они приобрели, появится в <link=\"second tutorial\"><style=\"link\">stock manager</style></link>, и вы можете заказать их, чтобы автоматически найти больше.\n\nДругим ранним источником пищи является <link=\"fishingTech\"><style=\"link\">fishing</style></link>. Чтобы начать рыбалку, создайте <link=\"fishing1\"><style=\"link\">fisher-goblin's shack</style></link> и некоторые <link=\"fishingspear\"><style=\"link\">fishing spears</style></link> и закажите рыбу в менеджере запаса. <link=\"rawfish\"><style=\"link\"> Рыба является хорошим источником жиров и белков.\n\nРыболовство ограничено <link=\"fishing value def\"><style=\"link\">fishing value</style></link> карты, которая представляет максимальное количество рыбы, которую можно ловить устойчиво.\n\nЕдинственным надежным способом производства продуктов питания для большой популяции является <link=\"фермерство\"><style=\"link\">фермерство</style></link>. Сельское хозяйство - это <link=\"farmingTech\"><style=\"link\"> unlocked</style></link>, когда вы впервые обнаруживаете семена. Чтобы начать сельское хозяйство, выложите <link=\"farmplot\"><style=\"link\">фермерский участок</style></link>, выберите нужные вам семена, и гоблины посадят и соберут урожай в соответствующее время года. Чтобы выращивать на <link=\"claysoil\"><style=\"link\">clay soils</style></link>, вам нужно <link=\"dwarvenToolTech\"><style=\"link\">metal digging tools</style></link>.\n\nСельское хозяйство расходует <link=\"fertility\"><style=\"link\">fertility</style></link> почвы, и в конечном итоге истощит ее полностью. Почву можно сделать более плодородной с помощью <link=\"slashAndBurnTech\"><style=\"link\">slash-and-burn farming</style></link>, или плодородие можно восстановить, обнаружив <link=\"fertilizerTech\"><style=\"link\">fertilizers</style></link>.\n\nЭти источники пищи могут быть дополнены мясом враждебных животных. Мясо и рыбу можно сохранить с помощью <link=\"smokingTech\"><style=\"link\">smoking</style></link>.\n\nУспешный лагерь будет использовать различные источники пищи для обеспечения продовольственной безопасности и здоровой, разнообразной диеты для гоблинов."

