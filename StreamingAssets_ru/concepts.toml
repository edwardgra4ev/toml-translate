# 2.2 Upper bar numbers

[food_number]
display_name = "Пищевые точки"
description = "Это число показывает, сколько месяцев <link=\"foodpoint\"><style=\"link\">food</style></link> у вашего лагеря. Пища может быть получена из различных источников <link=\"food sources\"><style=\"link\">sources</style></link>."

[food_tooltip_line_1]
description = "Продукты, необходимые в год:"

[food_tooltip_line_2]
description = "Теоретический макс производства:"

[food_tooltip_line_3]
description = "Баланс пищевой точки:"

[food_tooltip_line_4]
description = "Месяцы хранения продуктов:"

[kitchendef]
display_name = "Кухни"
description = "Гоблины — общительные существа и любят есть вместе на кухнях в конце каждого сезона. Кухни - это структуры, где повар-гоблины готовят <link=\"foodpoint\"><style=\"link\">food</style></link> для общего числа жителей лагеря, равного вместимости кухни. Каждому гоблину будет назначена кухня, на которой можно поесть, если есть вместимость.\n\nПовар-гоблин постарается, чтобы блюдо включало все необходимые <link=\"питательное питание\"><style=\"link\">питательные вещества</style></link>. Еда всегда будет включать в себя что-то выпить.\n\nЕсли у гоблина нет кухни, они будут есть еду, которую найдут в лагере. Если они не смогут найти еду, они пойдут голодными и в конце концов покинут лагерь."

[kitchen_tooltip_line_1]
description = "Население"

[kitchen_tooltip_line_2]
description = "Кухонные сидения:"

[jobsnumber]
display_name = "Работа"
description = "Гоблины - добросовестные существа, и они будут стараться выполнять все задания, которые им поручены. Будьте осторожны, чтобы не дать им завалиться слишком большим количеством рабочих мест!"

[jobs_tooltip_line_1]
description = "Всего рабочих мест:"

[jobs_tooltip_line_2]
description = "Гоблины:"

[jobs_tooltip_line_3]
description = "Рабочие места для гоблина:"

[population_number]
display_name = "Население и жилье"
description = "Это число показывает общее количество <link=\"population def\"><style=\"link\">population</style></link> вашего лагеря, и сколько <link=\"houses\"><style=\"link\">housing</style></link> вы построили."

[population_tooltip_line_1]
description = "Население:"

[population_tooltip_line_2]
description = "Жилищное требование:"

[population_tooltip_line_3]
description = "Жилье предоставляется:"

[researchpoints]
display_name = "Исследовательские точки"
description = "Исследовательские точки могут быть инвестированы для изучения новых технологий в технологическом дереве. Лагерь генерирует исследовательские точки, и они также могут быть накоплены путем обнаружения определенных предметов или вызова <link=\"sac tree def\"><style=\"link\">жертвенное дерево</style></link>."

[research_tooltip_line_1]
description = "Точки исследования:"

[research_tooltip_line_2]
description = "Очки за сезон:"

[research_tooltip_line_3]
description = "Очки в год от жертвенного дерева:"

[vaki_def]
display_name = "Ваки"
description = "Ваки - это магическая энергия, используемая шаманом для создания заклинаний. Лагерь генерирует определенное количество ваки, и это может быть увеличено путем вызова и выравнивания <link=\"sac tree def\"><style=\"link\">жертвенное дерево</style></link>. Ваки на 20."

[vaki_tooltip_line_1]
description = "Вяки:"

[vaki_tooltip_line_2]
description = "Ваки в месяц:"

[vaki_tooltip_line_3]
description = "Ваки в год из жертвенного дерева:"

[spiritdef]
display_name = "Духи"
description = "В древней финской культуре все живое имело духов. Например, при вырубке дерева важно было предупредить древесный дух, чтобы он мог уйти до того, как дерево будет срублено. <link=\"shaman def\"><style=\"link\">Шаманы</style></link> используют духов для работы своей магии.\n\nОбычно в районе лагеря проходит до 20 духов. Духи, выпущенные из срубленных деревьев или убитых врагов, увеличивают это количество."

[spirit_tooltip_line_1]
description = "Неизрасходованные духи:"

[campmoraledef]
display_name = "Мораль лагеря"
description = "Общий <link=\"moraledef\"><style=\"link\">morale</style></link> - средний моральный дух всех его жителей."

# 2.3 Stock Manager

[target_column]
display_name = "Цель"
description = "Целевой номер - это количество предметов, которые вы хотите иметь в своем лагере в любое время. Если текущее количество предметов меньше этого числа, ваши гоблины сделают все возможное, чтобы произвести больше."

[reserved_column]
display_name = "Зарезервирован"
description = "Зарезервированный номер - это количество предметов, которые должны храниться на складе и не использоваться для дальнейшей обработки. Гоблины не будут производить предметы для удовлетворения резерва, только <style=\"link\"><link=\"target column\">target</link></style> запускает производство. Зарезервированные предметы будут съедены и использованы для жертвоприношений."

