# 5.0 Rocks

[smallboulder]
display_name = "Маленький валун"
latinName = "lapis"
keyword = ["boulder"]
description = "<style=\"fluff\">\nКлетчатые камни многих цветов,\nСияющий в серебряном солнечном свете,\nВсе скалы стояли хорошо установленные.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение I\n\nМаленький валун размером с большой валун.\n\n<style=\"fluff\"> Валуны - это большие куски скалы, либо вычерченные, либо срезанные с коренной породы ледником, а затем отложенные на земле, когда лед тает."

# 6.0 Crops

[flaxshoot]
display_name = "Льняной выстрел"
keyword = ["coldsensitive"]
grows = "flaxplant"
growthTime = 2
condition = 5
fireResist = 1
description = "<style=\"fluff\"> От старинного племени, своего рода;\nКогда кукуруза посеяла меру,\nКаждая часть была ядром;\nКогда они сеют льняное семя,\nКаждый получил нить льна.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXIV\n\nПобег из льна, который перерастет в <link=\"flaxplant><style=\"link\">flax plant</style></link>."

[flaxplant]
display_name = "Льняное растение"
keyword = "coldsensitive"
grows = "matureflax"
growthTime = 1
condition = 5
fireResist = 1
burned = "ashes"
latinName = "Linum usitatissimum"
description = "<style=\"fluff\"> И вот появилось само Солнце, юноша с огненными глазами; и он подъехал с таким же состоянием к Луне. Но Сальме заявила, что он ей нравится даже меньше, чем Луна, потому что он слишком непостоянен. Иногда, в самую прекрасную летнюю погоду, он посылал дождь посреди урожая сена; или, если пришло время сеять овес, он обрывал землю засухой; или, если время сева прошло, он высушивал ячмень в земле, бил лен и давил на горох в бороздах; он не позволял гречневой крупе расти или чечевице в их стручках; и когда рожь белая для урожая, он либо яростно светился и отгонял облака, или посылал проливной дождь.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. У.Ф. Кирби «Песнь I: Браки Сальме и Линды»\n\nРастущее льняное растение. Скоро будет <link=\"matureflax\"><style=\"link>mature</style></link>!"

[matureflax]
display_name = "Зрелое льняное растение"
keyword = ["root", "harvestWhenDone"]
fruit = "flaxstrands"
grows = "ripeflax"
produces = "flaxseedbagx5"
growthTime = 2
condition = 5
fireResist = 1
burned = "ashes"
latinName = "Linum usitatissimum"
description = "<style=\"fluff\"> Вечером сеяли льна,\nПомещенный в земле лунным светом;\nБыстро он рос и быстро созревал.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXIV\n\nЗрелое льняное растение, готовое к уборке. Если лен не собран вовремя, он станет <link=\"ripeflax\"><style=\"link\"> over-ripe</style></link>.\n\nПродукты: <link=\"flaxstrands\"><style=\"link\">flax strands</style></link>, 5x <link=\"flaxseedbag\"><style=\"link\">flax seed</style></link>"

[ripeflax]
display_name = "Льняное растение"
keyword = ["root", "harvestWhenDone"]
