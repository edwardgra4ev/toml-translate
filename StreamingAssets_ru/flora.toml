description = "<style=\"fluff\"> Я также был рад снова увидеть старое болото и все прекрасные вещи, которые там росли — алые мхи и зеленые мхи, твердый и дружелюбный вереск и глубокую безмолвную воду.\n\nЛорд Дансени, В сумерках (1908)\n\nМиртл болота часто встречается на краю воды или в болотистой местности."

