condition = 5
produces = "flaxseedbagx5"
fireResist = 1
burned = "ashes"
description = "<style=\"fluff\"> Головные уборы приносят только боль и печаль,\nЛьняные породы дурных нравов,\nЛайн приносит только глубокие страдания,\nИ льняной несвоевременный траур.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXII\n\nЗрелое льняное растение, уже прошло свое лучшее время для сбора урожая.\n\nПродукты: <link=\"roughflaxstrands\"><style=\"link\">rough flax strands</style></link>, 5x <link=\"flaxseedbag\"><style=\"link\">flax seed</style></link>"

