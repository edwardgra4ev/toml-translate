[turnipsprout]
display_name = "репа спрут"
keyword = ["coldSensitive"]
grows = "turnipplant"
growthTime = 5
condition = 5
fireResist = 1
description = "<style=\"fluff\"> И положила немного еды в чайники,\nТолько кости и бусы хныкания,\nрепы и увядшая капуста,\nКуски хлеба и куски печенья.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXVII\n\nПроросток репы. Вырастает в <link=\"turnipplant\"><style=\"link\">turnip plant</style></link> через пять месяцев."

[turnipplant]
display_name = "Патч на репу"
fruit = "turnip"
grows = "turnipflower"
growthTime = 11
keyword = "root"
condition = 5
fireResist = 1
latinName = "brassica rapa subsp. rapa"
burned = "ashes"
description = "<style=\"fluff\"> Быстро, как молния, Лемминкяйнен,\nС лезвием битвы его отца,\nС одним ударом широкого меча,\nС единым мастерством и силой,\nПотопил голову хозяина Похи;\nКак расщепляют стебли репы.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXVII\n\nПовязка растений репы. Их можно собирать для получения <link=\"turnip\"><style=\"link\">turnips</style></link> или оставлять расти в <link=\"turnipflower\"><style=\"link\">turnip flowers</style></link>, которые производят <link=\"turnipseedbag\"><style=\"link\">turnip seeds</style></link> в следующем году. Вы можете настроить часть растений, которые собирают и оставляют для выращивания семян в меню <link=\"farmplot\"><style=\"link\">farm plot</style></link><br><br> Количество репы, производимое фермерским участком, зависит от его <link=\"fertility\"><style=\"link\">fertility</style></link>."

[turnipflower]
display_name = "Цветок турне"
keyword = ["root","harvestWhenDone"]
produces = ["turnipseedbagx5"]
fruit = "turnip"
condition = 5
fireResist = 1
burned = "ashes"
description = "<style=\"fluff\"> Второй брат сел в березовое дерево под плачущее березовое дерево и начал петь песню. Когда он пел, бутоны раскрывались и цветы расцвели, золотые уши кукурузы набухали, а яблоки покраснели, ядра образовывались в орехах, вишни созревали, красные ягоды росли на холмах и синие ягоды в болотах, в то время как черные ягоды росли на краях болот, желтые на моховых холмах, а старшие деревья покрывались богатым фиолетовым виноградом, в то время как леса перекликались с песней, и ее ноты распространялись далеко по окорочкам и лугам, пока маленькие водяные нимфы не проливали слезы восторга.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто III: Судьба Линды\n\nЦветущее растение репы. При сборе урожая он будет производить <link=\"turnipseedbag\"><style=\"link\">turnip seeds</style></link>.\n\nПродукты: <link=\"turnip\"><style=\"link\">turnip</style></link>, 5x <link=\"turnipseedbag\"><style=\"link=\"turnip seed</style></link>"

[ryeshoot]
display_name = "Рие Спроут"
keyword = ["coldSensitive"]
grows = "ryeplant"
growthTime = 1
condition = 5
fireResist = 1
description = "<style=\"fluff\"> Всю эту игру младший брат связал и понес на спине; и по дороге домой они нашли ржаные поля, полные зайцев, которых у них тоже было пять десятков.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто III: Судьба Линды\n\nПобеги ржи. Через несколько месяцев они вырастут в <link=\"ryeplant\"><style=\"link\">rye plants</style></link>."

[ryeplant]
display_name = "Растения ржи"
