description = "<style=\"fluff\"> Потопить в сумерках,\nЗакопайте оба уха в клевере,\nСадись в какой-нибудь олдер-хикет\nПоднимитесь между мохнатыми уступами.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXII\n\nКакой-то мх растет на лесном полу."

[bogmoss]
display_name = "Бог Мосс"
keyword = ["bog", "cosmetic", "perennial"]
condition = 10
fireResist = 3
growthTime = 6
description = "<style=\"fluff\"> Сыновья Калева теперь старались изо всех сил возвращаться домой, иногда по проторенным тропинкам или по равнинам, иногда пробираясь через глубокий песок или моховые болота, а затем через леса из сосны, дуба, березы и ольхи.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто III: Судьба Линды\n\nБолотный мх процветает в заболоченных условиях."

[flowers]
display_name = "Цветы"
keyword = ["cosmetic", "needsLight", "annual", "meadow"]
condition = 5
fireResist = 0
growthTime = 1
description = "<style=\"fluff\"> Часто бродил мой ум в детстве,\nКогда девушка свободна и весела,\nСчастливо через фен и фаллоу,\nНа медовуху с ягненками,\nЗадержанный с папоротниками и цветами,\nНе зная ни боли, ни неприятностей.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение IV Цветы любят расти в местах <link=\"shade\"><style=\"link\">well-lit</style></link>."

[fly_amanita]
display_name = "Летающая Аманита"
keyword = ["cosmetic", "needsDark", "annual", "civilized"]
condition = 5
fireResist = 2
growthTime = 1
latinName = "amanita muscaria"
description = "Fly amanitas — ядовитые грибы, которые предпочитают расти в <link=\"shade\"><style=\"link\">dark</style></link>."

[mushrooms]
display_name = "Грибы"
keyword = ["cosmetic", "needsDark", "annual", "civilized"]
produces = ["mushroom"]
condition = 5
fireResist = 2
growthTime = 1
description = "<style=\"fluff\"> Если же голод твой побудит тебя,\nИди к ягодной горе,\nЕшьте грибок леса.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXII\n\nГрибы растут в <link=\"shade\"><style=\"link\">dark</style></link>.\n\nПродукты: <link=\"mushroom\"><style=\"link\">mushrooms</style></link>"

[slimemold]
display_name = "Слизистая плесень"
keyword = ["cosmetic", "needsDark", "perennial", "civilized", "underworld"]
condition = 10
fireResist = 2
latinName = "fuligo septica"
description = "Слизистая форма <i>fuligo septica</i> легко распознается по ярко-желтому цвету. Раньше считалось, что это своего рода гриб или губка, слизевая плесень - это амеба-подобное существо.\n\n<style=\"fluff\"> Финляндцы верили, что слизистая плесень была маслом, вырванным знакомым духом, который был очарован, чтобы украсть ее у соседа. Когда предки финнов перешли в сельскохозяйственное общество, природа магии изменилась, поскольку они начали верить, что в мире есть только ограниченное количество удачи. Это означало, что магия, которая причиняла вред другим, косвенно приносила пользу вам, поскольку это означало, что вашему соседу теперь повезло меньше, и поэтому для вас было больше."

