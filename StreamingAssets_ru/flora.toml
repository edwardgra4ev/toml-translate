description = "<style=\"fluff\"> До тех пор, пока наконец не появились хорошие черные деревья с их демоническими формами ночью, и трава была холодной и влажной, и ночной туман плавал над ней. И пришла большая белая сова, поднимаясь и опускаясь в темноте. И во всем этом маленькая Дикая Вещь радовалась эльфийски.\n\nLord Dunsany, the Kith of the Elf Folk (1908)[править править код]\n\nБлэкторн — большой тернистый кустарник.\n\nПродукты: 2x <link=\"branch\"><style=\"link\">branch</style></link>"

