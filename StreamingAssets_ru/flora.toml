# 1.0 Saplings

# 1.1 Big tree saplings

[sprucesapling]
display_name = "саженец ель"
keyword = ["sapling", "spruce", "prefersSand", "prefersDark", "spawn", "perennial"]
produces = ["branch", "branch"]
condition = 10
fireResist = 1
burned = "ashes"
grows = "youngspruce"
growthTime = 120
latinName = "spruce spruce"
description = "<style=\"fluff\"> Приветствую тебя в горах,\nПриветствую вас на возвышенностях,\nПриветствую вас, высоты с покрытыми лесами,\nЗдравствуйте, вечнозеленые пихты.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XIV\n\nЭто саженец вырастет в <link=\"молодая ель\"><style=\"ссылка\">молодая ель</style></link> дерево. еловые деревья <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"shade\"><style=\"link\">shade</style></link> и <link=\"sandsoil\"><style=\"link\">sandy soils</style></link>.\n\nПродукты: 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[pinesapling]
display_name = "Сосновый саплинг"
keyword = ["sapling", "pine", "spawn", "perennial"]
produces = ["branch", "branch"]
condition = 10
fireResist = 1
burned = "ashes"
grows = "youngpine"
growthTime = 120
description = "<style=\"fluff\"> На твердой почве сеют желуди,\nПлоды сеют его в горах.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nЭтот саженец вырастет в дерево <link=\"youngpine\"><style=\"link\">young pine</style></link>. Сосны — выносливые деревья, которые могут расти практически в любом месте.\n\nПродукты: 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[birchsapling]
display_name = "Березовый саплинг"
keyword = ["sapling", "birch", "prefersClay", "needsLight", "spawn", "deciduous"]
produces = ["branch"]
condition = 10
fireResist = 1
burned = "ashes"
grows = "youngbirch"
growthTime = 36
description = "<style=\"fluff\"> В три раза лучше для этого судна.\nЕсли бы он был всего лишь березой в долине,\nИли же осина на веревке,\nС белками в его ветвях,\nИ собаки под ними лают!\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXIX\n\nЭто саженец вырастет в <link=\"молодая берёза\"><style=\"ссылка\"><link=\"флорапреференции\"><style=\"ссылка\">предпочтение</style></link><link=\"глинозоль\"><style=\"ссылка\">глиняные почвы</style></link> и потребность <link=\"оттенок\"><style=\"link\">свет</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

# 1.2 Other tree saplings

[aldersapling]
display_name = "Серый Олдер Саплинг"
keyword = ["sapling", "alder", "prefersLight", "spawn", "deciduous"]
produces = "branch"
condition = 5
fireResist = 1
burned = "ashes"
grows = "alder"
growthTime = 240
latinName = "Alnus incana"
description = "<style=\"fluff\"> Березы сеют его в болотах,\nВ рыхлой почве сеют ольхи.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nСерая ольха саженца.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[forestapplesapling]
display_name = "Саплинг деревьев крабаппл"
keyword = ["sapling", "crabapple", "prefersLight", "spawn", "deciduous"]
produces = "branch"
condition = 5
fireResist = 1
burned = "ashes"
grows = "forestapple"
growthTime = 120
description = "Начало прекрасной яблони.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[junipersapling]
display_name = "саженец можжевельника"
keyword = ["sapling", "juniper", "needsLight", "spawn", "perennial"]
produces = ["branch"]
condition = 5
fireResist = 1
burned = "ashes"
grows = "juniper"
growthTime = 120
description = "<style=\"fluff\"> Растут и можжевельники,\nможжевельники с кластерными ягодами,\nЯгоды на ветвях боярышника.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nМолодой <link=\"juniper\"><style=\"link\">juniper</style></link>. Junipers <link=\"florapreferences\"><style=\"link\">prefer</style></link> places with little <link=\"shade\"><style=\"link\">shade</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[lindensapling]
display_name = "Линден Саплинг"
keyword = ["sapling", "linden", "prefersClay", "spawn", "deciduous"]
produces = "branch"
condition = 5
fireResist = 1
burned = "ashes"
grows = "linden"
growthTime = 240
description = "<style=\"fluff\"> В низинах сеют липы,\nВ влажной земле сеет ива.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nЭтот саженец вырастет до <link=\"linden\"><style=\"link\">linden</style></link> tree. Lindens <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[maplesapling]
display_name = "Кленовый саплинг"
keyword = ["sapling", "maple", "prefersClay", "spawn", "deciduous"]
produces = "branch"
condition = 5
fireResist = 1
burned = "ashes"
grows = "maple"
growthTime = 120
description = "<style=\"fluff\"> Калевид спал два дня и две ночи и не просыпался до третьего утра. Пока он спал, его храп звучал в течение многих миль, и большие деревья сотрясались, как будто они были саженцами.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто XIX: Последний праздник героев\n\nЭто саженец является началом могучего <link=\"maple\"><style=\"link\">maple</style></link> tree. Maples <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[rowansapling]
display_name = "Роуэн Саплинг"
keyword = ["sapling", "rowan", "holy", "needsLight", "spawn", "deciduous"]
produces = "branch"
condition = 5
fireResist = 1
burned = "ashes"
grows = "rowan"
growthTime = 240
description = "<style=\"fluff\"> В тот момент он вышел на берег и взялся за рябину, и так вылез из реки; откуда приходит высказывание, что рябина — это освобождение Тора.\n\n- Проза Эдда, транс. Arthur Gilchrist Brodeur, Skáldskaparmál, XVIII\n\nСаженец святого <link=\"rowan\"><style=\"link\">rowan</style></link> tree. Rowans <link=\"florapreferences\"><style=\"link\">prefer</style></link> places with little <link=\"shade\"><style=\"link\">shade</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

[yewsapling]
display_name = "Ю Саплинг"
keyword = ["sapling", "yew", "poison", "prefersClay", "spawn", "deciduous"]
produces = ["branch"]
condition = 5
fireResist = 1
burned = "ashes"
grows = "yew"
growthTime = 120
description = "Дерево <link=\"yew\"><style=\"link\">yew</style></link>. Они <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПродукты: <link=\"branch\"><style=\"link\">branch</style></link>"

# 2.0 Trees

# 2.1 Big trees

[sprucetree]
display_name = "еловое дерево"
keyword = ["tree", "spruce", "blocksMovement", "prefersSand", "prefersDark", "perennial", "bigShade", "spirit"]
produces = ["woodlogx2", "branchx4"]
condition = 25
fireResist = 2
burned = ["ashesx6","burnedsnag"]
leaves = "sprucestump"
growthTime = 240
latinName = "picea abies"
description = "<style=\"fluff\"> На его плече выросла осина,\nНа каждом храме росло березовое дерево,\nНа его могучем подбородке ольха,\nИз его бороды выросли ивовые кусты,\nИзо рта его темно-зеленая ель,\nИ дуб из его лба.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XVII\n\nСосновое дерево. Деревья ели <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"shade\"><style=\"link\">shade</style></link> и <link=\"sandsoil\"><style=\"link\">sandy soils</style></link>.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

[youngspruce]
display_name = "Молодое еловое дерево"
keyword = ["tree", "spruce", "prefersSand", "prefersDark", "perennial", "spirit"]
produces = ["woodlog", "branch", "branch"]
condition = 15
fireResist = 2
burned = ["ashesx3"]
grows = "sprucetree"
leaves = "smallstump"
growthTime = 120
latinName = "spruce dickinson"
description = "<style=\"fluff\"> Спик брат, Вяйнямёйнен:\n\"Я могу сказать тебе великие чудеса,\nПослушайте мою удивительную историю:\nЯ видел цветение елки,\nУвидев его цветы с изумрудными ветвями,\nна осмо-полях и лесных массивах;\nВ его вершине светит лунный свет,\nИ Медведь живет в своих ветвях».\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение X\n\nСосновое дерево. Спруты <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"shade\"><style=\"link\">shade</style></link> и <link=\"sandsoil\"><style=\"link\">sandy soils</style></link>.\n\nПродукты: <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[youngpine]
display_name = "Молодое сосновое дерево"
keyword = ["tree", "pine", "blocksMovement", "perennial", "spirit"]
produces = ["woodlog", "branch", "branch"]
condition = 15
fireResist = 2
burned = ["ashesx3","burnedsnag"]
grows = "pinetree"
leaves = "smallstump"
growthTime = 360
description = "<style=\"fluff\"> Громко делает сосновое дерево ответ:\n\"Все корабли, которые были построены\nИз моего тела недостойны;\nЯ полон несовершенств,\nНе может дать вам необходимую древесину\nПостройте свой корабль,\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XVI\n\nМолодая сосна.\n\nПродукты: <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[pinetree]
display_name = "Сосновое дерево"
keyword = ["tree", "pine", "blocksMovement", "perennial", "bigShade", "spirit"]
produces = ["woodlog", "woodlog", "branchx4"]
condition = 20
fireResist = 3
burned = ["ashesx6","burnedsnag"]
leaves = "stump"
grows = "oldpine"
growthTime = 720
latinName = "pinus sylvestris"
description = "<style=\"fluff\"> Если твои кровавые зубы голодны,\nБросай злобу свою в горы,\nИ твой голод к соснам.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXII\n\nМогучая сосна.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

[oldpine]
display_name = "Старое сосновое дерево"
keyword = ["tree", "pine", "blocksMovement", "resistFire", "perennial", "bigShade", "spirit"]
produces = ["woodlogx3", "branchx6"]
condition = 30
fireResist = 4
burned = ["ashesx6","burnedsnag"]
leaves = "stump"
growthTime = 720
description = "<style=\"fluff\"> Выросла на горе елка,\nВырастила величественную сосну в Нортленде,\nИ у пихты были серебряные ветви,\nЗолотые шишки в изобилии.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XLVI\n\nДревняя сосна. Его густая кора особенно устойчива к огню.\n\nПродукты: 3x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 6x <link=\"branch\"><style=\"link\">branch</style></link>"

[youngbirch]
display_name = "Молодое берёзовое дерево"
keyword = ["tree", "birch", "prefersClay", "needsLight", "blocksMovement", "deciduous", "spirit"]
produces = ["woodlog", "branch", "branch"]
condition = 15
fireResist = 2
burned = ["ashesx3"]
grows = "birchtree"
leaves = "smallstump"
growthTime = 84
description = "<style=\"fluff\"> Хорошо ли я помню день\nГде ты служил орлу,\nКогда ты оказал птицам услугу.\nТы оставил берёзу стоящей,\nКогда были расчищены леса Осмо,\nИз земель Калевалы.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение VII\n\nБерезы <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link> и need <link=\"shade\"><style=\"link\">light</style></link>.\n\nПродукты: <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[birchtree]
display_name = "Березовое дерево"
keyword = ["tree", "birch", "blocksMovement", "prefersClay", "prefersLight", "deciduous", "spirit"]
produces = ["woodlog", "woodlog", "branchx4"]
condition = 20
fireResist = 2
burned = ["ashesx6","burnedsnag"]
leaves = "stump"
growthTime = 240
latinName = "betula pendula"
description = "<style=fluff> \"Поэтому, древний Väinämöinen,\nТы оставил стройное берёзовое дерево,\nОставил берёзу только стоящей?\nВяйнямёйнен ответил:\n\"Поэтому береза левая стоит,\nЧтобы птицы могли гнездиться в нем,\nЧтобы орел там упокоил его,\nТам может петь священная кукушка\".\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nБлагородная берёза. Березы <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link> и need <link=\"shade\"><style=\"link\">light</style></link>.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

# 2.2 Other trees

[alder]
display_name = "Серый Олдер"
keyword = ["tree", "alder", "prefersLight", "deciduous", "blocksMovement", "spirit", "bigShade"]
produces = ["woodlogx2", "branchx4"]
condition = 5
fireResist = 2
burned = ["ashesx6","burnedsnag"]
leaves = "alderstump"
growthTime = 120
latinName = "Alnus incana"
description = "<style=\"fluff\"> В одной руке ветвь ивы,\nВ другом, клубе ольхи.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXIII\n\nСерое дерево ольхи.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

[forestapple]
display_name = "Крабаппловое дерево"
keyword = ["tree", "crabapple", "deciduous", "prefersLight", "spirit"]
produces = ["woodlog", "branchx2", "apples"]
growthTime = 120
condition = 10
fireResist = 1
burned = "ashes"
leaves = "smallstump"
fruitTimeStart = 0
fruitTimeDuration = 3
fruit = "apples"
latinName = "Malus sylvestris"
description = "<style=\"fluff\"> \"Восхваляйся, о великий Укко,\nКак Ты дал мне великого Отсо,\nДай мне лесное яблоко,\nБлагодарю тебя за бесконечное\".\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XLVI\n\nКрабовидное дерево обычно встречается в местах <link=\"shade\"><style=\"link\">well-lit</style></link>.\n\nПродукты: <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 2x <link=\"branch\"><style=\"link\">branch</style></link>, <link=\"apples\"><style=\"link>Apples</style></link>"

[juniper]
display_name = "Джунипер"
keyword = ["tree", "juniper", "blocksMovement", "prefersLight", "perennial", "spirit"]
produces = ["branchx3"]
condition = 10
fireResist = 2
burned = "ashes"
leaves = "smallstump"
growthTime = 120
latinName = "juniperus communis"
description = "<style=\"fluff\"> Иди, о пшеница, в заросли,\nК деревьям фиолетовых ягод,\nДля юниоров и олдеров,\nБезопасно вести пастуха домой\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXXIII\n\nМожжевельник. Junipers <link=\"florapreferences\"><style=\"link\">prefer</style></link> places with little <link=\"shade\"><style=\"link\">shade</style></link>.\n\nПродукты: 3x <link=\"branch\"><style=\"link\">branch</style></link>"

[linden]
display_name = "Линденское дерево"
keyword = ["tree", "linden", "blocksMovement", "prefersClay", "deciduous", "spirit", "bigShade"]
produces = ["woodlog", "woodlog", "branchx4"]
condition = 10
fireResist = 2
burned = ["ashesx4"]
leaves = "lindenstump"
growthTime = 240
latinName = "tilia cordata"
description = "<style=\"fluff\"> Ты ворвался в крепости Лухи,\nВзрыв мощных стен, противостоящих\nВ твоем путешествии в Похьола,\nВ деревню отца.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXV\n\nЛиповое дерево. Липовое дерево <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

[maple]
display_name = "Кленовое дерево"
keyword = ["tree", "maple", "blocksMovement", "prefersClay", "deciduous", "bigShade", "spirit"]
produces = ["woodlog", "woodlog", "branchx4"]
condition = 15
fireResist = 2
burned = ["ashesx6","burnedsnag"]
leaves = "stump"
growthTime = 120
latinName = "acer platanoides"
description = "<style=\"fluff\"> Рощи возникли в разнообразной красоте,\nКрасиво росли леса.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение II\n\nКленовое дерево. Maples <link=\"florapreferences\"><style=\"link\">prefer</style></link> <link=\"claysoil\"><style=\"link\">clay soils</style></link>.\n\nПродукты: 2x <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 4x <link=\"branch\"><style=\"link\">branch</style></link>"

[rowan]
display_name = "Роуэн"
keyword = ["tree", "rowan", "holy", "blocksMovement", "needsLight", "deciduous", "spirit"]
produces = ["woodlog", "branchx2"]
condition = 10
fireResist = 2
burned = "ashes"
leaves = "smallstump"
growthTime = 240
latinName = "sorbus aucuparia"
#underworld_transforms_to = "rowan_underworld"
description = "<style=\"fluff\"> Удачи тебе, священное дерево сорб,\nОхраняйте горные массивы, посаженные\nво дворе, широко разветвленном;\nПрекрасные горные хребты,\nКрасивые листья и цветы,\nЕще красивее ягоды.\n\n- <link=\"kalevala\">Kalevala</link>, trans. Джон Мартин Кроуфорд (1888), стихотворение XXIII\n\nСвятое дерево. Роуэнс <link=\"florapreferences\"><style=\"link\">prefer</style></link> места с небольшим <link=\"shade\"><style=\"link\">shade</style></link>.\n\nПродукты: <link=\"woodlog\"><style=\"link\">Wood Log</style></link>, 2x <link=\"branch\"><style=\"link\">branch</style></link>"

[yew]
display_name = "Дерево Ю."
keyword = ["yew", "poison", "prefersClay", "deciduous", "spirit"]
produces = ["branch", "branch"]
condition = 10
fireResist = 2
burned = ["ashes", "ashes"]
growthTime = 120
