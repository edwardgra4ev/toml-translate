# 3.0 Sacrifice events

[forestwrath00]
displayName = "Wrath of the Forest-spirits"
description = "Лесные духи злятся."
keyword = "forestwrath"
type = "wrath"
# duration in months
duration = 12
logtext = "The forest-spirits are unhappy."
stockpile_spontaneous_ignition_chance_mod = +0.1
structure_ignite_chance_mod = +0.1
fire_spirit_chance_mod = +0.1

[waterwrath00]
displayName = "Wrath of the Water-spirits"
description = "Водяные духи злятся."
keyword = "waterwrath"
type = "wrath"
duration = 12
logtext = "The water-spirits are unhappy."
fishing_failure_chance_mod = +0.1
spear_fishing_tool_toughness = -10