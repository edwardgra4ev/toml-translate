description = "<style=\"fluff\"> Тем временем в город прилетел отряд беглецов, которые сообщили, что война близка и что топоры юношей бесполезны против мечей воинов, одетых в почту.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто XIX: Последний праздник героев\n\nТяжелый костюм из брони <link=\"irondef\"><style=\"link\">iron</style></link>.\n\nРазблокировано: <link=\"ironArmorTech\"><style=\"link\"> Технология: Iron Armor</style></link>\n\nПроизводится по адресу: <link=\"armorcoldforger\"><style=\"link\">Armorer's Workshop</style></link>\nКомпоненты: 5x <link=\"wroughtiron\"><style=\"link\"> Кованое железо</style></link>\n\n<style=\"characteristics\"><link=\"armorAndDamage\"><style=\"link\">Точки бронирования</style></link>: <style=\"bonus\">6</style>\nОборонительный бонус: <style=\"bonus\">+30</style> to <link=\"fightingSkill\"><style=\"link>Fighting</style></link></style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,3 единицы"

