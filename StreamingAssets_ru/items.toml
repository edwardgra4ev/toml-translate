foodMoraleMod = +6
unlockedBy = "smokingTech"
description = "Худшая рыба в Нортленде\nТолько пахнет и никчемные пловцы,\nРоки в моей лодке из бересты\nНикогда не ел рыбу или печенье\nИз пальцев моей второй матери.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIII\n\nНекоторые виды рыбы, сохранившиеся при курении. Рыба является источником <link=\"protein\"><style=\"link\">protein</style></link> и <link=\"fat\"><style=\"link\">fat</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">1</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+6</style>\n\nПроизводится по адресу: <link=\"smoker\"><style=\"link\">Smoking Workshop</style></link>\nКомпоненты: <link=\"rawfish\"><style=\"link\">Свежие рыбы</style></link>, <link=\"firewood\"><style=\"link\"> Firewood</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nСпойлы в: <style=\"malus\">12</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: портит в <style=\"malus\">24</style> месяцев"


