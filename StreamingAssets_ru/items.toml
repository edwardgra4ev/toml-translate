decays = "nothing"
decayTime = 12
description = "<style=\"fluff\"> Поистине, ты – ничтожество!\nНе имея ни силы, ни красоты,\nКогда рысь попирала тебя,\nИ когда на тебя наткнется робак,\nКогда в тебе были следы волков,\nИ медвежьи лапы поцарапали твое тело.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nВолчья шкура. Шкурки для волка могут быть <link=\"hidecuring\"><style=\"link\">cured</style></link> into <link=\"curedhide\"><style=\"link\">hide</style></link> для производства кожи или храниться в качестве трофея.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nУпадок в: <style=\"malus\">12</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

# 1.4 Other raw materials

[ashes]
display_name = "пепел"
keyword = ["ash", "noStore", "hideInStockManager", "dissolves", "granular"]
fertility = 0.2
decayTime = 24
decays = "nothing"
weight = 0.5
description = "<style=\"fluff\"> Верная мать, дорогая ушедшая,\nТот, кто воспитывал меня в детстве,\nТы умер и превратился в пепел,\nТы погиб за мои глупости,\nО, твоя голова ивы плачет,\nМягкие над твоим телом,\nСтарейшины наблюдают за твоими снами?\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIX\n\nКуча пепла.\n\nПри включении пепла в <link=\"farming\"><style=\"link\">farm plot</style></link> они увеличивают его <link=\"fertility\"><style=\"link\">fertility</style></link>.\n\n<link=\"fertility\"><style=\"link\">Бонус за бесплодие</style></link>: <style=\"bonus\">0.2</style>\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы"

[bogironore]
display_name = "Железная руда Bog"
keyword = ["bogironore", "product", "prefersOutside"]
unlockedBy = "bogIronTech"
weight = 0.5
description = "<style=\"fluff\"> Из очага поднялась седая борода,\nПотряс его взгляд и ответил:\nТеперь я знаю источник железа,\nОткуда сталь и откуда ее зло.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nНемного высушенной болотной железной руды. <link=\"wetbogiron\"><style=\"link\"> Влажная болотная железная руда </style></link> быстрее высыхает при правильном хранении и становится болотной железной рудой. Затем его можно обжарить в <link=\"oreroastingpit0\"><style=\"link\">ore-roasting pit</style></link>, чтобы подготовить его к плавке.\n\nРазблокировано: <link=\"bogIronTech\"><style=\"link\"> Технология: Bog Iron</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\n\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>."

[dwtrinket]
display_name = "Гномовая безделушка"
keyword = ["metal", "dwarven", "trinket", "prefersInside"]
discovers = "dwarvenTech"
weight = 0.2
description = "<style=\"fluff\"> И все же они обитают на земле и в камнях.\n\n- Проза Эдда, транс. Артур Гилкрист Бродёр, Джилфагининг, XIV</style>\n\n<link=\"dwarvenTech\"><style=\"link\">dwarven</style></link> trinket из <link=\"birdhome\"><style=\"link> Птичий дом</style></link>, декоративный, но бесполезный.\n\nНесколько гномовых безделушек можно забить в <link=\"dwingot\"><style=\"link\">dwarven metal ingot</style></link> в <link=\"smithyworkshop\"><style=\"link\">smithy</style></link>.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

[rawClay]
display_name = "Сырой Клей"
keyword = ["clay", "product", "prefersOutside"]
unlockedBy = "clayTech"
weight = 0.5
description = "<style=\"fluff\"> Но я сказал Арнин-Йо, что слышал голоса богов и знал, что они там, за сумерками, и поэтому никогда больше не мог склониться перед богами, чтобы пастухи сделали из красной глины, которую они вычеркнули руками из склона холма.\n\n«Время и боги» (Time and the Gods), 2006, Лорд Дансени\n\nНекоторые сырые <link=\"clayTech\"><style=\"link\">clay</style></link>. Глину можно превратить в <link=\"claypot\"><style=\"link\">pots</style></link> в <link=\"potteryworkshop\"><style=\"link\">potter</style></link>.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>"

[roastedbogironore]
display_name = "Жареная железная руда Bog"
keyword = ["ironore", "product", "prefersOutside"]
unlockedBy = "bogIronTech"
weight = 0.5
description = "<style=\"fluff\"> Потом опять говорит Ильмаринен,\nТак кузнец обращается к Айрону:\nНе бойся, полезный металл,\nОгонь не поглотит тебя,\nНе сожжет младшего брата,\nНе навредит своему ближайшему родственнику.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nКакая-то жареная болотная железная руда, готовая к плавке.\n\nПроизводится по адресу: <link=\"oreroastingpit0\"><style=\"link\"> Яма для обжарки руды</style></link>\nКомпоненты: <link=\"bogironore\"><style=\"link\">Bog Iron Ore</style></link>, <link=\"firewood\"><style=\"link\"> Firewood</style></link>\n\nРазблокировано: <link=\"bogIronTech\"><style=\"link\"> Технология: Bog Iron</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>"

