description = "<style=\"fluff\"> \"Кто будет пахать поле и падать,\nСеять лен и крутить льняные нити,\nЧтобы я мог приготовить рыбную сетку,\nСмогу ли я поймать Огненную Колею,\nМожет ли быть обеспечена вещь зла?\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XLVIII\n\nМешок семян <link=\"flaxdef\"><style=\"link\">flax</style></link>, посаженных в начале лета.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

