description = "<style=\"fluff\"> В болотах бежали почерневшие воды,\nИз геенны медведи вышли,\nИ волки пробежали через болота.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nКакая-то сырая болотная железная руда, свежая из болота. При хранении в <link=\"stockpile\"><style=\"link\">stockpile</style></link> через три месяца он высыхает в <link=\"bogironore\"><style=\"link\">bog Iron ore</style></link>.\n\nРазблокировано: <link=\"bogIronTech\"><style=\"link\"> Технология: Bog Iron</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nСухость: <style=\"bonus\">6</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: высыхает в <style=\"bonus\">3</style> месяцев"

