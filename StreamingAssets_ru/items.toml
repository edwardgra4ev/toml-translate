description = "<style=\"fluff\"> Принеси мой боевой дублет,\nПринеси мне теперь меч битвы,\nПринесите меч чести моего отца.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XII\n\nБроневое покрытие из <link=\"carpentryTech\"><style=\"link\">wood</style></link>. Тяжелая, громоздкая и почти бесполезная против металлического оружия деревянная броня не имела большого успеха, но предлагает большую защиту от нападения, чем, ну, ничего.\n\nРазблокировано: <link=\"armorTech\"><style=\"link\"> Технология: деревянная броня</style></link>.\n\nПроизводится по адресу: <link=\"armory\"><style=\"link\">Armorer</style></link>\nКомпоненты: 2x <link=\"woodplank\"><style=\"link\">Wooden Plank</style></link>, <link=\"woodslats\"><style=\"link\">Wooden Slats</style></link>\n\n<style=\"characteristics\"><link=\"armorAndDamage\"><style=\"link\">Точки бронирования</style></link>: <style=\"bonus\">3</style>\nОборонительный бонус: <style=\"bonus\">+5</style> to <link=\"fightingSkill\"><style=\"link>Fighting</style></link></style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,3 единицы\nУпадок в: <style=\"malus\">24</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

