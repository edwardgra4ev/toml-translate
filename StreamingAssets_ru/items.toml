[hay]
display_name = "Хэй"
keyword = ["fodder", "loose", "prefersOutside", "garbage", "fertilizer_category"]
weight = 0.5
condition = 2
fireResist = 0
decayTime = 6
fertility = 0.05
stored_decay_multiplier = 0.5
decays = "plantgarbage"
description = "<style=\"fluff\"> Когда он будет готов,\nЗаставь тростник и траву зашевелиться,\nБросьте ароматные головы клевера,\nСделай свой сено в Калевале\nКогда светит серебряное солнце.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIV\n\nКакой-то вкусный сено!\n\nСено может быть <link=\"compostingdef\"><style=\"link\">composted</style></link> в удобрение в <link=\"midden\"><style=\"link\">midden</style></link>.\n\n<link=\"fertility\"><style=\"link\">Бонус за бесплодие</style></link>: <style=\"bonus\">0.05</style>\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: распадается в <style=\"malus\">12</style> месяцев"

