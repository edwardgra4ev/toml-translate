description = "Но сегодня они готовили только для бедных; только половина лося, ребра старого кабана, легкие и печень медведя, суэт молодого волка, шкура старого медведя и яйцо из орлиного гнезда.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIII: Первое путешествие Калевиды в Аид\n\nВылеченная шкура животного, готовая к <link=\"tanning\"><style=\"link\">tanning</style></link> в <link=\"rawleather\"><style=\"link\">leather</style></link>.\n\nПроизводится по адресу: <link=\"hidecuring\"><style=\"link\">Curing Workshop</style></link>\nКомпоненты: <link=\"wolfpelt\"><style=\"link\">Wolf Pelt</style></link>\n\nУпадок в: <style=\"malus\">24</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы"

[rawleather]
display_name = "Сырая кожа"
keyword = ["leather", "product", "prefersInside"]
unlockedBy = "leatherTech"
weight = 0.5
decayTime = 6
description = "Когда Калевид проснулся, он следовал за следами своего коня, пока не нашел останки; и он закрепил кожу как реликвию, проклиная волков, а затем вытащил свой меч и бросился в лес в погоню за ними, разбивая деревья и кусты на своем пути и уничтожая всех диких зверей, с которыми он встречался, в то время как те, кто мог бежать в отдаленные болота и заросли.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто IX: Слухи о войне\n\nНемного сырой кожи.\n\nПроизводится по адресу: <link=\"tanning\"><style=\"link\">Tanning Workshop</style></link>\nКомпоненты: <link=\"curedhide\"><style=\"link\">Cured Hide</style></link>\n\nУпадок в: <style=\"malus\">6</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы"

