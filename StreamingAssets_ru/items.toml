description = "<style=\"fluff\"> Два брата были солдатами: один был богатым, а другой бедным. Бедняга думал, что сам постарается получше; так, сняв красное пальто, он стал садовником, хорошо вырыл землю и посеял репу.\n- <link=\"grimm\"><style=\"link\">Grimm's Fairy Tales</style></link>, trans. Эдгар Тейлор (1876)</style>\n\nБлагородная репа (<i>Brassica rapa</i>), основной продукт гоблиновой кухни. Репа стоит 0,05 <link=\"foodpoint\"><style=\"link\">food points</style></link>, а <link=\"fresh\"><style=\"link\">fresh food</style></link>.\n\nВырасти репу, посадив <link=\"turnipseedbag\"><style=\"link\">Turnip Seeds</style></link> в <link=\"farming\"><style=\"link\">farm plot</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">0.05</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+5</style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nСпойлы в: <style=\"malus\">4</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> в <link=\"turniphole\"><style=\"link\">turnip hole</style></link>: портится в <style=\"malus\">12</style> месяцев\n\n<style=\"fluff\"> Репа - это выносливые корнеплоды, которые особенно хорошо подходят для вырубки и сжигания.\n\nИсторически репа была одной из самых важных частей финской кухни, пока она не была вытеснена картофелем."

