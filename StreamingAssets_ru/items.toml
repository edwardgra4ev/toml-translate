description = "<style=\"fluff\"> Но презренная хозяйка,\nЗапекли печенье для пастуха,\nЗапекли буханку дивной толщины.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXXII\n\nТемный хлеб, богатый <link=\"fiber\"><style=\"link\">fiber</style></link> и с сильным вкусом, считается деликатесом гоблинов. Ржаной хлеб выпекается из <link=\"ryeflour\"><style=\"link\">rye мука</style></link>, и каждая буханка стоит одного <link=\"foodpoint\"><style=\"link\">food point</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">1</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+5</style>\n\nПроизводится по адресу: <link=\"baker\"><style=\"link\"> Bakery</style></link>\nКомпоненты: <link=\"ryeflour\"><style=\"link\">Rye Flour</style></link>, <link=\"firewood\"><style=\"link\"> Firewood</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nИдет <link=\"stale bread\"><style=\"link\">stale</style></link> в: <style=\"malus\">9</style> месяцев\nПроисходит <link=\"stale bread\"><style=\"link\">stale</style></link>, когда <link=\"storeage\"><style=\"link\">stored</style></link=\"storehouse\"><style=\"link\">inside</style></link>: <style=\"malus>18</style> месяцев"

[stale_bread]
display_name = "Несвежий ржаной хлеб"
keyword = ["food", "carb", "fiber", "prefersInside"]
nutrition = 0.8
condition = 1
fireResist = 1
weight = 0.2
decays = "plantgarbage"
decayTime = 6
stored_decay_multiplier = 0.5
foodMoraleMod = +4
description = "Некоторые несвежие, сухие <link=\"ryebread\"><style=\"link\">rye bread</style></link>, уже не такие питательные, но все же надежный источник <link=\"fiber\"><style=\"link\">диетические волокна</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">0,8</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+4</style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nСпойлы в: <style=\"malus\">6</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: порча в <style=\"malus\">12</style> месяцев"

[smokedbird]
display_name = "Куриное мясо птиц"
keyword = ["food", "meat", "protein", "preserved", "prefersInside"]
nutrition = 1
condition = 2
fireResist = 2
weight = 0.1
unlockedBy = "smokingTech"
decays = "nothing"
decayTime = 12
stored_decay_multiplier = 0.5
foodMoraleMod = +6
description = "<style=\"fluff\"> Старый и правдивый,\nОтвечает Дева красоты:\n\"Глупец - дрозд, так поющий,\nЧушь - это твиттер певицы\".\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение VIII\n\nМясо птицы, сохраненное при курении. Он содержит <link=\"протеин\"><style=\"link\">белок</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">1</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+6</style>\n\nПроизводится по адресу: <link=\"smoker\"><style=\"link\">Smoking Workshop</style></link>\nКомпоненты: <link=\"birdmeat\"><style=\"link\">Bird Meat</style></link>, <link=\"firewood\"><style=\"link\"> Firewood</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nСпойлы в: <style=\"malus\">12</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: портит в <style=\"malus\">24</style> месяцев"

[smokedfish]
display_name = "Выкуренная рыба"
keyword = ["food", "fish", "fat", "protein", "preserved", "prefersInside"]
nutrition = 1
condition = 2
