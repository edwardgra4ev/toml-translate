# 1.0 Raw materials

# 1.1 Wood raw materials

[branch]
display_name = "филиал"
keyword = ["prefersOutside", "wood", "defaultShown", "improvisedWeapon", "hammer"]
weight = 0.5
condition = 1
fireResist = 1
weapon_size = "large"
weaponMaterial = "wood"
skillModifier = -10
damagePoints = 6
damageType = "crushing"
burned = "ashes"
decays = "plantgarbage"
decayTime = 12
stored_decay_multiplier = 0.5
description = "<style=\"fluff\"> С тех пор, как пал могучий дуб,\nТеперь она потеряла сто ветвей,\nЧтобы Север увидел солнце,\nПосмотрите на нежный блеск лунного света.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II\n\nБольшая, прочная ветка дерева, полезная для <link=\"carpentryTech\"><style=\"link\">зданий</style></link>, инструментов и даже тушения пожаров.\n\n<style=\"характеристики\">\nТип оружия: <link=\"wthammer\"><style=\"link>Hammer</style></link>\nТип повреждения: <link=\"dtcrushing\"><style=\"link>Crushing</style></link>\n<link=\"armorAndDamage\"><style=\"link\">Damage points</style></link>: <style=\"bonus\">6</style>\n<link=\"improvweapon\"><style=\"link\">Improvised Weapon</style></link>: <style=\"malus\">-10</style> to <link=\"fightingSkill\"><style=\"link\">Fighting</style></link></style>\n<link=\"largeweapon\"><style=\"link\">Большое оружие</style></link>: нельзя использовать со щитом.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nУпадок в: <style=\"malus\">12</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">24</style> месяцев"

[rottenlog]
display_name = "Гнилое дерево"
keyword = ["workedOutside", "wood", "hideInStockManager", "noStore"]
weight = 2.0
condition = 2
fireResist = 2
burned = "ashes"
decays = "plantgarbage"
decayTime = 120
description = "<style=\"fluff\"> Но все мои добродетели оставили меня.\nВ эти печальные дни зла,\nИсчез с юностью и энергией.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение V\n\n<link=\"woodlog\"><style=\"link\">wooden log</style></link>, который долгое время оставался снаружи. Его можно использовать для <link=\"firewood\"><style=\"link\">firewood</style></link>.\n\nЛоги тяжелые, поэтому гоблины должны будут <link=\"hauling\"><style=\"link\">haul</style></link> их туда, где они нужны.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 2.0 единиц\nУпадок в: <style=\"malus\">120</style> месяцев"

[willowbranches]
display_name = "Ветви Уиллоу"
keyword = ["prefersOutside", "wood", "defaultShown", "coarse_bast"]
weight = 0.5
condition = 1
fireResist = 1
burned = "ashes"
decays = "plantgarbage"
decayTime = 12
stored_decay_multiplier = 0.5
description = "<style=\"fluff\"> Старый и правдивый,\nПроплыть через все глубоководные воды,\nПлавающий, как ветвь осины,\nКак увядшая ветка ивы.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение VII\n\nКуча ивовых ветвей. Ветви ивы представляют собой своего рода грубый окунь, который может быть <link=\"retting\"><style=\"link\">made</style></link> into <link=\"coarsefiber\"><style=\"link\">coarse fiber</style></link>.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nУпадок в: <style=\"malus\">12</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">24</style> месяцев"

[woodchips]
display_name ="Деревянные чипсы"
keyword = ["wood", "noStore"]
weight = 0.2
condition = 2
fireResist = 1
fertility = 0.05
unlockedBy = "fertilizerTech"
decays = "nothing"
decayTime = 6
description = "Деревянные чипсы. Они могут быть <link=\"compostingdef\"><style=\"link\">composted</style></link> в удобрение в <link=\"midden\"><style=\"link\">midden</style></link>.\n\n<link=\"fertility\"><style=\"link\">Бонус за бесплодие</style></link>: <style=\"bonus\">0.05</style>\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nСпойлы в: <style=\"malus\">6</style> месяцев"

[woodlog]
display_name = "Деревянный"
keyword = ["workedOutside", "wood", "defaultShown"]
weight = 2.0
condition = 3
fireResist = 2
burned = ["ashes", "ashes"]
decays = "rottenlog"
decayTime = 60
stored_decay_multiplier = 0.5
description = "<style=\"fluff\"> Теперь она задает деревьям вопрос:\nИ лес дает такой ответ:\n\"Мы уже достаточно заботимся,\nНе можешь думать о делах твоих;\nЖестокая судьба заставляет нас сражаться,\nЖалкие наши собственные несчастья!\nМы разбиты и разбиты на куски,\nРазрезанные блоки для героизма,\nМы сожжены до смерти как топливо.\nНикого не волнует, сколько мы страдаем».\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XV\n\nДеревянный бревно. Логи можно использовать как <link=\"carpentryTech\"><style=\"link\">строительный материал</style></link>, или рубить на <link=\"woodplank\"><style=\"link\">planks</style></link>, <link=\"woodbeam\"><style=\"link\">beams</style></link>, или <link=\"firewood\">firewood</style></link>.\n\nЛоги тяжелые, поэтому гоблины должны будут <link=\"hauling\"><style=\"link\">haul</style></link> их туда, где они нужны.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 2.0 единиц\nУпадок в: <style=\"malus\">60</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">120</style> месяцев"

