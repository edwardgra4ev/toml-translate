description = "Некоторые стебли крапивы. Стебли крапивы — это своего рода тонкий окунь, который может быть <link=\"retting\"><style=\"link\">made</style></link> into <link=\"finefiber\"><style=\"link\">fine fiber</style></link>. Одна куча стеблей крапивы делает одну единицу волокна.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: распадается в <style=\"malus\">12</style> месяцев"

