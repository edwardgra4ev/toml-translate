description = "<style=\"fluff\"> Когда его жеребец остановился\nНа поле Осмо и луг,\nБыстро поднимаясь в снегоступах,\nИ услышал колдун,\nРазбивая уголь в кузнице,\nИзбиение тяжелым молотком.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение X\n\nКакой-то уголь, мощное топливо, которое горит очень жарко.\n\nПроизводится по адресу: <link=\"charcoal clamp\"><style=\"link\">Charcoal Clamp</style></link>\nКомпоненты: 4x <link=\"firewood\"><style=\"link\"> Firewood</style></link>\n\nРазблокировано: <link=\"charcoalTech\"><style=\"link\"> Технология: Уголь</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

