description = "Мешок семян крапивы. Черепахи высаживаются в начале лета и собирают осенью.\n\nЧтобы посадить семена крапивы, создайте <link=\"farming\"><style=\"link\">farm plot</style></link>. Растения крапивы должны быть обработаны в <link=\"nettleprocessing\"><style=\"link\">nettleyard</style></link>, чтобы получить <link=\"nettleseedbag\"><style=\"link\">nettle seeds</style></link>, съедобные <link=\"nettlebunch\"><style=\"link\">nettle leaves</style></link> и <link=\"nettlestems\"><style=\"link\">nettle stems</style></link>, которые могут быть сведены в волокно.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

[ryeseedbag]
display_name = "Ржаные семена"
