description = "<style=\"fluff\"> Но герою нужна была древесина,\nи доски, и балки, и брекеты,\nНайден самый маленький кусок пиломатериала,\nНайдены доски, но семь фрагментов.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXIX\n\nДеревянная доска. Планки используются как <link=\"carpentryTech\"><style=\"link\"> строительный материал</style></link>, для изготовления различных предметов, и могут даже служить оружием в чрезвычайной ситуации. Их готовят путем рубки <link=\"woodlog\"><style=\"link\">logs</style></link>.\n\n<style=\"характеристики\">\nТип оружия: <link=\"wthammer\"><style=\"link>Hammer</style></link>\nТип повреждения: <link=\"dtcrushing\"><style=\"link>Crushing</style></link>\n<link=\"armorAndDamage\"><style=\"link\">Damage points</style></link>: <style=\"bonus\">8</style>\n<link=\"improvweapon\"><style=\"link\">Improvised Weapon</style></link>: <style=\"malus\">-20</style> to <link=\"fightingSkill\"><style=\"link\">Fighting</style></link></style>\n<link=\"largeweapon\"><style=\"link\">Большое оружие</style></link>: нельзя использовать со щитом.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 1,0 единицы\nУпадок в: <style=\"malus\">24</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">120</style> месяцев"

