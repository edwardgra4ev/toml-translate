description = "<style=\"fluff\"> Наконец они нашли уединенный коттедж, где на травяном участке перед дверью сидела дева.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. Кирби У.Ф. Канто XVI: Путешествие Калевиде\n\nНемного грубого волокна.\n\nГрубое волокно представляет собой <link=\"retting\"><style=\"link\">made</style></link> from <link=\"willowbranches\"><style=\"link\">willow branchs</style></link> или <link=\"roughflaxstrands\"><style=\"link\">rough flax strands</style></link>, и может быть <link=\"spinning\"><style=\"link\">spun</style></link> in <link=\"coarsethread\"><style=\"link>coarse thread</style></link>.\n\nПроизводится по адресу: <link=\"retting\"><style=\"link\">Retting Workshop</style></link>\nКомпоненты: Coarse bast\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: распадается в <style=\"malus\">24</style> месяцев\n"

