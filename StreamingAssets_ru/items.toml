description = "<style=\"fluff\"> И эти слова седая борода произнесла:\n\"Подожди, подожди, ты, бык Суоми,\nПока я не принесу свой древний военный клуб.\nТогда я ударю тебя по лбу».\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XX\n\n<link=\"woodmaterial\"><style=\"link\">wooden</style></link> Персонал с большим камнем, привязанным к нему: простое, но эффективное дробление <link=\"weapondef\"><style=\"link\">weapon</style></link>.\n\nПроизводится по адресу: <link=\"weaponmaker\"><style=\"link\">Создатель оружия</style></link>\nКомпоненты: <link=\"branch\"><style=\"link\">Branch</style></link>\n\n<style=\"характеристики\"> Тип оружия: <link=\"wthammer\"><style=\"link>Hammer</style></link>\nТип повреждения: <link=\"dtcrushing\"><style=\"link>Crushing</style></link>\n<link=\"armorAndDamage\"><style=\"link\">Damage points</style></link>: <style=\"bonus\">9</style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nУпадок в: <style=\"malus\">24</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

