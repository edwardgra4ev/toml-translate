# 1.3 Animal raw materials

[birdmeat]
display_name = "Мясо птицы"
keyword = ["food", "meat", "fresh", "protein", "prefersInside"]
nutrition = 1
condition = 1
fireResist = 2
unlockedBy = "butcheryTech"
weight = 0.1
decays = "rottenmeat"
decayTime = 3
stored_decay_multiplier = 0.5
foodMoraleMod = +10
description = "<style=\"fluff\"> Но я не такой, как кукушка,\nПение, веселье на вершинах холмов;\nЯ как безпесенная синяя утка,\nКогда она плавает в водах.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXII\n\nСъедобное мясо игровой птицы.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">1</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+10</style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nСпойлы в: <style=\"malus\">3</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: порча в <style=\"malus\">6</style> месяцев"

[bones]
display_name = "Кости"
keyword = ["bone", "prefersOutside"]
fireResist = 3
discovers = "butcheryTech"
burned = "nothing"
weight = 0.2
decays = "nothing"
decayTime = 60
stored_decay_multiplier = 0.5
description = "<style=\"fluff\"> Поднимает половину головы, переднюю руку,\nНайдет руку и половину задней кости,\nмного других меньших частей;\nИзвлекает сына из всех осколков,\nПовторяю ее Лемминкяйнен,\nПлоть к плоти с мастерством, которое она помещает,\nДает кости их правильные станции.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XV\n\nНесколько костей.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nУпадок в: <style=\"malus\">60</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">120</style> месяцев"

