description = "<style=\"fluff\"> Сараи были заполнены соответственно рожью, ячменем, овесом, пшеницей, кукурузой, овощами, а последние — комками сала и сала.\n\n- <link=\"kalevipoeg\"><style=\"link\">Kalevipoeg</style></link>, trans. В.Ф. Кирби, Канто XIV: Дворец Сарвика\n\nМешок ржаных семян. Ржа высаживается в начале осени, и на выращивание уходит чуть меньше года.\n\nЧтобы посадить семена, создайте <link=\"фермерство\"><style=\"link\">фермерский участок</style></link>.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

[turnipseedbag]
display_name = "Семена репы"
keyword = ["seed", "prefersInside", "root_veg_seed"]
contains = "turnipsprout"
discovers = "farmingTech"
plantTime = 9
maxCapacity = 75
condition = 2
fireResist = 2
weight = 0.1
decayTime = 6
fertility_to_food_mult = 1
description = "<style=\"fluff\"> И, таким образом, соглашаясь,\nСеет с усердием остров,\nСемена на землях, которые он разбрасывает,\nСемена в каждом болоте и низменности.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение II\n\nМешок семян репы. Выращивает <link=\"turnipplant\"><style=\"link\">turnips</style></link>.<br>Чтобы посадить семена, постройте <link=\"farming\"><style=\"link\">farm plot</style></link>.\n\nСемена репы высаживают в начале лета. Растения производят репу в течение лета, и если их оставить расти в течение зимы, следующим летом они производят семена репы.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,1 единицы\nУпадок в: <style=\"malus\">6</style> месяцев\nХранит, когда <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>\n\n<style=\"fluff\"> Семена репы очень выносливые, могут прижиться и успешно расти с минимальным приготовлением. Фермеры в Восточной Финляндии просто выплевывали семена на землю недавно сожженных заваленных участков."

