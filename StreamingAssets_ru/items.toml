description = "<style=\"fluff\"> Когда ужин будет готов,\nВы должны искать скрытую мудрость.\nВ мозгу окуня и лосося,\nВ устьях океанского нытья.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXII\n\nРыба, только что пойманная. Одна рыба стоит одной <link=\"foodpoint\"><style=\"link\">food point</style></link>.\n\n<link=\"foodpoint\"><style=\"link\">Точки питания:</style></link> <style=\"bonus\">1</style>\n<link=\"moraledef\"><style=\"link\">Моральный бонус:</style></link> <style=\"bonus\">+8</style>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,2 единицы\nСпойлы в: <style=\"malus\">3</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>: порча в <style=\"malus\">6</style> месяцев"

