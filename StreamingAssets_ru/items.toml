description = "<style=\"fluff\"> Придите, девы, которые должны служить мне,\nПриезжайте, ребята из деревни,\nПринеси мне огонь на бересте,\nЗажгите фаготы пихты.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XXI\n\nДревесина для сжигания, жизненно необходима для <link=\"heating\"><style=\"link\">heating</style></link> в холодную зиму. Древесина также создается как побочный продукт некоторых рабочих мест по производству древесины.\n\nГоблины будут автоматически производить дрова для обогрева зданий.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nУпадок в: <style=\"malus\">12</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">24</style> месяцев"

