description = "<style=\"fluff\"> Но пиломатериал провалил хозяин,\nБимс хотел свой корабль.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение XVI\n\nДеревянная балка, отлично подходит для <link=\"carpentryTech\"><style=\"link\">building</style></link>. Их готовят путем рубки <link=\"woodlog\"><style=\"link\">logs</style></link>. Лучи тяжелые, поэтому гоблины должны будут <link=\"hauling\"><style=\"link\">haul</style></link> их туда, где они нужны.\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 2.0 единиц\nУпадок в: <style=\"malus\">60</style> месяцев\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"stockpile\"><style=\"link\">outside</style></link>: распадается в <style=\"malus\">120</style> месяцев"

