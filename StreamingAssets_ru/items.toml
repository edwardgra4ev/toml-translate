# 2.4 Metal products

[dwingot]
display_name = "Слиток гномового металла"
keyword = ["dwarven", "ingot", "prefersInside", "product"]
unlockedBy = "dwarvenTech"
weight = 0.5
description = "<style=\"fluff\"> Тогда Отче послал того, кого называют Скирниром, посланником Фрейра, в область Черных эльфов, к некоторым гномам и заставил сделать оковы по имени Глейпнир. Он был сделан из шести вещей: шум, который кошка издает при падении ног, борода женщины, корни скалы, сухожилия медведя, дыхание рыбы и слюна птицы.\n\n- Проза Эдда, транс. Arthur Gilchrist Brodeur, Gylfaginning, XXXIV\n\nСлиток <link=\"dwarvenTech\"><style=\"link\">dwarven metal</style></link>.\n\nПроизведено по адресу: <link=\"smithy\"><style=\"link\">Smithy</style></link>\nКомпоненты: 3x <link=\"dwtrinket\"><style=\"link\">Dwarven Trinket</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

[spongeiron]
display_name = "Губка железная"
keyword = ["metal", "product", "prefersInside"]
unlockedBy = "bogIronTech"
weight = 0.5
description = "<style=\"fluff\"> И железо течет в ручьях\nИ тогда колдовство рассеется.\nСкоро станет как пекарская закваска,\nМягкое как тесто для хлеба из ячменя.\nЗатем выкрикнул металл, железо:\nЧудесный кузнец, Ильмаринен,\nВозьми, возьми меня из печи твоей,\nОт этого огня и жестоких пыток.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nНекоторое выплавленное железо, которое все еще нужно обработать в кузнице, прежде чем его можно будет использовать.\n\nПроизводится по адресу: <link=\"bloomer\"><style=\"link\">Bloomery</style></link>\nКомпоненты: <link=\"roastedbogironore\"><style=\"link\">Roasted Bog Iron Ore</style></link>, <link=\"charcoal\"><style=\"link\">Уголь</style></link>, <link=\"firewood\"><style=\"link> Firewood</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

[wroughtiron]
display_name = "кованое железо"
keyword = ["metal", "ingot", "iron", "prefersInside", "product"]
unlockedBy = "forgingTech"
weight = 0.5
description = "<style=\"fluff\"> Ильмаринен ответил:\nЯ возьму тебя из печи моей,\nТы немного напуган,\nТы – великая сила,\nТы убьешь лучших из героев,\nТы ранишь своего дорогого брата.\n\n- <link=\"kalevala\"><style=\"link\">Kalevala</style></link>, trans. Джон Мартин Кроуфорд, стихотворение IX\n\nСлиток кованого железа: сырье для полезных железных предметов.\n\nПроизводится по адресу: <link=\"blacksmiths\"><style=\"link\">Blacksmith</style></link>\nКомпоненты: <link=\"spongeiron\"><style=\"link\">Sponge Iron</style></link>, <link=\"уголь\"><style=\"link\">Уголь</style></link>, <link=\"древесина\"><style=\"link> Firewood</style></link>\n\n<link=\"weight def\"><style=\"link\"> Вес </style></link>: 0,5 единицы\nПравильно <link=\"storage\"><style=\"link\">stored</style></link> <link=\"storehouse\"><style=\"link\">inside</style></link>"

#  2.5 Leather products

[curedhide]
display_name = "Проклятие Скрыть"
keyword = ["hide", "leather", "product", "prefersInside"]
unlockedBy = "leatherTech"
decayTime = 24
